body:
  text: 卷七太陰經證治十條仲景曰脈尺寸俱沉細者太陰受病也當四五日發以其脈布胃中絡於嗌故腹滿而嗌乾龐氏云宜大承氣湯下之雍謂更當詳證而後可下此即仲景辨太陰之說也未可遽下又曰太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬雍曰若太陰本證臟寒自利不渴當依仲景溫之以四逆輩若本太陽病因誤下腹痛轉屬太陰者依仲景用桂枝加芍藥湯以太陽誤下表證未解也又曰太陰中風四肢煩疼陽微陰澀而長者為欲愈又曰太陰病欲解時從亥至醜上又曰太陰病脈浮者可發汗宜桂枝湯又曰自利不渴者屬太陰以其臟有寒故也當溫之宜服四逆輩又曰傷寒三日太陽脈弱至四日太陰脈大龐氏云脈大而胸滿多痰者可吐之無此證者宜汗之雍曰吐用瓜蒂散汗用桂枝湯仍須脈浮則可汗也又曰傷寒脈浮而緩龐氏云亦大之類手足自溫者系在太陰太陰當發身黃龐氏云小便不利者必發黃以五苓散加茵陳主之若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也龐氏云可類要四味桔皮湯又曰本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之又曰太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也校正云下利者先煎芍藥二沸雍曰以脈弱故知胃氣弱也少陰經證治四十七條仲景曰脈尺寸俱沉者少陰受病也當五六日發以其脈貫腎絡於肺系舌本故口燥舌乾而渴龐氏云宜大承氣湯雍曰未可也更宜詳餘證可下則下之又曰少陰之為病脈微細但欲寐也又曰少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也常氏云可四逆湯甘草乾薑湯金匱方又曰病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利常氏云可豬膚湯雍曰少陰有伏氣病亦如傷寒法先咽痛次必下利與前證相似古人謂之腎傷寒其病輕不傳經治法不可同咽痛則半夏桂枝甘草湯下利用四逆湯二三日即愈又曰少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也常氏云桂枝去芍藥加蜀漆龍骨牡蠣救逆湯以救火逆豬苓湯五苓散以通小便又曰少陰病脈細沉數病為在裡不可發汗又曰少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之雍曰可附子湯又曰少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈又曰少陰病下利若利自止惡寒而蜷臥手足溫者可治常氏云可當歸四逆湯又曰少陰病惡寒而蜷時自煩欲去衣被者可治常氏云吳茱萸湯雍曰凡少陰病煩躁者不可下先服吳茱萸湯以煩躁非實熱且手足多逆冷也又曰少陰中風脈陽微陰浮者為欲愈又曰少陰病欲解時從子至寅上又曰少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯常氏云少陰太溪穴也龐氏云言發熱者謂其身發熱也太溪穴在內踝後跟骨上動脈陷中又曰少陰病八九日一身手足盡熱者以熱在膀胱必便血也常氏云可桃仁承氣湯芍藥地黃湯未見方又曰少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治常氏云可芍藥地黃湯雍曰仍灸太溪三陰交及湧泉穴又曰少陰病惡寒身蜷而利手足逆冷者不治雍曰灸太溪等穴仍服四逆湯又曰少陰病吐利躁煩四逆者死龐氏云煩躁者內煩躁也與吳茱萸湯正宜細審其生死也又曰凡少陰四逆者宜溫之雍曰此正仲景吳茱萸湯證不當不治仍灸太溪又曰少陰病下利止而頭眩時時自冒者死龐氏云此當是少陽冒昧汗濈然出脈勻小浮者少陰無眩冒之證雍日千金翼作少陰又曰少陰病四逆惡寒而身蜷脈不至不煩而躁者死千金翼同一作吐利而躁逆者死龐氏詳定云吐利煩躁者死雍曰吐利煩躁四逆者死已見前證不應重出此正謂不煩而躁屬利證也更宜吳茱萸湯當歸四逆加吳茱萸湯仍灸太溪穴又曰少陰病六七日息高者死又曰少陰病脈微細沉但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死又曰少陰病始得之反發熱脈沉者麻黃附子細辛湯主之龐氏曰少陰病脈沉不知何沉也且沉緊發汗則動經沉數為病在裡不可發汗此脈或沉而濡或沉而微是表中寒而里不消脈應里而發在表故以細辛之藥溫散而取汗也又曰少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也龐氏曰謂初得病二三日常見少陰證無陽者鬚髮小汗也又曰少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之又曰少陰病得之一二日口中和其背惡寒者當灸之附子湯主之常氏云當灸膈俞關元穴背俞第三行雍曰此有漏字當是灸膈俞及關元穴也膈俞是背俞第二行穴又曰少陰病身體痛手足寒骨節痛脈沉者附子湯主之又曰少陰病下利便膿血者桃花湯主之又曰少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之又曰少陰病下利便膿血者可刺常云刺幽門交信雍曰宜灸又曰少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之雍曰凡少陰病四逆而煩躁者未問其餘證先宜服吳茱萸湯四逆而無煩躁證者先宜服四逆湯四逆下利脈不出者先宜服通脈四逆湯此三者治少陰證大要藥也又曰少陰病下利咽痛胸滿心煩者豬膚湯主之又曰少陰病二三日咽痛者可與甘草湯不瘥者與桔梗湯龐氏云半夏散亦主之又曰少陰病咽中痛半夏散及湯主之又曰少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之又曰少陰病下利白通湯主之又曰少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生又曰少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之雍曰真武湯不愈者小青龍湯又曰少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之又曰少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之又曰少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之又曰少陰病得之二三日口燥咽乾者急下之宜大承氣湯又曰少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯一法用大柴胡雍曰惟口乾燥一證見熱更當細詳其餘證方敢用又曰少陰病六七日腹脹不大便者急下之宜大承氣湯又曰少陰病脈沉者急溫之宜四逆湯又曰少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯又曰少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之脈經云灸厥陰可五十壯常氏云可灸大沖穴雍曰仍灸太溪問曰自利者三陰證也仲景以自利不渴者屬太陰渴者屬少陰何也雍曰太陰脾之經也其脈布胃中與胃為表裡脾本惡濕加以胃中寒故不渴也少陰腎之經也腎屬水故惡燥經中有邪則腎當大燥於是引飲自救故渴也是以太陰無渴證少陰有渴證也厥陰經證治六十三條仲景曰脈尺寸俱微緩者厥陰受病也當六七日發以其脈循陰器絡於肝故煩滿而囊縮龐氏曰脈微緩者囊不縮若外證發熱惡寒似瘧為欲愈宜桂枝麻黃各半湯若尺寸俱沉短者囊必縮宜承氣湯下之雍曰厥陰見沉短短命脈下證未具更宜詳下證中下證全則可下又曰三陰皆受病已入於府可下而已雍曰三陰可下三陽可汗此言其大略也陽之中自有可汗不可汗證陰之中自有可下不可下證故陰陽之中又當各詳其可汗可下而施行之又曰厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止龐氏云可烏梅丸常氏以有餘證故曰可烏梅丸四逆湯雍曰無厥證者不用四逆消渴下利飢不欲食宜理中湯下利甚者去白朮加附子氣上如奔豚者茯苓桂枝甘草大棗湯吐蛔服烏梅丸兼理中丸又曰厥陰中風脈微浮為欲愈不浮為未愈又曰厥陰病欲解時從醜至卯上又曰厥陰病渴欲飲水者少少與之愈又曰諸四逆厥者不可下之虛家亦然常氏曰可當歸四逆湯又曰傷寒先厥後發熱而利者必自止見厥復利常氏云可白頭翁湯雍曰白頭翁治熱利此當更審證冷熱用之又曰傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中一云消中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也常氏曰可服千金漏蘆湯又曰傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死又曰傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹常氏云喉痹可桔梗湯便膿血可桃花湯又曰傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤雍曰仲景言厥應下之者謂有當下之厥而誤汗也非謂皆可下也故仲景又曰諸四逆厥者不可下然厥病至於發癰疽便膿血應下者不必拘此又曰傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈龐氏續云若六日厥者必發熱愈甚仍下利也雍曰此恐論中語而諸書皆不見若六日厥則知陽氣有餘故知熱愈甚也又曰凡厥者陰陽氣不相順接便為厥厥者手足逆冷者是也龐氏曰凡厥通用四逆湯謂其脈浮遲或微或細或沉皆屬裡有寒也雍曰世之論厥者皆不達其源厥者逆也凡逆皆為厥傷寒所論蓋手足厥逆之一證也凡陰陽正氣偏勝而厥者一寒不復可熱一熱不復可寒傷寒之厥非本陰陽偏勝暫為毒氣所苦而然毒氣並於陰則陰盛而陽衰陰經不能容其毒必溢於陽故為寒厥毒氣並於陽則陽盛而陰衰陽經不能容其毒必溢於陰故為熱厥其手足逆冷或有溫時手足雖逆冷而手足掌心必暖龐氏謂非正厥皆寒氣之輕者也故可消息汗下或者以此便為熱厥非也熱厥之熱與寒厥之寒一也傷寒厥陰止論寒厥唯有輕重之異無熱厥也其謂寒熱相勝復五日六日之言謂發熱五日復寒厥深重者後發熱亦深重其寒厥輕微者其後發熱亦輕微此仲景論文本意誤讀者謂手足寒厥深者其內蓄熱亦深寒厥微者其內蓄熱亦微大非也然則熱厥之證何如曰手足如炭火炮烙或如入湯中是也曰傷寒有此證乎曰雖未之見以理推之陽毒恐有此證人見之未悟其為熱厥也曰寒熱二厥之論始於何時曰始於素問岐伯曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥故陽氣勝則足下熱陰氣勝則從五指至膝上寒也曰經又言足如履冰時如入湯中一證豈寒熱並厥乎曰此為風痹淫爍陰陽二經俱不足邪氣乘虛而入舍於二經之間往來寒熱正氣不能與之爭邪氣日進正氣日衰所以不出三年死非厥也又問曰厥病發癰膿便膿血何也雍曰毒氣隨三陰經走下不復可止非發膿癰便膿血則無自而出故其毒下於表者則發癰膿下於里者則便膿血以是知厥亦有可下逐之理免發癰膿便膿血也便膿血則喉不痹者以毒下也應下之而反汗則口傷爛赤者以毒下而復上也曰厥陰論寒厥而此皆熱厥何也素問曰人之傷於寒者則為病熱寒極則生熱是為熱厥也龐氏曰手足厥冷皆屬厥陰不可下亦不可汗有須下證者謂手足雖厥冷或有溫時手足雖逆冷而手足掌心必暖非正厥也故可消息汗下龐氏又曰寒熱而厥面色不澤冒昧者當用綿衣包手足令暖溫必大汗而解龐氏曰有不因大汗下而兩手忽無脈謂之雙伏或一手無脈謂之單伏或利止如此必有正汗急用四逆輩溫之得有汗便安脈終不出者死仲景曰傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥非蛔厥也龐氏曰四逆輩冷服之常氏云可當歸四逆湯又曰蛔厥者其人當吐蛔今病者靜而復時煩此為臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之又主久利又曰傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也龐氏曰宜乾薑甘草湯欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血雍曰熱不除而便血可犀角地黃湯又曰病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也龐云宜灸關元又曰傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者必便膿血常氏云可桃花湯又曰傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也常氏云可四逆湯待其熱退寒存厥不復熱始可用之雍曰寒多熱少便宜四逆湯少與之又曰傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死常氏云可灸太衝穴又曰傷寒發熱下利厥逆躁不得臥者死又曰傷寒發熱下利至甚厥不止者死又曰傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也雍曰汗出不止者死先服防風牡蠣湯以止汗次服甘草乾薑湯以復其陽得厥愈足溫更作芍藥甘草湯以和之又曰傷寒五六日不結胸腹濡脈虛復厥者不可下此亡血下之死常氏云可當歸四逆湯四逆加人參湯又曰發熱而厥七日下利者為難治常氏云四逆散又曰傷寒脈促手足厥逆可灸之常氏云灸太衝穴又曰傷寒脈滑而厥者里有熱也白虎湯主之又曰手足厥寒脈細欲絶者當歸四逆湯主之若其人內有久寒者宜當歸四逆加吳茱萸生薑湯又曰大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之又曰大汗若大下利而厥冷者四逆湯主之又曰病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散又曰傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也雍曰治厥四逆湯又曰傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黃升麻湯主之雍曰服湯已脈終不至泄利不止宜服通脈四逆湯又曰傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也常氏云可四逆湯散又曰傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃芩黃連人參湯主之雍曰竊疑此湯性寒又幹薑黃連相反若更嘔吐者當服當歸四逆加茱萸生薑湯及吳茱萸湯又曰下利有微熱而渴脈弱者令自愈又曰下利脈數有微熱汗出令自愈設復緊為未解雍曰緊為有寒須溫之宜四逆湯又曰下利手足厥冷無脈者灸之不溫若脈不還反微喘者死少陰負趺陽者為順也常氏云當灸氣海關元二穴龐氏云凡厥通用四逆湯謂其脈浮遲或微或細或沉皆里有寒也又曰下利寸脈反浮數尺中自澀者必圊膿血常氏云可桃花湯又曰下利清穀不可攻表汗出必脹滿雍曰宜通脈四逆湯又曰下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死又曰下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也雍曰不解宜通脈四逆湯少與之其人下利清穀裡寒外熱正通脈四逆證也又曰下利脈數而渴者令自愈設不瘥必圊膿血以有熱故也常氏云可黃芩湯又曰下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死雍曰宜通脈四逆湯又曰傷寒下利日十餘行脈反實者死又曰下利清穀裡寒外熱汗出而厥者通脈四逆湯主之又曰熱利下重者白頭翁湯主之又曰下利欲飲水者以有熱故也白頭翁湯主之又曰下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯又曰下利譫語者有燥屎也宜小承氣湯又曰下利後更煩按之心下濡者為虛煩也宜梔子豉湯又曰嘔家有癰膿者不可治嘔膿儘自愈又曰嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之又曰乾嘔吐涎沫頭痛者吳茱萸湯主之又曰嘔而發熱者小柴胡湯主之又曰傷寒大吐大下之極虛復極汗出者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也常氏云可吳茱萸湯又曰傷寒噦而腹滿視其前後知何部不利利之則愈常氏云前部不利豬苓湯後部不利調胃承氣湯雍曰噦者胃中有寒不宜更服調胃承氣湯先宜服半夏生薑湯腹滿如故後部不利者小承氣湯微和之龐氏曰三陽皆有合病凡十四證唯三陰無合病
