body:
  text: 卷六陽明經證治八十七條仲景曰尺寸俱長者陽明受病也當二三日發以其脈俠鼻絡於目故身熱目疼鼻乾不得臥龐氏曰此證惡寒可發汗若惡寒罷反自汗惡熱者為胃家實屬正陽陽明宜調胃承氣湯仲景問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中燥煩實大便難是也龐氏曰本太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明名曰太陽陽明也本傳到少陽因發汗利小便胃中燥大便難者名曰少陽陽明也病人本風盛氣實津液消爍或始惡寒汗出後惡寒既罷而反發熱或始得病便發熱狂言者名曰正陽陽明也凡陽明證俱宜下唯中寒惡寒為病在經與太陽合病屬表可發其汗又曰陽明之為病胃家實是也千金作胃中寒者非又問曰何緣得陽明病答曰太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也又問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也又問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也又問曰惡寒何故自罷答曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也又曰本太陽初得病時發其汗汗先出不徹因轉屬陽明也又曰傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也又曰傷寒三日陽明脈大又曰傷寒脈浮而緩手足自溫者是為系在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也又曰傷寒轉系陽明者其人濈然微汗出也又曰陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也常氏云可桂枝麻黃各半湯小柴胡湯又曰陽明病若能食名中風不能食名中寒又曰陽明病若中寒者不能食小便不利手足濈然汗出此欲作固瘕必大便初硬後溏所以然者以胃中冷水穀不別故也常氏云可理中湯豬苓湯又曰陽明病初欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈常氏云疑闕麻黃湯一法又一本云脈去則愈雍曰千金翼作堅者則愈無脈字證既有誤未可便用麻黃湯也若脈浮而緊無汗者則可用三書之誤是誤以緊為堅者為去或漏脈字或漏者字當云脈緊者則愈又曰陽明病欲解時從申至戌上又曰陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦常云可溫中湯金匱方小半夏湯亦可又曰陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如故所以然者脈遲故也常氏云茯苓湯五苓散雍曰已發黃者茵陳蒿湯又曰陽明病法多汗反無汗其身如蟲行皮中狀者此以久虛故也常氏云可桂枝加黃耆湯雍曰以無汗故如蟲行皮中狀須小汗乃解宜桂枝麻黃各半湯此湯解身癢能小汗故也又曰陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛常氏云類要用小建中湯誤也可小柴胡湯雍曰手足厥者宜小建中湯又曰陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛常氏云可服茯苓甘草白朮生薑湯未見方咽痛者宜桔梗湯又曰陽明病無汗小便不利心中懊憹者身必發黃常氏云可茵陳蒿湯調五苓散又曰陽明病被火額上微汗出而小便不利者必發黃常氏云可與茵陳蒿湯調五苓散又曰陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出常氏云可與柴胡桂枝湯又曰陽明病口燥但欲漱水不欲咽者此必衄常氏云可黃芩芍藥地黃湯當作黃芩芍藥甘草湯此句後增非郭氏語又曰陽明病本自汗出醫更重發汗病已瘥尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也又曰傷寒嘔多雖有陽明證不可攻之常云可小柴胡湯又曰陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈常氏云未攻者可與生薑瀉心湯利不止者四逆湯又曰陽明病面合赤色不可攻之必發熱色黃小便不利也常氏云可五苓散雍曰既不可攻則調胃承氣不可用但煎茵陳蒿湯調五苓散服之又曰陽明病不吐不下心煩者可與調胃承氣湯又曰陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下又曰陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎也乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉失氣者慎不可攻也又曰夫實則譫語虛則鄭聲鄭聲者重語也直視譫語喘滿者死下利者亦死又曰發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死又曰傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之若一服利止後服又曰陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止者更莫復服又曰陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣者勿更與之明日又不大便脈反微澀者裡虛也為難治不可更與承氣湯也常氏云可用黃耆人參建中湯又曰陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬耳宜大承氣湯下之又曰陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈雍曰此是婦人證又曰汗出譫語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂以表虛里實故也下之則愈宜大承氣湯又曰傷寒四五曰脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則譫語常氏云喘滿無大熱者可麻黃杏仁甘草石膏湯裡實譫語者調胃承氣湯又曰三陽合病腹滿身重難以轉側口不仁面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之龐氏在少陽證又曰二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯又曰陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之龐氏云脈浮緊當無汗反有汗咽燥腹滿惡熱法當下之而反脈浮緊不可下此恐變風濕宜細詳之又曰若渴欲飲水口乾舌燥者白虎加人參湯主之又曰若脈浮發熱渴欲飲水小便不利者豬苓湯主之又曰陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也常氏云可與白虎加人參湯雍曰宜柴胡桂枝湯和營衛通津液也又曰脈浮而遲表熱裡寒下利清穀者四逆湯主之又曰若胃中虛冷不能食者飲水則噦常氏云可溫中湯金匱方二物又曰脈浮發熱口乾鼻燥能食者則衄常氏云可黃芩湯又曰陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之又曰陽陰病發潮熱大便溏小便自可胸脅滿不去者與小柴胡湯主之又曰陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也又曰陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮者與小柴胡湯又曰脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治雍曰千金通續前證為一證似當理又曰陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及大豬膽汁皆可為導又曰陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯又曰陽明病脈浮無汗而喘者發汗則愈宜麻黃湯又曰陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴飲水漿者此為瘀熱在裡身必發黃茵陳蒿湯主之又曰陽明證其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之又曰陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯又曰病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也常氏云可小承氣湯又曰病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯又曰大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯又曰病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯又曰食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也常氏云可桔皮湯類要云橘皮一兩甘草一兩生薑四兩人參三兩為末水煎服又曰太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水者少少與之但以法救之渴者宜五苓散又曰陽脈微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過為陽絶於里亡津液大便因硬也常氏云可與小柴胡湯和其津液如便益堅可調胃承氣湯雍曰通津液用柴胡桂枝湯尤穩如不得已至用承氣湯防下後變作狐惑宜小小通之又曰脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絶常氏云可柴胡湯又曰趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則硬其脾為約麻仁丸主之又曰太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之又曰傷寒吐後腹脹滿者與調胃承氣湯又曰太陽病若吐若下若發汗後微煩小便數大便因硬者與小承氣湯和之愈又曰得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯又曰傷寒六七日千金作七八日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜大承氣湯又曰陽明病發熱汗多者急下之宜大承氣湯一云大柴胡湯又曰發汗不解腹滿痛者急下之宜大承氣湯又曰腹滿不減減不足言當下之宜大承氣湯又曰陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也又曰脈滑而數者有宿食也當下之宜大承氣湯雍曰此本文與前證相連恐是合病脈滑數者更詳之又曰病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血也宜抵當湯又曰若脈數不解而下不止必協熱而便膿血也常氏云可白頭翁湯千金方通前證合為一證又曰傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之常氏云可五苓散又曰傷寒七八日身黃如桔子色小便不利腹微滿者茵陳蒿湯主之又曰傷寒身黃髮熱梔子柏皮湯主之又曰傷寒瘀熱在裡身必發黃麻黃連軺赤小豆湯主之少陽經證治十一條仲景曰脈尺寸俱弦者少陽受病也當三四日發其脈循脅絡於耳故胸脅痛而耳聾三陽皆受病未入於府者可汗而已又曰少陽之為病口苦咽乾目眩也又曰少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚龐氏云可小柴胡湯常氏云吐下驚而悸者可桂枝去芍藥加龍骨牡蠣湯雍曰此證當服柴胡加龍骨牡蠣湯用桂枝非也又曰傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸一作躁龐氏云多少陽者宜調胃承氣湯此屬少陽陽明證少陽宜和表鮮有汗證仲景少陽和表宜小柴胡湯又曰本太陽病不解轉入少陽脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯龐氏云脈緊者與小柴胡加牡蠣湯又曰若已吐下發汗溫針讝語柴胡湯證罷此為壞病知犯何逆以法治之龐氏曰犯何逆犯四溫病壞病也雍曰千金方通前合為一證則小柴胡首尾備見為當溫針譫語亦宜桂枝甘草龍骨牡蠣湯又曰三陽合病脈浮大上關上但欲眠睡目合則汗常氏云可柴胡桂枝湯龐氏云不言弦者隱於長大也又曰傷寒六七日無大熱其人躁煩者此為陽去入陰故也常氏云可八石散茯苓湯龐氏云四五日或七八日又云傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也龐氏云病到陰必吐利也又曰傷寒三日少陽脈小者欲已也龐氏云謂小而平勻也又曰少陽病欲解時從寅至辰上
