body:
  text: 卷十不可下四十七條仲景曰脈濡而弱弱反在關龐云關下三分也濡反在巔關上三分也微反在上寸脈也澀反在下尺部也微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微不可下下之則心下痞硬龐氏以氣血俱不足用小建中湯常氏云下後心下痞硬用增損理中丸又曰動氣在右不可下下之則津液內竭咽燥鼻乾頭眩心悸也龐氏以咽燥鼻乾宜竹葉湯又曰動氣在左不可下下之則腹內拘急食不下動氣更劇雖有身熱臥則欲蜷龐常皆云先服乾薑甘草湯後服小建中湯又曰動氣在上不可下下之則掌握熱煩身上浮冷熱汗自泄欲得水自灌常氏云宜小建中湯又曰動氣在下不可下下之則腹脹滿卒起頭眩食則下清穀心下痞也龐氏云心下痞宜半夏瀉心湯又曰咽中閉塞不可下下之則上輕下重水漿不下臥則欲蜷身急痛下利日數十行常氏云咽中閉塞可烏扇煎下利宜四逆散又曰諸外實者不可下下之則發微熱亡脈厥者當臍握熱雍曰宜服去白朮理中湯以術利腰臍間血故也又曰諸虛者不可下下之則大渴求一作引水者易愈惡水者劇雍曰宜小建中湯又曰脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛虛者不可下也微則為咳咳則吐涎下之則咳止而利因不休利不休則胸中如蟲齧粥入則出小便不利兩脅拘急喘息為難頸背相引臂則不仁極寒反汗出身冷若冰眼睛不慧語言不休而穀氣多入此名除中一云消中口雖欲言舌不得前雍曰此不治之證故諸家無治法龐氏云諸脈濡弱微虛細相搏俱不可下又曰脈濡而弱弱反在關濡反在巔浮反在上數反在下浮為陽虛數為亡血浮為虛數為熱浮為虛自汗出而惡寒數為痛振寒而慄微弱在關胸下為急喘汗而不得呼吸呼吸之中痛在於脅振寒相搏形如瘧狀醫反下之故令脈數發熱狂走見鬼心下為痞小便淋瀝小腹甚硬小便則尿血也常氏云可小柴胡湯鵲石散延胡索散又曰脈濡而緊濡則衛氣微緊則營中寒陽微衛中風發熱而惡寒營緊胃氣冷微嘔心內煩醫為有大熱解肌而發汗亡陽虛煩躁心下苦痞堅表裡俱虛竭卒起而頭眩客熱在皮膚悵怏不得眠不知胃氣冷緊寒在關元技巧無所施汲水灌其身客熱應時罷慄慄而振寒重被而覆之汗出而冒巔體惕而又振小便為微難寒氣因水發清穀不容間嘔變反腸出顛倒不得安手足為微逆身冷而內煩遲欲從後救安可復追還常氏云可灸關元雍曰仍服通脈四逆湯又曰脈浮而大浮為氣實大為血虛血虛為無陰孤陽獨下陰部者小便當赤而難胞中當虛今反小便利而大汗出法應衛家當微今反更實津液四射營竭血盡干煩而不得眠血暴肉消而成暴液暴液一作黑液醫復以毒藥攻其胃此為重虛客陽去有期必下如汙泥而死常氏云可小建中湯已經下者不治又曰脈浮而緊浮則為風緊則為寒風則傷衛寒則傷營營衛俱病骨節煩疼當發其汗而不可下也常氏云可桂枝麻黃各半湯雍曰仲景可汗證中只用麻黃湯又曰趺陽脈遲而緩胃氣如經也趺陽脈浮而數浮則傷胃數則動脾此非本病醫特下之所為也營衛內陷其數先微脈反但浮其人必大便硬氣噫而除何以言之本以數脈動脾其數先微故知脾氣不治大便硬氣噫而除今脈反浮其數改微邪氣獨留心中則飢邪熱不殺穀潮熱發渴數脈當遲緩脈因前後度數如法病者則飢數脈不時則生惡瘡也常氏云可小柴胡湯惡瘡漏蘆湯又曰脈數者久數不止止則邪結正氣不能復正氣卻結於臟故邪氣浮之與皮毛相得脈數者不可不下之必煩利不止常氏云可柴胡桂枝湯又曰少陰病脈浮不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之雍曰宜建中湯又曰脈浮大應發汗醫反下之此為大逆雍曰誤下宜四味理中丸誤下則中氣受傷故用是湯又曰脈浮而大心下反硬有熱屬臟者攻之不令發汗屬腑者不令溲數溲數則大便硬汗多則熱愈汗少則便難脈遲尚未可攻常氏云可小柴胡湯雍曰此一證中有誤字脈經云攻之不令微汗屬腑溲數則堅汗多則愈汗出小便難文皆有誤不能通又曰二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽證不罷者不可下下之為逆常氏以太陽證不罷宜柴胡桂枝湯又曰結胸證脈浮大者不可下下之則死常氏云可小陷胸湯增損理中丸聖餅灸法又曰太陽與陽明合病喘而胸滿者不可下常氏云可麻黃杏子甘草石膏湯又曰太陽與少陽並病心下硬頸項強而眩者不可下常氏云可小柴胡湯雍曰仲景刺大椎肺俞肝俞見太陽證中又曰諸四逆厥者不可下之虛家亦然常氏云可當歸四逆湯龐氏云若下證悉見四逆者是失下後氣血不通使然但手足微厥掌心常溫時復指稍溫即可下之勿拘忌也又曰病欲吐者不可下常氏云可半夏加橘皮湯又曰太陽病有外證未解不可不下之為逆常氏云可桂枝麻黃各半湯雍曰依可汗證中用桂枝二麻黃一湯又曰病發於陽而反下之熱入因作結胸病發於陰而反下之一作汗之宮本及脈經皆作下之因作痞常氏云結胸可大陷胸湯痞可半夏瀉心湯又曰病脈浮而緊而復下之緊反入里則作痞常氏云可小陷胸湯瀉心湯雍曰宜半夏瀉心湯又曰夫病陽多者熱下之則硬常氏云可小柴胡湯又曰其人本虛攻其熱必噦雍曰宜半夏生薑湯類要四味橘皮湯又曰無陽陰強大便硬者下之必清穀腹滿常氏云可蜜煎導之又曰太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬常氏云可桂枝加芍藥湯胸下結硬者增損理中丸又曰厥陰之為病消渴氣上撞心心中疼熱飢不欲食食則吐蛔下之利不止常氏云下之利不止宜四逆湯余見厥陰本證又曰少陰病飲食入口則吐心中溫溫欲吐始得之手足寒脈弦遲者此胸中實不可下也常氏云飲食入口則吐可瓜蒂散余見少陰本證又曰傷寒五六日不結胸腹濡脈虛復厥者不可下此亡血下之死常氏云可小建中湯已下不治又曰傷寒發熱頭痛微汗出發汗則不識人熏之則喘不得小便下之則短氣小便難頭痛背強加溫針則衄常氏云可小柴胡湯已汗者桂枝加附子湯汗出而喘者麻黃甘草杏子石膏湯已下者五苓散加溫針者芍藥地黃湯又曰傷寒脈陰陽俱緊惡寒發熱則脈欲厥厥者脈初來大漸漸小更來漸大是其候也如此者惡寒甚者翕翕汗出喉中痛若熱多者目赤脈多睛不慧醫復發之咽中則傷若復下之則兩目閉寒多便清穀熱多便膿血若熏之則身發黃若熨之則咽燥若小便利者可救之若小便難者為危殆常氏云初證宜桂枝麻黃各半湯喉中痛桔梗湯熱多小柴胡湯便清穀理中丸便膿血桃花湯身發黃茵陳蒿湯小便難者豬苓湯又曰傷寒發熱口中勃勃氣出頭痛目黃衄不可制貪水者必嘔惡水者厥若下之咽中生瘡假令手足溫者必下重便膿血頭痛目黃者若下之則兩目閉貪水者若下之其脈必厥其聲嚶咽喉塞若發汗則戰慄陰陽俱虛惡水者若下之則里冷不嗜食大便完穀出若發汗則口中傷舌上白苔煩躁脈數實不大便六七日後必便血若發汗則小便自利也常氏曰若熱衄不可制者芍藥地黃湯水逆者五苓散便膿血桃花湯咽中生瘡白礬甘草散陰陽俱虛小建中湯里冷不嗜食理中湯發熱身黃梔子柏皮湯餘證小柴胡湯汗出小便數甘草乾薑湯又曰得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少和之令小安至六日與大承氣一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之龐氏曰尺下弱小便不利或尚少皆未可攻又曰臟結無陽證不往來寒熱或寒而不熱其人反靜舌上苔滑者不可攻也常氏云可刺關元穴在臍下又曰可刺大赫在腹部第二行雍曰灸尤奇又曰傷寒嘔多雖有陽明證不可攻之雍曰不可攻之恐厥逆也可小半夏加茯苓湯生薑橘皮湯又曰陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎也乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者大便復硬而少宜小承氣湯和之不轉失氣者慎不可攻也又曰傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也屬甘草瀉心湯又曰下利脈大或浮大者虛也以強下之故也設脈浮革因爾腸鳴屬當歸四逆湯又曰陽明病面合色赤不可攻之攻之必發熱色黃小便不利也常氏云可五苓散又曰陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈常氏云心下硬滿者可半夏瀉心湯已攻而利者四逆湯又曰陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜導而通之若土瓜根及豬膽汁皆可為導龐氏曰不當下而強下之令人腸胃洞泄不禁而死可下四十八條仲景曰大法秋宜下又曰凡服下藥宜用湯勝丸散中病便止不必盡劑也又曰陽明病發熱汗多者急下之宜大柴胡湯龐氏云發熱不惡寒汗多又曰少陰病得之二三日口燥咽乾者急下之宜大承氣湯又曰陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也龐氏曰陽明土其脈大少陽木其脈弦若合病土被木賊加之以利則胃已困矣若脈不弦為土不負弦者為土負必死雍曰此合病一證下至名為負也而終按本論原誤錄宿食一證相連非也脈經以宿食別作一證為當蓋脈滑數有宿食故仲景可用承氣湯若胃為木克困而下利安有用承氣之理今依脈經離而為二宿食證依仲景用承氣湯惟合病下利闕治法今以負為不治不負宜理中丸厥者宜四逆湯仍瀉邱虛陽陵泉補三里穴龐朱二氏依舊本合為一證疑其非大抵讀仲景論仍須以脈經參校之又曰少陰病下利清水色純青心下必痛口乾燥者可下之宜大柴胡湯大承氣湯余見少陰本證更詳之又曰下利三部脈皆平按之心下硬者急下之宜大承氣湯龐氏曰凡脈沉細數為熱在裡又兼腹滿咽乾或口燥舌乾而渴者或六七日不大便小便自如或目中瞳子不明無外證者或汗後脈沉實者或下利三部脈皆平按之心下堅者或連發汗不惡寒者或已經下其脈浮沉按之有力者皆宜大承氣湯又曰下利脈浮而滑者內實也利未欲止當下之宜大承氣湯雍曰常氏疑本論之誤故欲以葛根黃芩治下利殊不思仲景以承氣下宿食而合病下利原無治法也葛根黃芩湯以太陽表未解誤下之利不止者既有協熱下利之表證未退故可用今合病下利胃氣傷困只當救胃宜用溫藥故雍以四逆理中補其法胃氣已負而又加以寒藥則胃谷絕矣仲景於此一證特論脈負不負蓋欲後人當思陽阻少陽土木克賊之理而治之可謂盡善矣以是知合併病之論雖二陽俱受病邪氣俱當去又須審二經五行之氣毋令相剋賊抑強扶衰以致和氣不使復生一秦助桀為虐也如是則胡越可同舟而共濟矣此證和二經退邪氣與人事不少異非天下至精孰能與於此然生胃氣制少陽木亦用金石藥嘗見名醫治少陰自汗自利不止用金液丹取大效既非古藥不敢以為然必不得已而用亦須七煉九煉火力重者用之其一煉火力輕者復可下宿食以虛人老人不敢用承氣也仲景問曰人病有宿食何以別之師曰寸口脈浮而大按之反澀尺中亦微而澀故知有宿食當下之宜大承氣湯又曰下利不欲食者以有宿食故也當下之宜大承氣湯又曰下利瘥至其年月日時復發者以病不盡故也當下之宜大承氣湯又曰病腹中滿痛者此為實也當下之宜大承氣湯大柴胡湯又曰下利脈反滑當有所去下之乃愈宜大承氣湯又曰腹滿不減減不足言當下之宜大柴胡湯大承氣湯雍曰減不足言者言不甚減也論言太陽發汗不徹不足言與此同意俗語所謂不濟事者是也又曰傷寒後脈沉沉者內實也下之解宜大柴胡湯雍曰須沉數有力可下之雖沉而微弱遲皆不可下也又曰傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜大承氣湯大柴胡湯又曰太陽病未解脈陰陽俱停必先振慄汗出而解但陰脈微一作尺脈實者下之而解宜大柴胡湯一法用調胃承氣湯脈經云但陰微者先下之而解龐作陰實雍曰文當從脈經及龐氏當作但陰脈微而尺脈實者先下之而解又曰脈雙弦而遲者必心下硬脈大而緊者陽中有陰也可下之宜大承氣湯又曰結胸者項亦強如柔痓狀下之則和龐氏云宜大陷胸丸又曰病人無表裡證發熱七八日雖脈浮數者可下之宜大柴胡湯又曰太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿而小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也宜下之以抵當湯又曰太陽病身黃脈沉結少腹硬滿小便不利者為無血也小便自利其人如狂者血證諦也屬抵當湯又曰傷寒有熱少腹滿應小便不利今反利者為有血也當下之宜抵當丸又曰陽明病發熱汗出者此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴飲水漿者以瘀熱在裡身必發黃宜下之以茵陳蒿湯雍曰先服茵陳五苓散黃退則不須更下又曰陽明證其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯又曰汗出而譫語者以有燥屎在胃中此為風也須下者過經乃可下之下之若早語言必亂以表虛里實故也下之愈宜大柴胡湯大承氣湯又曰病人煩熱汗出則解復如瘧狀日晡所發熱者屬陽明也脈實者可下之宜大柴胡湯大承氣湯又曰陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬耳屬大承氣證又曰下利譫語者有燥屎也屬小承氣湯初一服譫語止若更衣者停後服不爾盡與之又曰得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏此未成硬也攻之必溏須小便利屎定硬乃攻之宜大承氣湯又曰太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也屬十棗湯又曰太陽病不解熱結膀胱其人如狂血自下者愈其外未解尚未可攻當先解其外外解已但少腹急結者乃可攻之宜桃核承氣湯龐云不惡寒為外解又曰傷寒七八日身黃如橘子色小便不利腹微滿者屬茵陳蒿湯又曰傷寒發熱汗出不解心下痞硬嘔吐而利者屬大柴胡湯又曰傷寒十餘目熱結在裡復往來寒熱者屬大柴胡湯又曰但結胸無大熱者以水結在胸脅也但頭微汗出者屬大陷胸湯又曰傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者屬大陷胸湯又曰陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語屬小承氣湯又曰陽明病不吐不下心煩者屬調胃承氣湯又曰陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然汗出者此大便已硬也大承氣湯主之若汗出多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者與小承氣湯微和其胃氣勿令大泄下又曰陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎也乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者大便必復硬而少也宜小承氣湯和之不轉失氣者慎不可攻之雍曰不轉失氣者勿服藥待一晝夜熱氣不發泄定成硬屎然後可攻又曰陽明病譫語發熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣者勿更與之明日又不大便脈反微澀者裡虛也為難治不可更與承氣湯常氏云可人參黃耆建中湯又曰二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯又曰病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也屬大承氣湯又曰大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也屬大承氣湯龐氏曰脈朝夕快者實癖也可下之朝平夕快者非癖也不可下快謂數脈六七至者也若脈數一息八九至切不可下若下之則煩躁下利不止而死脈數與皮毛相得亦不可下也雖數為虛客熱又曰合下不下令人腹脹滿通身浮腫而死雍曰凡汗下皆不宜太過故汗下後易將理若汗下太過則病人虛難將理易勞復凡用大承氣亦宜消息用調胃承氣代之蓋仲景自有承氣之戒故也
