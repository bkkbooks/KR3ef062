body:
  text: 卷十七痓濕暍敘論一條仲景曰傷寒所致太陽病痓濕暍三種宜應別論以為與傷寒相似故此見之雍曰自此以下二卷皆論似傷寒非傷寒之疾痓濕暍蓋其首也三者皆在太陽一經與傷寒為難辨故仲景論於傷寒之先以不能先別此三者則必不能辨傷寒也孫真人亦同此言近世方論列於雜病疑似諸疾之中然疑似諸病非太陽所感所以仲景獨先痓濕暍者為其與傷寒同為一經根源不異症亦多同誤治則殺人是以不得不先之今討論既詳復恐亂傷寒症治之法不免依近世所述與霍亂等項別為一卷其疑似諸疾又附之後卷庶幾有所區別乎痓痙二十六條雍曰先兄子若明醫道常疑醫經中痓痙二字當只是一字傳寫之誤蓋漢晉之書皆作痓如仲景言結胸病項亦強如柔痓狀千金載之曰項亦強如柔痙狀其二字傳寫之誤明矣然素問靈樞二經亦有痓痙一病不同則自仲景以來諸書皆有當為痓當為痙者後世傳録者俱不復辨別也政和間先人客京師有家人病招東平劉寅診視劉曰此痓病也治之愈因問痓痙之別劉曰病以時發者謂之痙不以時發者謂之痓後歸洛有兄病傷寒汗後以時作痙者先兄因劉醫語用龐氏葛根加麻黃湯治之而愈劉醫之言不見於諸書東平昔多名醫必有由來後雍頗讀醫經始悟劉醫之言雖當而不盡也蓋二字之誤固多有之在漢晉之書中有當為痓者亦有當為痙者在隋唐之書中亦有當為痓當為痙者方知痓痙必竟二字蓋痓者病名如曰中風傷寒之類也痙者症名如結胸痞氣之類也如此言痓濕暍三病則痓是病名不可作痙也倉公當歸湯方云主賊風口噤角弓反張痙者則是痙病中一症之名不可作痓也蓋痙是經脈與筋強直反張之病故為病中之一症所以諸風有痙傷寒亦有痙痓病之中亦有痙不痙者大抵痓為輕痙為重痓而又痙者尤為重劉氏雖不分病名與症名有異而痓病不以時發故有纍日不知人事者痙病則隨發隨止孫真人所謂須臾有十數發者則又與病以時發不以時發之言相應也故雍謂痓病名痙症名者究其源也劉謂以時發不以時發者別其流也活人書又曰陰陽二痓者此言非古恐出於後世雍以意度之剛痓之痓名陽痓柔痓之痓名陰痓朱氏雖言陰陽二痓而終不明辨第曰陽痓屬剛陰痓屬柔而已其症與藥俱不詳言之仲景曰太陽病脈沉而細者名曰痓又曰太陰病發熱無汗反惡寒者名曰剛痓又曰太陽病發熱汗出而不惡寒名曰柔痓巢氏曰柔痓惡寒雍曰詳剛痓即與太陽傷寒症同柔痓即與太陽中風症同然傷寒脈浮緊中風脈浮緩痓病脈沉細當以脈別之又曰病身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨頭動搖卒口噤背反張者痙病雍曰此病為痓症字誤問曰痓病何由而感也素問三十七篇曰肺移熱於腎傳為柔痓仲景曰太陽病發汗太多因致痓又曰瘡家雖身疼痛不可發汗汗出則痓在叔和曰風病下之痓復發其汗必拘急此皆致痓之由也千金曰先因傷風後感寒濕則致痓故柔痓亦有不惡寒而惡風者問曰痓脈如何仲景曰脈沉而細叔和曰其脈伏堅直上下又曰脈來按之築築而弦直上下行巢氏曰策策而弦直上下行者風痓脈也伏堅直上下痓而加痙之脈也築築而弦策策而弦皆病脈築策亦疑一字誤問曰治痓如何叔和曰太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痓葛根湯主之雍曰叔和既論治剛痓次當言柔痓今乃不言及再論剛痓為病胸滿口噤臥不著席腳攣急其人必齘齒可與大承氣湯雍以仲景傷寒本論無此一症故疑此亦非叔和之言誤從之殺人大承氣湯的非治剛痓之藥縱是諸痓皆不可用蓋痓太陽中風再感寒濕之疾太陽屬表中風在表及寒濕之疾皆不可下其脈沉細伏弦亦不可下今又言胸滿非寒則虛痞口噤臥不著席又太陽中風之症腳攣急者腳蜷也胞中有寒也皆不當行承氣湯用之必死龐朱二氏不明改之去之者意其是叔和之言不敢削也朱氏之言加審之二字蓋亦有疑矣嘗見庸愚下此以殺人知而不言不為無罪然則柔痓用何藥以治之曰龐氏治剛柔痓加減葛根麻黃湯痓無汗者加麻黃痓自汗者去麻黃加葛根朱氏治柔痓以桂枝加葛根湯皆其藥治切當者也王叔和曰太陽病其症備身體強𠘧𠘧然脈反沉遲此為痓栝蔞桂枝湯主之龐氏曰栝蔞不主項強𠘧𠘧其意以治肺熱令不移於腎也桂枝湯內加栝蔞四兩雍曰審如龐言則移熱之痓乃柔痓也獨未知瘡家風家二痓亦同治乎更當審其症而用之常見太陽傷寒出汗多致痓服此亦愈千金曰其重者患耳中策策痛此風入腎經中也不治流入腎喜卒然體痙直如此皆服小續命湯兩三劑雍曰亦須無汗乃可服又曰針耳前動脈及風府神良雍曰二穴亦難取動脈在客主人之下誤刺陷脈則為內漏為聾風府在腦戶喑門之間誤刺亦死一喑門風府又禁不可刺能者互審之又曰剛柔痓宜加減葛根麻黃湯痓自汗者去麻黃更加葛根雍曰此湯諸家未見惟龐氏載之又曰痓病不宜大發汗及針灸宜小汗之叔和曰痓病有灸瘡難療雍曰大抵瘡家忌灸惟孫真人云若耳痛腫生汁作癰癤者乃無害也惟風宜防耳此定為耳能泄腎氣故也痙亦同活人書云柔痓桂枝加葛根湯主之雍曰此即仲景治太陽病有汗之藥朱氏以叔和缺治痓藥故取而用之若然則剛痓正宜用龐氏葛根麻黃也又朱氏論二痓取千金說云並宜服小續命湯此皆可為定法其熱甚而欲移於腎者必加痙宜以叔和桂枝加栝蔞湯主之叔和曰痓病發其汗已其脈浛浛如蛇暴腹脹大者為欲解也其脈如故反伏弦者必痓既曰痓病又曰必痓何也雍曰必痓當作必痙則義通也此謂痓病加痙者也問曰痓病其詳何如孫真人曰太陽中風重感於寒濕則變痓痓者口噤不開背張而直如發癇之狀搖頭馬鳴腰反折須臾十數發氣息如絲汗出如雨時有脫易得之雍曰此即正謂之痙也痙同他病而有初無本病或因中風而痙或因傷寒而痙或因痓而加痙其用藥皆相類大抵葛根續命也問曰婦人小兒多作痓何也孫真人曰新産婦人及金瘡血脈虛竭小兒臍風大人濕溫得痙風者皆死又熱病熱入腎中為痓小兒病癇熱甚亦為痓雍曰此二者可治之痓也問曰風喑似痙何如孫真人曰凡風喑暴尸厥及鬼魘不寤久厥或癲皆與痙相類宜精察之雍曰風喑暴尸厥鬼魘不寤皆冥冥不知人皆似痓癲癇似痙賊風口噤而痙者為風痙也倉公當歸湯主之龐氏曰痓病臥不著席小兒腰背去席二指大人身側掌為難治雍曰難治尚可治非不治也痓雖強直不至加痙則幸矣亦見有反張過掌而愈者嘗見口噤似痙略知人事但坐而順掣腰脊仰倒者亦風痓也服倉公當歸湯而愈問曰痓痙二字相混以經別之何如雍曰素問四十五篇曰手陽明少陽厥逆發喉痹嗌痛腫痙此非足太陽之疾而言痙故全元起本作痙蓋諸經有痙獨足太陽有痓也問曰巢氏分風痓傷寒痓何也雍曰靈樞云熱病不可刺者九二曰熱而痙者死腰折瘛瘲噤齘也此傷寒痓也又曰風痙身反折見取足太陽及膕中及血絡出血此風痓也靈樞有痓二故巢氏亦分二痓嘗見熱病汗後發痓亦服桂枝加栝蔞湯而愈經言熱而痓者死必謂未汗而痓其熱甚有異耳雍曰龐氏言若汗出太多因而熟寐汗為冷濕之氣復著太陽經故發痓朱氏言先因傷風後感寒濕而致痙二者皆謂先因病變而為痓者皆痙之一症如前仲景言太陽病發熱無汗反惡寒發熱汗出不惡寒者乃痓之正病也朱氏又曰朮附散桂心白朮湯附子防風散八味白朮散桂枝煮散可選而用之其感疾既非一端固當依症選用也然痓痙二病終緣二字差誤諸書鮮有曉然無疑者所以近世無端確之論幸而用藥二病不甚相遠不然大誤也雍深取朱氏治柔痓用桂枝加葛根湯龐氏治剛痓用葛根加麻黃湯叔和治太陽病欲作剛痓用葛根湯熱甚而痓用栝蔞桂枝湯大抵皆宜續命湯而千金以此治痙朱氏以治二痓不同此復不須疑痓痙皆用惟無汗者可用也雍曰二病亦多有之各為傷寒治或為風治故不愈風猶近之而未的也雍親見者數人略言其狀一人初如傷寒三數日後冥冥不知人亦似柔軟不甚強直惟忘記口噤不口噤雍謂此痓也又一人初亦如傷寒數日後時作角弓反張作則口噤不知人罷則略知人而困雍謂此痙也又有傷寒汗後方坐談語次忽瞪目口噤雖坐如故而四肢僵硬不可屈折少頃即罷罷而復作正所謂須臾數十發者罷則言語如故雍謂此緣出汗多所致傷寒痙也時服桂枝栝蔞而愈又一兒如傷風一二日後不知人冥冥臥不語不食此痓也忽四肢強直口噤手足皆如策腫手足指皆走皮開少頃即定復稍柔但冥冥然雍謂此為痓病而加痙者也又一村人病二三日後口噤身強直反張覺臂腿長於常日略知人事齒縫中能作聲不甚明曉飲冷水反要火炙尋衣縫摸床撮空無所不至其症甚怪時雍思之只是痙用大岩蜜湯擦其齒須臾口得開數進續命湯遂愈村人耐疾使富貴安得不死又一家父子閉戶坐不出門人云患鎖牙風使偵之父子對坐各用兩手板面前一橫木少頃病來則兩手俱脫偃仆後蘇而復坐父子更起更偃仆以倉公當歸湯主之其子遂愈父羸老不救問風來之狀則自足起循太陽經而上過膕中至股分兩支一支循股外而上入腰則猛掣便側起一支循股內而上入少腹考之於經太陽無此別支應是入少陰也又有一人行次仰面顧者三衆謂仰面有所視少頃即倒舁歸反張數日而沒此疾症甚不一亦有間者不能具記歷驗之痓似微柔軟發痙則極強硬前人敘此未能盡雍雖加詳而次第紊亂耳濕病十八條雍曰活人書載濕病三種一曰中濕二曰風濕三曰濕溫問曰何謂中濕仲景曰太陽病關節疼痛而煩脈沉而緩者朱氏云一作細者非也此名濕痹一雲中濕濕痹之候其人小便不利大便反快當利其小便朱氏曰一身盡疼發熱身黃小便自利者朮附湯小便不利大便反快者甘草附子湯五苓散主之又曰至真要論曰治濕之法不利小便非其治也問曰中濕之痹何如雍曰中濕與風寒氣合者為痹故素問曰風寒濕三氣雜至合而為痹靈樞所謂風寒濕氣客於外分肉之間朱氏曰中濕與風寒氣合者為痹其寒多者為痛為浮腫非朮附桂不能去也其風多者為煩劇為流走為拘急非麻黃薏苡烏頭不能散也其中濕氣者為堅滿為氣閉非甘遂葶藶枳朮不能泄也問曰何謂風濕仲景曰一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也金匱要略曰可與麻黃杏子薏苡甘草湯朱氏曰脈浮為風濕麻黃杏仁湯防已黃耆湯桂枝附子湯甘草附子湯朮附杏仁湯敗毒散可選而用之仲景問曰風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也金匱要略曰濕家身煩疼可與麻黃湯加朮四兩發其汗為宜切不可以火攻之朱氏曰濕家雖身體疼不可大發汗汗出則作痓又曰風濕脈浮身重汗出惡風者防己黃耆湯主之仲景曰風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之千金方名四物附子湯又曰傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便硬小便自利者去桂枝加白朮湯主之龐氏云桂枝附子湯治大便自利小便不利者雍曰桂枝附子湯非桂枝加附子也自是第十七方名桂附湯者詳見太陽症治上仲景曰濕家其人但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利舌上如苔者以丹田有熱胃中有寒渴欲得水而不能飲口燥煩也又曰濕家之為病一身盡疼發熱身色如熏黃龐氏曰宜防已黃耆湯又曰濕家病身上疼痛發熱面黃而喘脈經曰病人喘無而字以上十二字頭痛鼻塞而煩其脈大自能飲食腹中和無病痛在頭中寒濕故鼻塞納藥鼻中則愈龐氏曰用瓜蒂細末含水搐少許於鼻中又曰濕家下之額上汗出微喘小便利者一云不利者死若下利不止者亦死雍曰大抵濕家不可下也初虞氏曰發汗下之死謂誤作傷寒治而汗下之也問曰中濕風濕脈何以辨雍曰脈沉而緩者曰中濕脈浮惡風者曰風濕中濕無風脈故也問曰何謂濕溫王叔和曰傷寒濕溫其人常傷於濕因而中暍濕熱相搏則發濕溫病苦兩脛逆冷腹滿支胸頭目痛苦妄言治在足太陰不可發汗汗出不能言耳聾不知痛所在身黃而色變名曰重暍如此死者醫殺之也朱氏曰濕溫多汗頭目痛苦妄言其脈陽濡而弱陰小而急治在足太陰經余上下文同雍曰白虎加蒼朮湯主之活人書載中濕風濕濕溫三種之外尚缺寒濕痹今續附於後濕痹謂緩風濕痹亦云濕風非風溫也仲景曰傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之常氏云可五苓散雍曰濕病汗不出者寒濕在裡不解也凡濕家發黃者宜五苓散又曰濕家病在頭中寒濕則頭痛鼻塞而煩內藥鼻中則愈其詳見上千金方曰濕痹緩風身體疼痛如欲折如錐刺刀剜七物附子湯主之又曰濕風體痛如折肉如錐刺刀所刺八物附子湯中暍六條仲景曰太陽中熱者暍是也其人汗出惡寒身熱而渴也金匱要略曰白虎加人參湯主之雍曰亦有惡風者謂汗太多也又曰太陽中暍者身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也要略曰瓜蒂散主之又曰太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚龐氏曰宜大小橘皮湯大橘皮湯治動氣在下不可發汗者小橘皮湯主手足逆冷嘔噦即二味生薑橘皮湯問曰中暑中暍熱病何以別之雍曰冬傷於寒因暑氣而後發者為熱病冬不傷於寒而夏傷於暑為中暑中暑即中暍也皆太陽經受病故熱病正為傷寒而中暑為與傷寒相似活人書曰夏月發熱惡寒頭疼身體肢節痛重其脈洪盛者熱病也夏月自汗惡寒身熱而渴其脈微弱者中暑也大抵中暑與熱病外症相似但以脈盛脈虛別之甲乙經云脈盛身寒得之傷寒脈虛身熱得之傷暑蓋寒傷形而不傷氣所以脈盛熱傷氣而不傷形所以脈虛傷寒肢節痛重其脈洪盛按之有力此冬月感寒深至夏發耳中暑則背寒面垢手足微冷煩渴口燥但覺倦怠四肢卻不痛重其脈微弱按之無力白虎湯主之其厥逆惡寒者橘皮湯主之頭痛惡寒心煩躁心下不快者五苓散為最良問曰中暑何故灑灑然毛聳惡寒朱氏云經曰四時八風之中人也因有寒暑寒則皮膚急腠理閉暑則皮膚緩腠理開開則灑然寒閉則熱而悶近人不問中熱暑或作熱病法治之復用溫熱藥必致發黃斑出更為蓄血尤宜戒之問曰熱病暑病暍病三者異名諸家不分何如雍曰熱病亦可謂之暑暍病亦可謂之暑故時言熱亦時言暑其始則當有熱暍二病以其通可謂之暑故有三名是以難別素問曰熱病者皆傷寒之類也以熱而言也又曰先夏至日為病溫後夏至日為病暑此以暑而言也二者其實一也仲景叔和曰中而即病者名曰傷寒不即病者至春變為溫病至夏變為暑病又曰辛苦之人春夏多溫熱病此一病或言暑或言熱也是以巢氏於傷寒之外別出熱病一門而首曰暑病者熱重於溫也是熱病亦謂之暑也龐安常復出暑病一篇而取之實傷寒之熱病又二家所載皆以素問五臟熱病為主是名同而實異也惟朱氏分別熱病與中暑不相差互然朱氏所謂熱病者傷寒也所謂中暑即暍者是也其意易明不令人惑當從朱氏名之其他諸家所論亦未嘗不同名特異耳霍亂二十六條仲景問曰病有霍亂者何答曰嘔吐而利此名霍亂問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂吐利而復發熱也一作自吐下又利止復更發熱雍曰此論霍亂似傷寒之症也又曰傷寒其脈微澀者本是霍亂今是傷寒卻四五日至陰經上轉入陰必利一作吐利本嘔下利者不可治也欲似大便而反失氣仍不利者此屬陽明也便必硬十三日愈所以然者經盡故也下利後當便硬硬則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也惡寒脈微而一作緩復利利止亡血也四逆加人參湯主之雍曰此論今是傷寒之症故言本嘔下利不可治若論霍亂則必嘔吐而利也一是傷寒而不屬陽明惡寒脈微復利利止者則用四逆加人參湯主之此湯若霍亂症亦可服千金翼合二論為一是當經有缺文問曰霍亂何由而致也雍曰胸中逆亂之氣也初無疾而霍亂往往飲食失節而致胸中逆亂也故傷寒而霍亂者陰陽二氣亂於胸中也靈樞三十四篇曰清氣在陰濁氣在陽營氣順脈衛氣逆行清濁相干亂於胸中是為大悗又曰亂於腸胃則為霍亂經言五亂霍亂其一也惟亂於胸所以吐亂於腸所以利也孫真人曰飲食㹠獪復食乳酪海陸百品無所不啖眠臥冷席多飲寒漿胃中諸食結而不消陰陽二氣壅而伏痰陽氣欲升陰氣欲降陰陽乖隔變成吐利頭疼如破百節如解遍體諸筋皆為回轉論時雖小卒病之中最為可畏雖臨履薄危不足論也故古人語此者刺之則徐出徐入導氣而已非補瀉也用藥者順其陰陽之氣而已無汗下也此伏治亂氣之道仲景曰霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之又曰吐利止而身痛不休者當消息和解其外宜桂枝湯小和之又曰吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之又曰既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之又曰吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之千金翼曰無豬膽以羊膽代之千金方別有加減法又曰吐利發汗脈平小煩者以新虛不勝穀氣故也雍曰勿服藥損谷則愈叔和曰轉筋為病其人臂腳直脈上下行微弦轉筋入腹雞屎白散主之千金要方曰凡霍亂務在溫和將息若冷則遍體轉筋凡此病定一日不食為佳仍須三日少少飲粥三日以後可恣意食息七日勿雜食為佳所以養脾氣也又曰凡諸霍亂忌與米飲胃中得米即吐不止但與厚朴葛根飲若冬瓜葉飲但沾漬咽喉而不可多與若服湯時隨吐者候吐定乃止診脈絶不通以桂合葛根為飲吐下心煩內熱汗不出不轉筋脈急數者可犀角合葛根為飲吐下不止發汗心煩欲飲水可少飲米粉汁為佳若不止可與葛根薺苨飲服之又曰霍亂吐多者必轉筋不渴即臍上築霍亂而臍上築者為腎氣動當先治其築治中湯主之去朮加桂心去朮者以腎虛故也加桂者恐作奔豚也霍亂而臍上築吐多者若下多者霍亂而驚悸霍亂而渴霍亂而腹中痛嘔而吐利嘔而利欲得水者皆用治中湯主之又曰治中湯治霍亂吐下脹滿食不消化心腹痛又曰霍亂轉筋肉冷汗出嘔噦者四順湯主之又曰霍亂多寒手足厥冷脈絶者宜當歸四逆加吳茱萸湯舊方用棗三十枚今以霍亂病法多痞故除之如退棗入葛根二兩佳霍亂四逆湯加半夏一合附子小者一枚惡寒乃與大附子朱氏無此加減故詳録之又曰霍亂吐利已服理中四逆四順熱不解者竹葉湯主之與竹葉石膏湯方不同又曰毒冷霍亂吐利煩嘔轉筋肉冷汗出手足指皆腫喘息垂死絶語音不出百方不效脈不通者服人參湯取瘥乃止隨吐續更服勿止並灸之又曰老人羸劣冷氣噁心飲食不化心腹虛滿拘急短氣霍亂嘔逆四肢厥冷心煩氣悶流汗扶老理中湯原系理中散常服以蜜為丸又曰霍亂四逆吐少嘔多者附子粳米湯主之又曰婦人霍亂嘔逆吐涎沫醫反下之心下即痞當先治其吐涎沫可服小青龍湯涎沫止次治其痞可與甘草瀉心湯又曰中熱霍亂暴利心煩脈數欲得冷水者以新汲並水頓服一升又曰凡霍亂灸之或未能立瘥終無死憂不可逆灸或但先下後吐當隨病狀灸之雍曰治霍亂之法惟千金要方最為詳備除以前録外尚有霍亂餘症及轉筋危症等十六法灸法十八法當參同用之活人書曰夏月中暑霍亂上吐下利心腹撮痛大渴煩躁四肢逆冷汗自出兩腳轉筋宜服香薷散須井中沉令極冷頓服之乃效雍曰香薷厚朴萹豆皆古人治霍亂要藥故此藥為有理中暑霍亂惟納冷水飲則不復吐逆時有以新汲水服理中丸亦佳靈苑方煮良薑末沉令極冷服皆宜冷服問曰傳信載柳州嘗得乾霍亂吐之愈諸家未見有言乾霍亂者有之乎雍曰有之第當時不能究其說真言少僞耳近世之人尤不知也霍亂者五亂之一也皆作吐利無干而不吐利者其不吐利者亂氣也按靈樞經五亂之症惟亂於腸胃一症名霍亂故作吐利其餘四症皆不作吐利只謂之亂氣柳州之疾蓋亂氣干心之症非霍亂也謂為乾霍亂者雖謬然尚不失為五亂之一今則無復知亂氣之名矣虛煩七條孫真人曰諸虛煩熱者與傷寒相似然不惡寒身不疼痛故知非傷寒也不可發汗頭不痛脈不緊數故知非裡熱也不可下如此內外皆不可攻而強攻之必遂損竭多死難救也此虛煩但當用竹葉湯若嘔者以橘皮湯一劑不愈為可重辨也此法宮泰數用甚效驗傷寒後虛煩亦服此湯活人書曰王叔和云有熱不可大攻攻熱者則寒起正宜服竹葉湯仲景曰傷寒虛羸少氣氣逆欲吐者竹葉石膏湯主之雍曰千金方竹葉湯有二方霍亂熱不解者用竹葉湯與竹葉石膏湯方不同若裡虛煩不可攻者當以竹葉湯與前所說虛煩症同當用之即仲景竹葉石膏湯也雍曰王仲弓云凡似傷寒症有五一曰痓二曰濕三曰暍四曰霍亂五曰虛煩以上四症見仲景論獨虛煩始於孫氏龐氏曰虛煩似傷寒身亦熱而煩躁頭不痛身不疼脈不數者宜竹葉石膏湯主之兼治中暍吐逆脈滑數者又曰虛煩或嘔逆吐脈弦細芤遲手足微寒胸寒者橘皮湯主之兼治暴寒下利只用生薑橘皮二物水煎
