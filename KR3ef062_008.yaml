body:
  text: 卷八不可發汗四十條傷寒本論曰夫以為疾病至急倉卒尋按要者難得故重集諸可與不可方治比之三陰三陽篇中此易見也又時有不止是三陰三陽出在諸可與不可中也仲景曰少陰病脈細沉數病為在裡不可發汗又曰太陽病脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知之以營氣不足血少故也龐氏云前陽明病脈遲汗出多微惡寒宜桂枝湯不責營不足蓋尺脈長大而遲此必軟緊而遲不可汗宜小建中湯雍曰桂枝本為解肌不動經故前陽明證中用之麻黃則發汗動經也常氏云可小柴胡湯雍曰傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯不瘥與小柴胡湯二藥可相須用也故龐氏又曰凡脈緊病必無汗唯濡而緊必有汗勿誤行桂枝宜建中湯也又曰少陰病脈微不可發汗亡陽故也一作濡而微弱龐氏曰汗則厥而煩躁不得眠常氏云可附子湯又曰脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微發汗躁不得眠雍曰宜與小建中湯又曰動氣在右不可發汗發汗則衄而渴心苦煩飲則吐水龐氏曰動氣者謂心腹中虛氣動若誤汗者先服五苓散一服次服竹葉湯朱氏曰凡脈濡弱不可發汗諸動氣在心腹上下左右不可發汗諸脈動數微弱不可發汗皆宜小建中湯煩躁者宜竹葉湯雍曰諸動氣不可發汗者皆宜茯苓桂枝甘草大棗湯又曰動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤龐氏曰此為逆難治先服茯苓白朮散汗止續與小建中湯朱氏同雍曰汗不止筋惕肉瞤者皆亡失津液證不可茯苓湯也又曰動氣在上不可發汗發汗則氣上衛正在心端龐氏云李根湯主之朱氏同常氏云可奔豚湯又曰動氣在下不可發汗發汗則無汗心中大煩骨節苦疼目運惡寒食則反吐谷不得前一雲谷不消化龐氏云先服大橘皮湯得吐止服小建中湯朱氏同常氏云可柴胡桂枝湯茯苓湯小半夏湯雍曰大橘皮湯茯苓湯小半夏湯皆可用以止吐吐止而心中煩骨節疼惡寒證不去者服柴胡桂枝湯後服小建中湯又曰咽中閉塞不可發汗發汗則吐血氣欲絶手足厥冷欲得蜷臥不能自溫龐氏云甘草乾薑湯主之常氏曰咽中閉塞可小柴胡湯設經發汗吐血者柏葉艾葉湯金匱方氣微厥逆蜷臥者可當歸四逆湯又曰諸脈得數動微弱者不可發汗發汗則大便難腹中乾一云大便難胞中干胃燥而煩其形相象根本異源雍曰宜小建中湯又曰脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛不可發汗發汗則寒栗不能自還常氏云可當歸四逆湯又曰咳者則劇數吐涎沫咽中必干小便不利心中飢煩晬時而發其形似瘧有寒無熱虛而寒栗咳而發汗蜷而苦滿腹中復堅一作蜷而心痛常氏云可柴胡乾薑桂枝湯小青龍湯理中丸雍曰脈經以上二證合而為一雍謂自咳者之下為咳者劇證咳者之上為不咳未劇之證二證之脈皆濡而弱也咳證裡寒多宜小建中湯理中丸附子湯微溫之又曰厥脈緊不可發汗發汗則聲亂咽嘶舌萎聲不得前雍曰厥陰經緊則引舌與卵故舌卷而囊縮若緩則舌萎聲不得前故厥脈緊者不可發汗恐其脈緩也厥脈緊者宜四逆湯緩者宜小建中湯或言宜白虎小柴胡皆不可用又曰諸逆發汗病微者難瘥劇者言亂目眩者死一云譫語目眩精亂者死命將難全又曰太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗也常氏云可小柴胡湯雍曰亦宜先服小建中湯又曰太陽病發熱惡寒熱多寒少千金翼云寒多熱少脈微弱者此無陽也不可發汗常氏云可小柴胡湯雍曰亦宜甘草乾薑湯又曰咽喉乾燥者不可發汗常氏云可小柴胡湯又曰亡血家不可發汗發汗則寒栗而振常氏云可小柴胡加芍藥地黃湯又曰衄家不可發汗汗出必額上陷脈緊急目直視不能眴不得眠常氏云可犀角地黃湯又曰汗家重發汗必恍惚心亂小便已陰疼宜禹餘糧丸本闕方常氏云只取一味禹餘糧石火煅末服之亦可雍曰禹餘糧不用石殼此火煅末服則是殼也又曰淋家不可發汗發汗必便血常氏云可豬苓湯芍藥地黃湯又曰瘡家雖身疼痛不可發汗汗出則痓常氏云可小柴胡湯痓者葛根桂枝湯雍曰更詳治痓門中又曰下利清穀不可發汗汗出必脹滿雍曰宜溫其里後隨證治之又曰咳而小便利若失小便者不可發汗汗出則四肢厥而逆雍曰設誤發汗宜甘草乾薑湯當歸四逆湯又曰傷寒一二日至四五日厥者必發熱前厥者後必熱厥深者熱亦深厥微者熱亦微厥應下之而反發汗必口傷爛赤雍曰已見厥陰卷中厥論並問又曰傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗常氏云可小柴胡湯又曰傷寒頭痛翕翕發熱形象中風常微汗出自嘔者下之益煩心中懊憹如飢發汗則致痓身強難以屈伸熏之則發黃不得小便灸則發咳唾常氏云可小柴胡湯桂枝加葛根湯茵陳蒿湯小青龍湯雍曰各隨證用之頭痛發熱汗出即小柴胡湯心煩喜嘔亦柴胡痓而身強用桂枝加葛根湯不得小便而咳唾則小青龍湯熏之發黃則茵陳蒿湯也又曰太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者不可發汗當刺大椎第一間肺俞肝俞發汗則譫語脈弦五六日讝語不止當刺期門又曰太陽發汗因致痓雍曰前本病云太陽病發汗太多因致痓又曰少陰病咳而下利譫語者此被火氣劫故也小便必難以強責少陰汗也常氏云可桂枝去芍藥加蜀漆牡蠣龍骨救逆湯小便難者五苓散又曰少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出者是名下厥上竭為難治常氏云可芍藥地黃湯雍曰仍灸三陰交湧泉二穴三陰交難取湧泉尤奇王叔和曰冬時發其汗必吐利口中爛生瘡千金翼同又曰汗出多熱發其汗亦堅雍曰堅字宜作痓前有云發汗太多因致痓也又曰病人脈數數為熱當消穀引食而反吐者以醫發其汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀胃中虛冷故令吐也常氏云可與小半夏湯溫中湯又曰傷寒四五日其脈沉煩而喘滿脈沉者病為在裡不可發汗津液越出大便為難表虛里實久則譫語常氏云可麻黃杏仁甘草石膏湯脈沉裡實譫語者調胃承氣湯又曰傷寒有五皆熱病之類也同病異名同脈異經雖俱傷於風其人自有痼疾則不得同法其人素傷於風因復傷於熱風熱相搏則發風溫四肢不收頭痛身熱常汗出不解治在少陰厥陰不可發汗汗出譫語獨語內煩躁擾不得臥善驚目亂無精治之復發其汗如此死者醫殺之耳出醫律朱氏曰風溫不可發汗宜葳蕤湯雍曰仲景以風溫濕溫為傷寒四種壞病難經以濕溫為五種傷寒皆屬傷寒也余見風溫本門又曰傷寒濕溫其人常傷於濕因而中暍濕熱相搏則發濕溫病苦兩脛逆冷腹滿叉胸頭目痛苦妄言治在足太陰不可發汗汗出必不能言耳聾不知痛所在身青面色變名曰重暍如此死者醫殺之耳出醫律朱氏曰白虎加蒼朮湯又曰濕溫多汗其脈陽濡而弱陰小而熱龐氏曰不當汗而強汗之則津液枯槁而死可發汗五十八條仲景曰大法春夏宜發汗龐氏作春宜汗又曰凡發汗欲令手足俱周時出以漐漐然一時間許益佳不可令如水流漓若病不解當重發汗汗多必亡陽陽虛不得重發汗也又曰凡服湯發汗中病便止不必盡劑也又曰凡云可發汗無湯者丸散亦可用要以汗出為解然不如湯隨證良驗又曰太陽病外證未解脈浮弱者當以汗解宜桂枝湯又曰太陽病脈浮而數者可發汗屬桂枝證一法用麻黃湯雍曰麻黃桂枝二湯分惡風惡寒有汗無汗用之如太陽本證龐氏曰惡寒者不當風而憎寒惡風者當風而憎寒皆屬表證龐氏論桂枝證曰凡桂枝湯證病有常自汗出小便不數手足溫和或手足指稍露之則微冷覆之則溫渾身熱微煩而又憎寒始可行桂枝湯若病者身無汗小便數或手足厥冷不惡寒反惡熱或飲酒後切不可桂枝湯也此則中風自汗用桂枝湯證又論麻黃證曰傷寒之脈緊盛而按之澀是也脈浮而緊浮為風緊為寒風傷衛寒傷營營衛俱病骨節煩疼外證必發熱無汗或喘其人但憎寒手足指末必微厥厥久而復溫掌心不厥此傷寒無汗用麻黃證也又曰脈緊必無汗設有汗不可誤作桂枝證仲景曰陽明病脈遲汗出多微惡寒者表未解也可發汗屬桂枝湯又曰病人脈浮大問病者言但便硬爾設利者為逆大便硬為實汗出而解何以故脈浮當以汗解又曰傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮解之當汗出愈常氏云可柴胡桂枝湯渴者五苓散被火譫語者龍骨牡蠣救逆湯又曰病人煩熱汗出則解又如瘧狀日晡所發潮熱者屬陽明也脈浮虛者當發汗屬桂枝湯又曰病常自汗出者此為營氣和營氣和者外不諧以衛氣不共營氣和諧故爾以營行脈中衛行脈外復發其汗營衛和則愈屬桂枝湯脈經云病常自汗出此為營氣和營氣和而外不解此外衛不和也營行脈中為陰主內衛行脈外為陽主外復發其汗衛和則愈雍曰二者語小異而理皆通脈經尤明恐本論為後人筆削蓋營氣獨和而衛氣未和也故其病外不解營衛二氣本相和共循脈內外而行也今寒不傷營而營氣獨和風反傷衛而衛氣不和則營衛不相通不得諧循脈內外而並行是以其外不解也必復發去衛中所中之邪風然後營衛諧和而病解矣所以用桂枝者以桂枝能和衛而不能至營也所以不用麻黃者以麻黃俱入營衛反復動已和無疾之營氣使營衛俱虛俱出而為汗遂令汗漏不止則人殆矣此古人解表精微之意因世人疑營氣和而外不解之語故詳明之又曰病人臟無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈屬桂枝湯證雍曰前證言營氣和而反不及衛此證言衛氣不和而不及營其實一證也但前證謂常發熱而汗出者此證謂發熱汗出有時者故論言先其時發汗則愈其用桂枝則二證皆同又曰脈浮而緊浮則為風緊則為寒風則傷衛寒則傷營營衛俱病骨節煩疼可發其汗宜麻黃湯雍曰此營衛俱傷之證所以不用桂枝又曰太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外屬桂枝湯外解已血未下少腹急結乃可攻之宜桃核承氣湯又曰太陽病微喘者表未解也宜桂枝加厚朴杏子湯又曰傷寒脈浮緊不發汗因致衄者屬麻黃湯證又曰陽明病脈浮無汗而喘者發汗則愈屬麻黃湯證又曰太陽病脈浮者可發汗屬桂枝湯證又曰太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在當復發汗服湯已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也屬麻黃湯證雍曰服湯已者謂服麻黃湯已也衄家不可發汗而此用麻黃湯蓋久衄之家既已亡血故不可汗今緣失發其汗致衄故當泄其毒氣也又曰脈浮者病在表可發汗屬麻黃湯一云用桂枝湯雍曰亦分中風傷寒有汗無汗二證而用桂枝麻黃二湯也又曰傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄屬桂枝湯常氏云疑其誤也設鬚髮汗當用麻黃湯不然用桂枝麻黃各半湯取小小汗出而已雍曰亦當分有汗無汗二證而用湯也其小便清者知不在裡故不用承氣湯而用二湯也又曰下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯雍曰下利里證身疼痛表證也又曰下利後身疼痛清便自調者急當救表宜桂枝湯雍曰可與前證相續又曰太陽病頭痛發熱汗出惡風者屬桂枝湯又曰太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者屬桂枝湯證又曰太陽病發熱汗出者此為營弱衛強故使汗出欲救邪風宜桂枝湯證雍曰營弱者自和也衛強者風邪乘之也欲逐風邪須令桂枝入衛則不動營也又曰太陽病下之後其氣上衝者屬桂枝湯脈經云氣不上衝者不可與服又曰太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈龐氏曰風池足少陽之經陽維之會不針天柱而取風池者陽維維諸陽巨陽為諸陽主氣故也又曰燒針令其汗針處被寒核起而赤者必發奔豚氣從小腹上搶心者灸其核上各一壯與桂枝加桂湯又曰太陽病項背強𠘧𠘧無汗惡風者葛根湯主之又曰太陽與陽明合病必自下利不嘔者屬葛根湯又曰太陽與陽明合病不下利但嘔者宜葛根加半夏湯又曰太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者宜葛根黃芩黃連湯又曰太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者屬麻黃證龐氏云身疼痛骨節煩疼凡脈浮數或脈浮緊無汗小便不數病雖十餘日尚宜麻黃湯也又曰太陽與陽明合病喘而胸滿者不可下也屬麻黃湯證又曰太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁或頭痛者大青龍湯主之若脈微弱汗出惡風者不可服之服之則厥逆筋惕肉瞤此為逆也又曰傷寒脈浮緩身不疼但重乍有輕時無少陰證者可與大青龍湯發之雍曰大青龍湯惟有此二證最為難識故世醫多不能辨用之亦多誤也前曰太陽中風脈浮緊者此即中風見寒脈也後曰太陽傷寒脈浮緩者此則傷寒見風脈也龐氏曰似桂枝證反無汗而脈緊似麻黃湯證反身不疼而脈緩此為大青龍證其言皆不難知其要則在太陽中風脈浮緊太陽傷寒脈浮緩而已然大青龍發汗過於麻黃湯遠甚如中風見寒脈汗不出者尚可用設或中風見寒脈自汗出者安敢更用青龍湯發表故仲景又曰若脈微弱汗出惡風者不可服之服之則厥逆筋惕肉瞤此為逆也蓋謂服之則汗漏不已至於亡陽之極則必厥逆而生筋惕肉瞤之證不可治也世醫所以多誤用者正謂此如是則大青龍之證又當於中風見寒脈之中再分有汗無汗作為兩證則大青龍當有三證其兩證無汗者可服大青龍其一證有汗者不可服也有汗一證既不可服大青龍湯則有證無藥矣自仲景之後古今未嘗議此一證所以後人多誤雍謂此一證當用桂枝麻黃各半湯仲景本以此湯治發熱惡寒形如瘧者且瘧之發寒本因傷於寒瘧之發熱本因傷於風惟瘧具風寒二證故與大青龍其源相似但恐病重藥輕雍又妄意大青龍三證皆可代用惟無汗者微加麻黃有汗者微減麻黃用之則尤善雖曰藥輕其實對證又無誤用之失不猶愈乎龐氏云桂枝石膏湯夏至後可代桂枝證用之更加麻黃去節半兩代麻黃湯青龍湯用之然言無少陰證可用者三陰俱不可發汗獨少陰為甚也又曰傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者宜小青龍湯又曰傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也屬小青龍湯證又曰陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不溺腹滿加噦者不治雍曰發黃不溺而噦者宜多服茵陳五苓散大通小便若無表證脈不浮則十棗湯下之又曰太陽病十日以去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯又曰中風往來寒熱傷寒五六日以後胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者屬小柴胡湯又曰傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者屬小柴胡湯證又曰傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之又曰少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也雍曰少陰病不可汗惟此一證可微發也又曰脈浮小便不利微熱消渴者與五苓散利小便發汗又曰太陽病下後脈促胸滿者桂枝去芍藥湯主之龐氏曰芍藥味酸脈促胸滿成結胸故去芍藥全用甘辛發散毒氣也又曰服桂枝湯或下之仍頭痛項強翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之龐氏曰傷寒三日後與諸湯不瘥脈勢如故陽氣猶在經絡未入臟腑宜桂枝石膏湯此湯可夏至後代桂枝湯證用之若加麻黃半兩可代麻黃青龍用之又曰傷寒療治四五日不瘥身體毒熱面赤者葛根龍膽湯主之兼治陽毒風溫又曰凡發散以辛甘為主復用此苦藥何也辛甘者折陰氣而助陽氣也今熱盛於表故加苦以發之素問云熱淫於內以苦發之是也又曰時行熱病六七日未得汗脈洪大或數面目赤身體大熱煩躁狂語欲走大渴甚又五六日以上不解熱在胃中口噤不能言為壞傷寒醫所不能治如已死人或精魄已竭心下才暖發開其口灌藥下咽即活兼治陽毒麥奴丸活人書名黑奴丸又蒸法曰傷寒連服發汗湯七八劑汗不出者死如中風法蒸之使溫熱之氣外迎無不得汗也古今用效薪火燒地良久去火掃地以水灑之取蠶沙柏桃荊葉糠及麥麩皆可用和鋪燒地上可側手厚鋪席令人臥席上溫覆之熱月只可夾被覆其汗立出候周身至腳心皆濈濈乃用溫粉撲止移之上床即愈如無蠶沙則用麥麩之類亦得雍曰此即千金所載陳廩邱法已見首篇敘論之後不厭重出也又曰傷寒瘥後有不了了證者謂至十日或半月二十日終不惺惺常昏沉似失精神言語錯繆或無寒熱有似鬼祟或朝夕潮熱頰赤或有寒熱如瘧狀此乃發汗不盡餘毒氣在心胞絡間可致也宜知母麻黃湯又曰太陽病下之後氣上衛其脈必浮可依證發汗不與發汗則成結胸也凡發汗脈浮大雖大便祕小便少者可發汗而解也又曰當汗不汗諸毛孔閉塞悶絶而死
