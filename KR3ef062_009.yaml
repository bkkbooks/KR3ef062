body:
  text: 卷九汗後四十四條仲景曰二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人煩躁不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知之常氏云可柴胡桂枝湯龐氏云用麻黃湯又曰未持脈時叉手冒心師因教試令咳而不咳者此兩耳聾無聞也所以然者以重發汗虛故如此常氏云可小柴胡湯雍曰先宜小建中湯又曰發汗後飲水多必喘以水灌之亦喘常氏云治喘可麻黃杏子石膏湯雍曰傷水者五苓散釣崖曰宜小青龍湯又曰發汗後水藥不得入口為逆若更發汗必吐下不止常氏云可小半夏加橘皮湯雍曰可類要四味橘皮湯又曰陽明病本自汗出醫更重發汗病已瘥尚微煩不了了者此必大便硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也常氏云可小柴胡湯雍曰小便少者津液還入胃則不須服藥也又曰發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死常氏云可小柴胡湯又曰傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之常氏云可五苓散雍曰黃耆加茵陳湯又曰病人有寒復發汗胃中冷必吐蛔常氏云可理中丸烏梅丸又曰太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者屬桂枝加附子湯龐氏曰小便難為有津液可作汗若小便數不可誤認為桂枝證也又曰服桂枝湯大汗出脈洪大者與桂枝湯如前法謂刺風池風府若形似瘧一日再三發者汗出必解屬桂枝二麻黃一湯又曰服桂枝湯大汗出後大煩渴不解脈洪大者屬白虎加人參湯又曰傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯又曰若重發汗復加燒針者與四逆湯雍曰此證首尾都無四逆證恐是字誤今詳重發汗復加燒針恐是火劫亡陽驚狂者則當與桂枝去芍藥加蜀漆牡蠣龍骨救逆湯若止是火逆因燒針煩躁則當與桂枝甘草龍骨牡蠣湯亦救逆也故恐四逆本是救逆湯字校正日誤書入四逆一方也又曰傷寒發汗已解半日許復煩脈浮數與桂枝湯又曰發汗後身疼痛脈沉遲者屬桂枝加芍藥生薑各一兩人參三兩新加湯又曰發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏子甘草石膏湯又曰發汗過多其人叉手自冒心心下悸欲得按者屬桂枝甘草湯又曰發汗後其人臍下悸者欲作奔豚屬茯苓桂枝甘草大棗湯又曰發汗後腹脹滿者屬厚朴生薑半夏甘草人參湯又曰發汗後病不解反惡寒者虛故也屬芍藥甘草附子湯又曰發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣屬調胃承氣湯脈經作小承氣湯仍二證通為一又曰太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃中和自愈若脈浮小便不利微熱消渴者屬五苓散又曰發汗已脈浮數煩渴者屬五苓散又曰傷寒汗出而渴者宜五苓散不渴者屬茯苓甘草湯又曰太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地屬真武湯又曰傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者屬生薑瀉心湯又曰傷寒發熱汗出不解心下痞硬嘔吐而下利者屬大柴胡湯又曰陽明病自汗出若發汗後小便自利者此為津液內竭雖硬不可攻之須自欲大便宜蜜煎導而通之若土瓜根大豬膽汁皆可為導又曰太陽病三日發汗不解蒸蒸發熱者屬胃也宜調胃承氣湯又曰大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者屬四逆湯也又曰發汗後不解腹滿痛者急下之宜大承氣湯又曰發汗多亡陽譫語者不可下與柴胡桂枝湯和其營衛以通津液後自愈問曰古所謂陰陽交者何也素問三十三篇曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名陰陽交交者死也岐伯曰人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝則當能食而不復熱復熱者邪氣也汗出者精氣也今汗出而輒復熱者為邪勝也不能食者精無俾也汗而熱留者其壽可立而傾也問曰素問言汗出而脈尚躁盛者死何也雍曰此則陰陽交也靈樞二十三篇曰熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生熱病脈盛躁而不得汗者此陽脈之極也死脈盛躁得汗靜者生又問曰何以謂之交也雍曰陰極則交陽陽極則交陰交則爭而亂矣故不可極也有生者何如曰靜則生交則死也陰脈脈靜陽脈人靜皆生之證也問曰何以謂之盛躁雍曰靈樞九篇所謂人迎一盛二盛三盛脈口一盛二盛三盛者此之謂盛也一盛而躁二盛而躁三盛而躁此之謂躁也極者何也人迎脈口四盛皆為極矣人迎四盛名曰溢陽為外格脈口四盛名曰溢陰為內關內關外格死不治即陰陽交也人迎不為衰陽交也脈口不為衰陰交也脈口即氣口也問曰有躁而不盛者何如雍曰靈樞二十三篇曰熱病已得汗出而脈尚躁喘且復熱勿膚刺喘甚者死是也此雖不盛而喘亦非其宜故喘甚則死也問曰有煩滿不為汗解者何也雍曰素問三十三篇曰有熱病身熱汗出煩滿不為汗解岐伯曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥巨陽主氣故先受邪少陰與其為表裡也得熱則上從之從之則厥也治之者表裡刺之飲之湯劑雍曰仲景言傷寒感異氣變為壞病如風溫溫毒之類則此風厥亦其類也宜刺太溪崑崙服茯苓桂枝甘草大棗湯問曰汗後脈洪者何也雍曰洪大者非不為汗衰衰而未得盡去非若躁盛全不為汗衰也故仲景以為可治之疾然洪大亦有輕重如一盛二盛之説若洪大而無他證者刺風池風府卻與桂枝湯是也洪大而大煩渴不解者白虎加人參湯除其裡熱也其餘逐證不同者皆依仲景之法治之問曰汗後飲水多者必喘而治熱病飲之寒水何也雍曰素問三十二篇曰諸治熱病以飲之寒水乃刺之必寒衣之居止寒處身寒而止也此謂治五臟熱病各刺手足諸經證治與傷寒有異詳刺熱終篇可見故傷寒不可多飲水問曰素問言熱病已愈時有所遺何也雍曰此謂勞復非汗後證勞復本證詳之問曰汗後之證或治或不治何也雍曰汗後之證多矣動於脈者重見於證者輕如汗後脈盛躁是邪之曾不退也脈洪大者刺之如汗後尚發熱心下痞喘滿吐利小便或利或不利之類皆正病已衰餘毒未退依仲景隨證治之則愈千金翼曰發汗後身熱又重發其汗胃中虛冷必反吐也雍曰宜小建中湯四味橘皮湯又曰發汗後重發其汗亡陽譫語其脈反和者不死服桂枝湯汗出大煩渴不解若脈洪大者與白虎湯不可吐五條仲景曰太陽病當惡寒發熱今自汗出反不惡寒發熱關上脈細數者以醫吐之過也若得病一二日吐之腹中飢口不能食三四日吐之者不喜糜粥欲飲冷食朝食暮吐以醫吐之所致也此為小逆常氏云可小半夏加橘皮湯溫中湯又曰太陽病吐之者但太陽病當惡寒今反不惡寒不欲近衣者此為吐之內煩也常氏云可金匱竹皮湯竹葉石膏湯雍曰大橘皮湯四味橘皮湯皆可服又曰少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之常氏云可小半夏加橘皮湯溫中湯又曰諸四逆厥者不可吐之虛家亦然龐氏曰諸四逆脈微弱細或弦遲雖中滿悶不可吐宜橘皮湯枳實散又曰虛家當吐而不敢吐者宜以枳實散壓氣毒痰水過日毒氣入胃乃可微下之龐氏曰不可吐而強之吐氣築心則死矣可吐十條仲景曰大法春宜吐又曰凡用吐湯中病則止不必盡劑也又曰病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒當吐之一云此以內有久痰當吐之常氏云可瓜蒂散又曰病胸上諸實一云作寒胸中鬱郁而痛不能食欲使人按之而反有涎唾一作濁唾下利日十餘行其脈反遲寸口脈微滑此可吐之吐之利則止常氏云可瓜蒂散又曰宿食在上脘者當吐之常氏云可瓜蒂散又曰少陰病飲食入口則吐心中溫溫欲吐復不能吐者宜吐之常氏云宜瓜蒂散又曰病人手足厥冷脈乍結一作緊以客氣一作邪結在胸中心下滿而煩欲食不能食者病在胸中當吐之常氏云可瓜蒂散龐氏曰胸膈痞悶痰壅塞礙脈得浮滑並宜瓜蒂散吐之産後六七日內下瀉諸藥不效得此脈者吐之瀉立止千金傷寒論曰得病無熱但狂言煩躁不安精采言語不與人相主當者勿以火迫之但以豬苓散一方寸匕服之當逼與新水一升若二升強飲之令以物刺喉中吐之病隨吐愈若不能吐者勿強與之水水停則結心下也當更以余藥吐之若此病輩不將豬苓散吐解之者其死殆速有水飲膈實者皆難治此三死一生也雍曰心下停水難治之疾須早吐也病源曰寒多熱少可吐者此謂痰多也治瘧亦如之
