body:
  text: 卷十五瘀血圊血便血十一條仲景曰太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解其外屬桂枝湯外解已血未下但少腹急結者乃可攻之宜桃核承氣湯雍曰小便不利不可攻也又曰太陽病六七日表症仍在脈微而沉反不結胸其人發狂者以熱在下焦小腹當硬滿而小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也宜下之以抵當湯主之又曰太陽病身黃脈沉結小腹硬滿小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之常氏云小便不利無血者與五苓散又曰傷寒有熱小腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸又曰陽明症其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑者宜抵當湯下之又曰病人無表裡症發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血宜抵當湯脈經云若脈數不解而下不止必協熱而便膿血也又曰少陰病八九日一身手足盡熱者此熱在膀胱必便血也常氏曰宜用桃核承氣湯芍藥地黃湯雍曰宜先犀角地黃湯又曰傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病可愈若厥而嘔胸脅煩滿者其後必便血常氏云便血者可黃芩湯雍曰熱已除者畏黃芩又曰淋家不可發汗發汗必便血常氏云可柏皮湯又曰太陽病以火熏之不得汗其人必躁到經不解必圊血也雍曰凡病各有輕重治病用藥亦有輕重且如瘀血一症用抵當湯依法如此不可易也若其血症輕或治之早者亦不須用只服犀角地黃湯血症稍重及治之瘥遲者則用桃核承氣湯其重及治之遲者方用抵當湯丸抵當湯丸是十分之藥輕病不宜用也用他藥仿此衄血吐血十條仲景曰太陽病脈浮緊發熱身無汗自衄者愈又曰傷寒脈浮緊不發汗因致衄者麻黃湯主之雍曰麻黃湯發其汗則熱越而出其衄必輕怡雲子云若依時發汗則不衄矣脈浮緊當用麻黃湯發汗非致衄後用也衄則愈矣又曰太陽病脈浮緊無汗發熱身疼痛八九日不解表症仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之又曰傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯常氏云疑字誤也設鬚髮汗當用麻黃湯不然用桂枝麻黃各半湯取其小汗出而已雍曰此症不言有汗無汗故後人用藥有疑然反復詳讀似無可疑者衄家固當用麻黃湯仲景以病仍在表雖當發汗而里症不大便六七日既不敢用承氣攻裡亦不敢用麻黃大發汗故止用桂枝逐表邪表解若見里症待其可下復用承氣攻之也此不用麻黃之意若頭痛者必衄六字是此症中一小變症仲景不言治衄法蓋此症其初里症似重故仲景初欲與承氣湯後言仍在表者是表症亦輕也表輕則衄衄則表當解不必用藥雖桂枝亦不當服當移宜桂枝湯四字於當鬚髮汗之下看則意亦明矣又曰陽明病口鼻燥但欲漱水不欲咽者此必衄常氏云宜黃芩芍藥湯又曰脈浮發熱口乾鼻燥能食者則衄常氏曰可黃芩湯又曰動氣在右不可發汗發汗則衄而渴心苦煩飲則吐水雍曰此有衄渴吐水三症故龐氏先五苓散以止渴次用竹葉湯以止煩煩止則衄退矣問曰仲景言衄家不可發汗亡血家不可發汗此皆用麻黃湯何也雍曰王仲弓言久衄之家既已亡血故不可汗今緣失發其汗致衄當分其津液乃愈此論固已當又龐氏之言為甚明其言曰脈浮緊無汗服湯未中病其人發煩目瞑劇者必衄小衄而脈尚浮者宜麻黃湯衄已脈微者不可再行也此分有汗無汗麻黃桂枝脈浮脈微最為當理以是論之則小衄者有發汗分津液之理大衄者病必自解當聽之惟慮其衄不肯止則依活人書以藥止之若小衄發汗無汗則反成大衄也仲景曰少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出者是名下厥上竭為難治雍曰常氏用芍藥地黃湯以治上竭而不治下厥雍謂下不厥則上不竭必先以當歸四逆湯治下厥仍灸太溪穴三陰交湧泉穴以止少陰之厥或三陰交難取則太溪湧泉尤奇又曰咽喉閉塞不可發汗發汗則吐血氣微絶手足厥冷欲得蜷臥不能自溫龐氏曰乾薑甘草湯主之常氏曰咽中閉塞可小柴胡湯發汗吐衄者柏葉艾葉湯氣微厥逆蜷臥者當歸四逆湯雍曰亦宜灸三陰交湧泉穴以止厥逆蜷臥切勿服小柴胡湯狐惑並䘌病十條金匱要略曰狐惑之為病狀如傷寒王叔和曰其氣如傷寒活人書曰名狐惑傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐不欲飲食惡聞食臭其面目乍赤乍白乍黑千金同病源曰或因傷寒而變成此疾又曰蝕於上部則聲喝一作嗅金匱作聲嗄甘草瀉心湯主之千金同又曰蝕於下部則咽乾苦參湯淹洗之千金又曰此由溫毒氣所為也病源作濕毒者所為誤又曰蝕於肛者雄黃散熏之千金同外熏法宜用千金也又曰其人脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黑叔和曰黃黑若能食者膿已成也赤小豆當歸散主之千金云治狐惑當用黃連燻草湯叔和曰病人或從呼吸上蝕其咽或從下焦蝕其肛陰蝕上為惑蝕下為狐狐惑並用豬苓散主之千金曰此由濕毒氣濕當作溫然濕所為者狐惑正病也又曰傷寒不發汗變成狐惑狐惑者此自傷寒氣而變也又曰䘌病與狐惑百合濕溫之病鬼魅皆相似宜精察節氣其新故二氣相搏成此病也活人書曰狐惑傷寒與濕䘌皆蟲證初得狀如傷寒或因傷寒成此疾雍曰狐惑與䘌雖是兩疾治法不相遠矣又曰大抵傷寒病腹內熱入食少腸胃空虛三蟲行作求食蝕人五臟及下部為䘌病其候齒無色舌上盡白甚者唇黑有瘡四肢沉重忽忽喜眠蟲蝕其肛爛見五臟則死當數看其上下唇上唇有瘡蟲蝕其臟下唇有瘡蟲食其肛也殺人甚多因下利而得治䘌桃仁湯黃連犀角湯雄黃鋭散主之雍曰常見有舌上齶成瘡不止唇而已病源作上唇內下唇內為當雍曰狐惑之䘌病亦多有之因醫者既汗又吐或又下或利小便亡津液太過熱毒內攻臟腑枯焦蟲不得安故上下求食亦有不發汗內熱焦枯而成者凡人之喉及陰肛常有是皆比其他肌肉最津潤處故蟲緣津潤而食之䘌病又不止因傷寒而成多自下感之因居濕地下利不止日久者必得依朱氏服湯用鋭散若在肛外可見用蘆薈龍膽塗之尤妙然必先湯內攻而後淋洗外塗也夏秋之交小兒因下利感此疾尤多當須淋洗肛外頻視之見細紅點初有十數即急治之稍遲則增多經夕即十數倍如倉卒不能辨只先以蘆薈加小豆以塗之他藥能殺蟲而不能毒人者亦可用醫工不識誤小兒甚多若夫湯淹法屢驗百合病十四條千金論曰百合病者謂無經絡百脈一宗悉致病也皆因傷寒病虛勞大病以後不平復變成斯疾其狀惡寒而嘔者病在上焦也二十三日當愈其狀腹滿微喘大便堅三四日一大便時復小溏者病在中焦也六十三日當愈其狀小便淋漓難者病在下焦也三十三日當愈各隨其症以治之雍曰孫氏著論皆見於古書獨此論中分三焦症古無所見豈其書亡乎果分三焦則各有所在諸藥可治不應仲景曰諸藥不能治乃時用諸百合湯也千金百合病餘論則皆見於金匱矣惟此一論有異金匱要略論曰百合病者百脈一宗悉致其病也意欲食復不能食常默默然欲臥復不得臥欲行復不能行飲食或有美時或有不用聞食臭時如有寒實無寒如有熱實無熱口苦小便赤千金云至朝口苦小便赤澀諸藥不能治得藥則劇吐利如有神靈所加者百合之病身形如和其脈微數其候於溺時即覺頭痛者六十日乃愈溺時頭不痛淅淅然寒者四十日愈若溺時覺快然但頭眩者二十日愈其症或未病而預見或病四五日而出或病二十日或一月微見者各隨症治之千金或病一月二十日後見其症者治之喜誤也雍曰此論有言不甚明處今皆以千金論中字足之又如一月二十日後症方出則一月二十日之前為治安得不誤故千金論中治之喜誤四字最為要切論言其症者謂溺時三症也叔和曰百合之為病其狀若默默欲臥復不得臥或如強健人欲出行而復不能行意欲得食復不能食或有美時或有不用聞飲食臭時如寒無寒如熱無熱至朝口苦小便赤黃身形如和其脈微數百脈一宗悉病各隨症治之金匱又曰百合病見於陰者以陽法救之見於陽者以陰法救之見陽攻陰復發其汗此為逆見陰攻陽乃復下之此亦為逆千金曰百合病見在於陰而攻其陽則陰不得解也復發其汗為逆也見在於陽而攻其陰則陽不得解也復下之其病不愈雍曰金匱之意謂見陽當攻陰若不攻陰而發其汗則為逆見陰當攻陽若不攻陽而復下之亦為逆此為易明千金言見陰攻陽陰未解之間不可復發汗恐陽再受攻故為逆見陽攻陰陽未解之間不可復下之恐陽再受攻故為逆其意難明又曰治百合病發汗後者宜百合知母湯外臺云發汗已更發者下之已更發者吐之已更發者又曰治百合病下之後者宜百合滑石代赭湯又曰治百合病吐之後者宜百合雞子湯又曰治百合病不經吐下發汗病形如初者宜百合地黃湯又曰百合病經月不解變成渴者宜百合洗方又曰百合病渴不瘥宜栝蔞牡蠣散又曰百合病變發熱者宜百合滑石散千金曰治百合病變腹中滿痛者宜百合散雍曰詳金匱言發汗後下之後吐之後皆有百合病也而千金方言百合病已經發汗之後更發者百合病已經下之後更發者百合病已經吐之後更發者其意謂百合本病汗下吐之後而更發非傷寒汗下吐之後變成百合病也反似百合病中治勞復之傷而不見正行汗下吐百合病之藥於義未甚安恐因數百年間傳録校正誤有增加非孫氏之本文故活人書只用金匱本文不用千金增加更發等字而龐氏直改其語云治汗後百合病治下後百合病治吐後百合病尤使人不疑也又論曰仲景以藥之百合治百合病者與神農經主治不相當自古莫能曉其義是以孫真人言傷寒雜病自古有之前古明賢多所防禦至於仲景時有神功尋思旨趣莫測其致所以醫人不能鑽仰此亦未能鑽仰之一也古人以孫真人之智猶如此況乎後之來者然百合須百合治之智者不能知則前所謂三焦者既有所在又三焦各有主對之藥按圖可治何難之有不必須百合而後治雍是以疑非孫氏之言或因而見三焦之症有如前所言更不必問是百合非百合皆以三焦藥治之可也然百合之為物豈因治百合之病而後得名哉或因是病須百合可治因名曰百合乎皆莫能測知也然少時見先生言以百合湯治一僕病得愈是時雍未甚留意不解仔細看症雖見其似寒似熱似飢似飽欲行欲臥如今百合之症又自呼其姓名有終夕不絶者時至醒時問之皆去不知此症殊不可曉豈所謂如有神靈所加者乎恐人有如是症者因筆於此後此症又與素問所謂解㑊者相類傷寒勞復三十二條素問曰熱病已愈時有所遺者何也岐伯曰諸遺者熱甚而強食之故有所遺也若此者皆病已衰而熱有所藏因其穀氣相搏兩熱相合故有所遺也治遺奈何曰視其虛實調其逆從可使必已矣又曰病熱當奈何禁之歧伯曰病熱少愈食肉則復多食則遺此其禁也仲景曰大病瘥後勞復者枳實梔子豉湯主之又曰傷寒瘥已後更發熱小柴胡湯主之脈浮者以汗解之脈沉實實一作緊以下解之常氏云汗宜柴胡桂枝湯下宜調胃承氣湯又曰大病瘥後從腰以下有水氣者牡蠣澤瀉散主之又曰大病瘥後喜唾久不了了胸上有寒以丸藥溫之宜理中丸又曰傷寒解後虛羸少氣氣逆欲吐竹葉石膏湯主之又曰病人脈已解脈一作熱而日暮微煩以病新瘥人強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈華元化曰時病瘥後酒肉五辛油麵生冷酸滑房室皆斷之此其大略也孫真人曰凡熱病新瘥及大病之後食豬及羊血肥魚油膩等必大下利醫所不能治也必至於死若食餅餌粱黍飴脯膾炙棗栗諸果修脯及堅實難消之物胃氣尚弱不能消化必更結熱設以藥下之則胃氣虛冷大便難禁不下之則死下之則危皆難救也熱病及大病之後多坐此死不可不慎也又曰新病瘥後但得食糜粥寧少食令飢慎勿飽不得他有所食雖思之勿與也引日轉久可漸食羊肉白糜若汁羹雉兔鹿肉不可食豬狗肉也新瘥後當靜臥慎勿早起梳頭洗面非但勞體亦不可多言語用心使意勞煩凡此皆令人勞復故督郵顧子獻得病已瘥華叔視脈曰雖瘥尚虛弱未得復陽氣不足慎勿勞事余勞尚可女勞則死當吐舌數寸其婦聞其夫瘥從百餘里來省之經宿交接中間三日發熱口噤臨死舌出數寸而死病新瘥未滿百日氣力未平復而以房室者略無不死有古人名蓋正者疾愈後六十日已能行射獵以房室即吐涎而死近有一士大病瘥十餘日犯之小腹急痛手足拘攣而死又曰時病瘥後未滿五日食一切肉面者病發必困又曰瘥後新起飲酒及韭菜病更發又曰新瘥食生魚鮮下利必不止食生菜終身顏色不復食生果及羊肉者必膈上作熱蒸食犬羊等肉必作骨中蒸熱食魚肉瓜生菜令人生腫食蒜膾者疾更發必致大困新汗解飲冷水者心包冷令人虛補不復雍曰傷寒之為熱毒諸疾不可不謹懼其後者畏此毒之再作也一之已甚其可再乎況飲酒食棗羊犬肉皆大熱之物以此致復無不大困且汗下之後表裡俱虛胃氣困弱食過多食生冷及小有勞動必皆致復可不謹哉雍見北方多此疾亦有調攝之方疾愈之後三日之內惟食白粥言語亦忌三日之外粥內稍加滋味六日之後方食至軟之飯稍加面絲蔥蒜羹切忌梳頭洗手此疾初自足起故雖二十日後亦不敢洗足犯之必皆復前論或言忌羊或言忌豬不同者豬羊皆忌食也豬畏動風下利羊畏熱復北土病愈一兩月後後有敢食豬肉者而羊近亦忌兩月遠須百日更有其人若十分平復當少食勿多食也北土羊羹其熱尤甚而洛原間豬不甚發病西北至秦晉南至漢南則豬不可食秦晉尤甚南方豬羊亦多有病仍須用心選擇蓋大病之後臟腑血氣不與平日同也禁忌三日如法則七日可保也七日如法則二七三七日可保三七如法則一月三月可保令其在初調護之力目擊如此之人未有不速平復者至房室則須忌百日外孫氏之論一字不可忽蓋一勞復之後必困於前病時再復之後又困於一復時況有三復四復殆不勝其困矣是以往往以疾復而死也貴家大族多有女兒嬌縱又經汗下之後腸胃空虛急欲得食雖食而未能消化必須致疾難於勸說全在父母曉解左右有能調和之人為調節之則可也若病人瘥後惟喜食白粥則永無患矣千金方曰傷寒瘥後更頭疼壯熱煩悶宜服黃龍湯又曰男子新病起近房室而復者宜服赤帛燒散又曰病後早起及食多勞復者鼠屎豉湯崔氏加梔子又曰食飽不消勞復脈實者宜梔子香豉鼠屎大黃方又曰勞復氣欲絶宜麥門冬湯起死人困有效又曰傷寒瘥後一年心下停水不能食者宜地黃白朮麵湯方龐氏曰病新瘥後氣血津液衰耗切勿為諸動事凡言語思慮勞神梳沐澡頮勞力勞則生熱而病復如初也又新瘥後精髓枯燥切不可為房事犯之必死如顧子獻是也此名女勞復又非陰陽易素問有言食多則難消化復病如初此名食復新瘥強人足兩月虛弱人足百日則無復病矣又曰天行勞復頭痛四肢疼痛宜蔥豉鼠屎湯此湯最妙又曰天行勞復作熱旦至晚則腰脊痛頭項強重宜葛根姜豉湯又曰傷寒已瘥勞復如初脈浮無汗者宜桂枝梔子湯自汗者去麻黃又曰傷寒勞復如初脈浮無汗者重又曰傷寒勞復如初自汗出者脈浮煩躁甚宜梔子石膏香豉湯加雄鼠屎又曰病新平復後勞動發熱熱氣攻胸手足拘急搐搦如中風狀宜栝蔞竹茹湯又曰天行瘥後勞復發熱嘔吐食不下者宜蘆根橘皮湯又曰男子房勞成復者宜鼠屎薤根湯兼治陰陽易神驗又曰男子房勞復發口噤舌出者死又始得勞復百節痛如被打渾身沉重恍惚失措脈促而絶不可治或有吐涎不已或有譫妄煩亂者不治又曰婦人病未平復因夫所動少腹篡中急痛腰胯痛四肢不任舉動無熱症者附子黃耆湯活人書曰新病瘥血氣尚虛津液未復因而勞動生熱熱氣復還入經絡名曰勞復仲景云小柴胡湯主之又有食復者大病新瘥脾胃尚弱強食過多停積不化因而發熱名曰食復仲景於枳實梔子湯後云若有宿食者加大黃如博棋子五六枚服之愈廣濟療復雄鼠屎湯許仁則七味蔥白湯皆可選用雍曰病瘥後梳沐等事皆易為禁止惟腸胃空者食不已故多食復然勞復之中食服亦易所患再三作耳陰陽易六條孫真人論曰婦人溫病雖瘥未能平復血脈未和尚有熱毒足以毒人男子接之得病名為陰易之病其人身體重熱上衝胸頭重不能舉眼中生眵䁾一作膜脈四肢一云膝脛拘急小腹絞痛手足拳皆即死其亦有不即死者病苦小腹裡急熱上中胸頭重不能舉百節解離經脈緩弱血氣虛骨髓竭便噓噓吸吸氣力轉少著床不能動搖或引歲月方死晉代名醫張黃言有婢得病瘥後數十日有六人接之皆死可不戒之仲景曰傷寒陰陽易之為病其人身體重少氣小腹裡急或引陰中拘攣熱上衝胸頭重不能舉眼中生花一作眵千金翼加胞赤二字膝脛拘急者燒裩散主之千金方曰交接勞復陰卵腫縮宜取婦人衣服以覆男子龐氏曰陰陽交易陰陽相感動其毒氣著人如換易也男子病新瘥婦人與之交婦人得病名曰陽易婦人病新瘥男子與之交男子得病名曰陰易若二女二男則不相易然女犯男得病鮮有死者男犯女得病治稍緩則死無一生者又若女犯男而男自勞復則女不病男犯女而女自勞復則男得病亦輕富貴之家雖知其事後生忽恣意犯之多致不救田野之家濛濛昧昧只知傷寒能殺人因此死者又十有三四皆不知其所犯之由深可傷也宜服手足甲裩灰散陰頭毛際二穴灸之男女初得病者便服薤根鼠屎湯出汗愈灸陰頭百壯而卵縮未下者灸大敦二穴小炷七壯足大拇趾旋毛上是穴活人書曰陰陽易病男子則體重少氣陰腫入腹絞痛婦人則裡急腰胯連腹內痛余與仲景孫氏龐氏三家同又曰燒裩散猳鼠屎湯竹葉湯乾薑湯竹茹湯當歸白朮湯皆可選用雍曰男子用千金赤帛燒散為奇雍曰男子初病傷寒其毒雖未必重及其易人則多殺人過於本傷何哉蓋本病所感必先太陽膀胱經自表入里其傳有漸易人之病隨感而入直傷膀胱與腎五臟不由經脈故其病只見里症無表症病在臟不在經也至其所用藥必須隱穢之物與本臟相侵者然後可敗而逐之至於灸法亦必在隱惡之處蓋病不在經絡之中不可取也
