body:
  text: 卷十四陽毒五條雍曰傷寒陰陽二毒最為疾勢重者張仲景有升麻甘草二湯今竟不見於仲景書中惟脈經載其論證二篇千金方中略言之今二湯用藥加減與仲景異同金匱要略復合為一曰陰毒陽毒升麻鱉甲湯主之前後諸方書皆無是説然二疾冰炭也用藥正相反諸書之間雖有升麻甘草二湯方味皆同又與要略異以此不能無疑惟活人書二方用藥不同最為當理第不見活人書升麻湯所出方書想朱氏必有所據今從活人書用二藥士弱曰二方載外臺祕要云出古今録驗方王叔和脈經曰陽毒為病身重腰背痛煩悶不安狂言或走或見鬼或吐血下利其脈浮動大數面赤斑斑如錦文咽喉痛吐膿血五日可治至七日不可治有傷寒一二日便成陽毒或服藥吐下後變成陽毒升麻湯主之龐氏云又宜葛根龍膽湯雍曰此疾常有之不知治多大吐下血而死雖用助陰去熱藥亦須有解毒在其中則可用活人書曰陽毒病陽氣獨盛陰氣暴絶必發躁狂言妄走面赤斑斑如錦文咽痛或下利赤黃脈洪實滑促宜用酸苦之藥令陰氣復而大汗解矣葶藶苦酒湯升麻湯大黃散梔子仁湯黑奴丸可選而用之雍曰表裡皆大熱證者宜黑奴丸審知熱在裡不在表以朴硝大黃桃仁藥下之其物則多服升麻也蓋陽毒之作甚暴非陰毒比下原文缺雷時強人下原文缺及小兒便宜用升麻湯預防其毒又曰近人治傷寒脈洪大內外結熱舌卷焦黑鼻中如煙煤者則以水漬布薄之疊布數重新水漬之稍挨去水搭於胸上須臾蒸熱又漬令冷如前薄之乃換新水日數十易熱甚者置病人於水中熱勢才退即已亦良法也雍曰置人水中之法勢甚不得已雖可用亦難用須內熱少衰勢未解則可不然水迫外熱並歸於內則不可支也大抵陽虛狂躁與傷寒下證不同下證只坐臥不安陽毒則必欲起走且有力人不能制雖見江河亦入也亦有偶然得解者非常道也雍曰嶺南治熱瘴取蚯蚓研爛新冷水漬取清汁飲之此未試也蓋説言獺肝治熱不治冷余嘗苦病後潮熱以冷水調少許末服之則止然未嘗用治大熱也漫書之以備用陰毒七條叔和脈經曰陰毒為病身重背強腹中絞痛咽喉不利毒氣攻心心下堅強短氣不得息嘔逆唇青面黑四肢厥冷其脈沉細緊數身如被杖五六日可治至七日不可治也或傷寒病一二日便結成陰毒或服藥六七日以上至十日變成陰毒甘草湯主之雍曰要略有咽喉痛字千金二毒並同脈經金匱要略陽毒之為病面赤斑斑如錦文咽喉痛吐膿血陰毒之為病面目青身痛如被杖咽喉痛此與脈經證同語異第語簡而易明故重録之龐氏曰陰毒之為病因汗下藥性冷所變多在四五日也或素來陽氣虛冷始得病便成陰毒或始因傷寒冷物便成陰毒服甘草湯仍作返陰丹喘促吐逆者入口便定服藥三五服不退便於臍下一寸半灸之大炷百壯未愈可至二百壯若手足極冷小便澀小腹硬痛囊縮即須於臍下四寸如前灸之仍用當歸四逆加吳茱萸湯同返陰丹頻頻與服內外逼逐亦可解稍緩則死矣其陰毒氣結在小腹故小便澀切不可用利小便藥有以炒鹽及熱藥尉臍下者其冷氣在少腹之間被熱物所尉無處通出即衝上奔心其死尤速也當須預服溫劑然後尉之非不當尉也又曰陰毒脈沉微欲絶四肢逆冷大躁而渴不止宜服附子飲子仍下硫黃丸尤妙活人書曰陰毒之為病初得病手足冷背強咽痛糜粥不下毒氣攻心腹痛短氣四肢逆冷嘔吐不利身如被打宜服陰毒甘草湯白朮散附子散正陽散肉桂散回陽丹返陰丹天雄散正元散退陰散之類可選用之雍曰升麻甘草二湯觀其用藥性甚緩然諸家必先用之者以古人治陰陽二毒者惟此二湯故須用之以去其毒勢而後輔之以他藥也又曰陰毒本因腎氣虛寒或因冷物傷脾外傷風寒內既伏陰外又感寒或先感外寒而內伏陰內外皆陰則陽氣不守遂發頭疼腰重又曰陰毒傷寒心間煩躁四肢逆冷白朮散返陰丹皆主之雍曰朱氏返陰丹比之龐氏加附子乾薑桂心為六物其灸法先灸臍下一寸間若其人手足冷少腹硬即更於臍下兩邊各一寸三處齊灸之仍與四逆返陰二藥頻服方可解退若加以小便不通及陰囊縮入少腹絞痛欲死者更於臍下二寸石門穴火灸之仍可服二藥切不可與尋常利小便藥也雍曰從兄盛年恃健不善攝生因極飲冷酒食內外有所感初得疾即便身涼自利手足厥額上冷汗不止遍身痛呻吟不絶偃臥不能轉側心神俱無昏憒恍惚呼醫視之治不效豫言兄曰此疾證甚重而病人甚靜又覺昏憒身重不能起自汗自利四肢厥此陰病無疑也又遍身痛不知處所出則身如被杖陰毒證也安得不急治醫者之言繆誤不可聽乃急令服四逆湯灸關元及三陰交未知加服九鍊金液丹利厥汗皆少止稍緩藥艾則諸證復出再救急治如此進退者三比三日兩夜灸十餘壯服金液六十餘粒四逆湯一二斗方能住火灸湯藥陽氣雖復而汗不出證復如太陽證未敢服藥以待汗二三日後大煩躁飲水次則譫語斑出熱甚無可奈何復與調胃承氣湯得利大汗而解陰陽反復有如此者前言煩躁不可投涼藥此則可下證具非止小煩躁而已故不可同也發斑十三條論曰發斑一證緣仲景書遺逸不詳見故諸家之説無所統大抵斑有數種惟熱毒入胃者當下之非下斑也下其胃中之毒也而胃中之毒由斑而後見也若皮間暴作癮疹無他裡熱證者不可下當服平涼去風解肌藥及以摩膏治之若在春末及夏不宜火灸及重覆隨其淺深略分內外不可一切用藥亦表虛不可發汗也千金方載華元化之言曰傷寒熱毒之氣五日在腹六日入胃乃可下也若熱毒在外未入於胃而先下之者其熱乘虛入胃則爛胃也然熱入胃要須下去之不可留於胃中胃若實其熱為病三死一生胃虛熱入爛胃也其熱微者赤斑出此候五死一生劇者黑斑出此候十死一生千金又曰病者過日不以時下則熱不得泄亦爛胃斑出雍曰發斑有下之太早者有失下者故王仲弓謂下早熱入胃者斑出下之遲失下之亦斑出活人書曰發斑有兩證溫毒熱病皆有斑也溫毒發斑者冬時觸冒寒毒至春始發病初在表或已發汗吐下而表證未罷毒氣未散故發斑黑膏主之又冬月溫暖人感乖戾之氣冬未即病至春或被積寒所折毒氣不得泄至天氣暄熱溫毒始發則肌肉斑爛癮疹如錦文內攻心悶但嘔清汁葛根橘皮湯主之雍詳發斑有陽毒溫毒熱病熱病即今之傷寒也溫毒發斑於三日之內毒氣在表時即出以此驗其溫毒非熱病也蓋其毒久鬱而發病不在裡故不可下必隨表證治之當用藥解肌熱麻黃桂枝皆不可用也如三日毒不解其病入里則同傷寒治之又曰熱病發斑與時氣同或未發汗或已經汗下而熱毒不散表虛里實熱毒乘虛出於皮膚所以發斑雍曰此證是溫毒發斑也與傷寒發斑不同蓋溫毒之毒本在裡久為積寒所折腠理閉塞不得出及天氣暄熱腠理開疏乃因表虛郁發為斑是時在裡之毒發在表故可解肌而不可下也傷寒之毒初亦在裡久不能出及春再感溫氣腠理方開隨虛而出於表遂見表證而未成斑也醫者昧於表裡之證下之太早時內無毒氣可下所損皆胃之真氣真氣既損則胃為之虛矣邪毒者乘虛而出乘虛而入者以先損之虛胃而當復入之今毒力必不勝而胃將爛是以其華見於表而為斑則傷寒之毒初蘊於裡出而之表耳既見於里又見於表是毒氣往來者再矣諸經者血脈之道路也今邪毒往來於道路而營衛氣血不通其人可久乎此其所以不通也然溫毒之斑惟感於動而發從而散之則去矣傷寒之毒已發而復遏之又虛而復客之即入於胃如升堂入室不復可逐必使下泄於腸胃則可出故必下之所以救胃爛也元化曰要須下去之不可留於胃中是也故溫毒之斑郁發之毒也傷寒之斑爛胃之證也發則可去爛則不可生是以言五死一生十死一生也其爛如何曰毒熱焚於內則胃為瘡爛矣又曰大抵發斑不可用發表藥蓋表虛里實若發汗重令開泄更增斑爛也元參升麻湯大青四物湯豬膽雞子湯可選用之雍曰溫毒發斑感在表惟可解肌不可發汗傷寒發斑毒氣在胃當下不當汗也故皆腹痛眼睛疼身體倦怠四肢逆冷額上手背冷汗不止或多煩渴精神恍惚如有所失二三日間或可起行不甚覺重診之則六脈沉細而疾尺部短小寸口脈或大若誤服涼藥則渴轉甚煩躁急有此病證者便須急服辛熱之藥一日或二日便安又曰若陰毒漸深其候沉重四肢逆冷脘腹轉甚或咽喉不利心下脹滿結硬躁渴虛汗出不止或時鄭聲指甲面青色黑六脈細沉而疾一息七至以上有此證者速於氣海及關元二穴灸二三百壯以手足和暖為效仍兼服諸丹散內外逼逐令陽氣復而大汗解矣若陰毒盛而陽氣暴絶則為陰毒陽毒盛而陰暴絶則為陽毒大抵離絶陰陽非大汗不能復其正氣也又曰若陰毒已深疾勢困重六脈附骨取之方有按之則無一息十至以上或不可數至此則藥餌難為功但於臍中用蔥尉法或灼艾三五百壯如手足不溫不可治也如手足溫更服藥以助之若陰氣散陽氣來則漸減熱藥調治之陽氣乍復往往卻煩躁切不可投涼藥煩躁甚者再與返陰丹則定也又曰六脈俱浮大或沉取之而不甚疾者非陰證也大抵陽毒傷寒其脈多弦而洪數陰毒傷寒其脈沉細而弦疾又曰陽盛則身熱而無汗陰盛則身冷而有汗岐伯曰陽盛則身熱腠理閉喘粗為之俯仰汗不出而熱陰盛則身寒汗出身常清數栗而寒寒而厥不可用發表藥雍曰發斑一證以仲景不言故諸書少至當之論既不分溫毒傷寒在表在裡不同又不別發斑癮疹諸瘡之異雖朱氏亦然活人書曰斑瘡癮疹如錦文俗名麩瘡素問謂之疹此亦發斑癮疹麩瘡三病為一證也雍詳發斑未嘗成瘡也傷寒之斑初如硃砂細點又如狗蚤齧痕初甚稀有漸加稠密是也癮疹略如風尸亦有赤白二種赤者如錦文也不如風尸之高起漸隱而起相連續初多起臂腿次滿腹背皆成錦花者是也溫毒之斑略類赤色癮疹又不與傷寒斑同至俗名麩瘡者乃是陽毒諸瘡之類與斑疹二者不同古有陽毒瘡者即本俗名豆瘡麻子瘡水鈴麩瘡皆是也皆因形名之每有輕重惟豆瘡為至重其他若誤服涼藥亦皆能殺人又有暴發錦文癮疹者初無傷寒證但前一日二日減食情思不佳次必臂腿瘙癢搔之隨手錦文出丹毒治之塗赤小豆雞子清甚佳胸中餘毒不去則胸中煩悶不入食二三日服解毒藥去毒盡乃安石南湯元參升麻湯正解此毒諸家論斑毒瘡疹皆為一類故此略辨之其詳自有陽毒斑瘡論並在小兒傷寒部中問曰仲景不言斑者何也龐氏曰古方雖有治方而法不詳備疑當時熱毒未甚鮮有死者雍曰非也其論亡逸也如陰陽二毒本論皆無考之千金則知嘗有而今亡矣亦猶是也又仲景自治傷寒必不至出斑蓋傷寒之斑非本證皆醫者之所為仲景不可下則不下可下則下必不至於下之早亦必不至於失下何緣有斑出陽明證中多言急下之者是也亦恐傷寒為庸醫所誤則斑出故不得不論耳醫者苟能工於汗下證則結胸痞氣發斑發黃皆不應有可不審哉問曰諸證發斑何藥以解之孫真人曰凡除熱解毒無過苦酢之物故多用苦參青葙艾梔子葶藶苦酒烏梅之屬是其要也熱盛非苦酢之物不解熱在身中既不時治治之又不用苦酢之藥如此救火不以水也今諸療治多用甘辛薑桂人參之類此皆貴價不常有比行求之轉以失時而苦參青葙葶藶艾之屬所在盡有除熱解毒最良得病內熱者不必按藥決也便以青葙苦參艾苦酒療之但稍與促其間無不解也雍曰此論不暇尋求所在可得之藥其他則如千金活人書龐氏論中藥與證相對者皆可用前已載之矣問曰斑出必欲下何藥為宜雍曰三者之病陽毒最為重其斑為證自有之治從本方溫毒內外熱盛不能偏表偏里須兩解之以去內外熱宜白虎加人參湯化斑湯若內外熱太甚者依陽毒治之常時傷寒誤下失下致斑出者其毒已入胃審其無表證有下證宜用調胃承氣湯以除胃中熱蓋此斑非獨表證也雍論曰仲景本論不見斑證惟千金方載華他之説最為至當而近時醫家多不見取故其論不分毒在表裡仍並瘡疹混為一説設誤汗下寧不害人惟龐氏朱氏善究根源持論亦如此若不用華言則無用調胃承氣之理雍曰睹其效驗故主其説然已經孫真人手復何疑哉發黃三十條仲景曰脈浮而動數醫反下之動數變遲陽氣內陷心下因硬則為結胸若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃常氏云發黃者與茵陳煎濃汁調五苓散亦可雍曰凡黃皆用二藥重者茵陳蒿湯輕者五苓散又曰傷寒脈浮而緩手足自溫者是為系在太陰太陰者身當發黃若小便自利者不能發黃治在陽明證中又曰陽明病無汗小便不利心中懊憹者身必發黃又曰陽明病被火額上微汗出而小便不利者必發黃常氏云可與茵陳湯五苓散又曰陽明病發熱汗出者此為熱越不能發黃但頭汗出身無汗劑頸而還小便不利渴飲水漿者此為瘀熱在裡身必發黃宜下之茵陳湯主之又曰傷寒六七日身黃如橘子色小便不利腹微滿者茵陳湯主之又曰傷寒身黃髮熱梔子柏皮湯主之又曰傷寒瘀熱在裡身必發黃麻黃連翹赤小豆湯主之又曰傷寒發汗已身目為黃所以然者以寒濕在裡故也以為不可下也於寒濕中求之常氏云可五苓散又曰傷寒頭痛翕翕發熱形象中風下之益煩心發汗則致痓熏之則發黃雍曰治在不可汗證中發黃則茵陳蒿湯也又曰陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如故所以然者脈遲故也常氏云可茯苓湯五苓散雍曰宜千金方谷疸丸又曰太陽中風以火劫發汗兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還小便利者其人可治雍曰治法在不可火證中身黃者茵陳湯小便難者五苓散又曰寸口脈陽浮而陰濡弱陽浮則為風陰濡弱為少血浮虛受風少血發熱醫以火熏尉令汗出惡寒遂甚客熱因火而發身因為黃小便難鼻中出血復下之熱瘀在膀胱蓄結成積聚狀如豚肝當下不下心亂狂走赴水蓄血若去目明心了此皆醫所為輕者得愈劇者不治雍曰詳治在不可火證中先下積血次身黃小便難治如前證又曰陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難雍曰治在陽明證中身目黃茵陳蒿湯小便難者五苓散又曰傷寒發熱口中勃勃氣出頭痛目黃衄不可制雍曰治在不可下證中目黃如前法治又曰得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難雍曰治在吐下後證中身黃小便難治如前法千金方曰諸病黃疸宜利其小便假令脈浮當以汗解宜桂枝黃耆湯又曰傷寒熱出表發黃疸麻黃醇酒湯冬用宜酒春用宜水又曰治黃疸鼻中取黃汁宜瓜蒂赤小豆秫米末名瓜丁散又曰時行病急黃並瘴癘疫氣痎瘧宜茵陳丸余見千金十卷今千金三十四卷巢氏曰傷寒陽明病無汗小便不利心中懊憹必發黃被火額上微汗出而小便不利亦發黃其人黃如橘色或如桃枝色腹微滿此由寒濕氣不散瘀熱在脾胃也又時氣發黃候曰濕氣盛蓄於脾胃脾胃有濕則新谷鬱蒸不能消化大小便結澀故發黃又溫病候曰發汗不解溫毒氣瘀結在內小便為之不利故發黃雍曰巢氏所論即仲景陽明懊憹被火二證及寒濕一證而已亦甚略也言簡多不盡意大抵瘀熱在裡不解必為黃熱在膀胱亦為黃也桃枝色者孫真人云久則變作桃皮色也又巢氏黃病論曰黃病一身盡痛發熱面色深黃七八日後熱結在裡有血當下如豚肝狀龐氏云有血抵當湯狂者血下必自愈其人少腹滿急若眼睛澀痛鼻骨疼兩膊及項強腰背急則是黃候大便澀但得小便利則不慮死矣不用大便多多則心腹脹不住此由寒濕在裡則熱蓄於脾胃腠理不開瘀熱與宿谷相搏鬱蒸不得消散則大小便不通故身體面背變黃色凡黃候其寸口近掌無脈鼻口氣冷並死不治活人書曰病人寒濕在裡不散熱蓄於脾胃腠理不開瘀熱與宿谷相搏鬱蒸不消化故發黃此皆巢氏之言惟改一表里字又曰發黃與瘀血外證及脈俱相似但小便不利為黃小便自利為瘀血要之發黃之人心脾蘊積發熱引飲脈必浮滑而緊數若瘀血證發狂大便必黑此為異耳凡病人身體發熱頭面汗出身無汗劑頸而止渴引水漿小便不利如此必發黃茵陳蒿湯五苓散加茵陳主之又曰茵陳蒿湯十分五苓散五分二藥拌勻每服三錢溫酒調服日三服即以茵陳蒿湯調五苓散服之最良病人服湯得小便利如皂角色赤一宿腹減則黃從小便中出也梔子柏皮湯麻黃連翹赤小豆湯皆可選用又曰傷寒欲發黃者急用瓜蒂末口含水搐一字許入鼻中出黃水甚驗又曰太陽病一身盡痛發熱身如熏黃者何也太陽中濕也雍曰宜五苓散太陽下宜有一病字中濕原本是溫字又曰白虎證與發黃相近遍身汗出此為熱越白虎證也頭面汗出頸以下都無汗發黃證也雍曰白虎證遍身汗出安能發黃故仲景言陽明熱越不得發黃也雍曰巢氏黃病一論未為該通而諸家傷寒論中多從之夫致黃之由非一或誤下或火熏皆能成黃非止寒熱穀氣而已大抵寒邪中人久不能去變為熱毒假春風發動表為可出之時既動則不可復回而腠理不開無由作汗而出鬱而在裡終不能散淫邪泮衍血脈傳流其毒之重者遇血相搏不能勝為之變結或如豚肝或如墨色此為邪氣所敗之血也無以泄其邪則血枯而人死其輕者鼓血而上隨衄可出澀者因促滑氣而下隨溺可去既不能與血相搏又不能開腠理而生汗上不可出下不可去乃散於毛竅之際已失所舍而無可定止進退不能郁為至黃之色以待汗與溺而後通此毒非不欲出也猶人之行及門而無路也醫者疏通其道而指示之不為汗則為溺未有不去之理然毒在腠理之內與正氣爭持正邪相窒毛孔亦不可開是以不能作汗必從開竅利小便而出此所以毒氣在裡不能出者必成黃血二證雖輕重上下不同其理一也有可汗而出者乎曰脈浮甚者其表必疏可汗而出之也龐氏曰孫真人云凡遇天行熱病多內熱發黃但用瓜丁散納鼻中黃水出乃愈即後不復病患黃矣常須謹候病人四肢身面微似有黃氣即速行瓜丁散不可令散漫失候必大危矣特忌酒面色欲犯者不治瓜丁細辛含水搐一字許千金方三味不同
