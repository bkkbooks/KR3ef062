body:
  text: 卷十一發汗吐下後七十三條仲景曰脈微而澀者此為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛暑欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒陰弱則發熱此醫發其汗使陽氣微又大下之令陰氣弱五月之時陰氣在裡胃中虛冷以陽氣內微不能勝冷故欲著復衣十一月之時陽氣在內胃中煩熱以陰氣內弱不能勝熱故欲裸其身又陰脈遲澀故知亡血也龐氏曰陽微宜四逆湯陰弱宜苦酒艾之類常氏云宜小建中湯雍日陽微陰弱之症其候至微亦未易言仲景初謂亡血之人病當先寒後乃發熱則一病之內陽微陰弱之症先後俱見也故言醫發汗使陽氣微又大下之使陰氣弱則知一病是二證也夏月盛熱欲著復衣冬月盛寒欲裸其身謂暑月猶有寒不必重言其熱寒月猶有熱不必重言其寒也若如是則暑月有寒熱寒月亦有寒熱非五月病者獨見寒十月病者獨見熱也故常氏用小建中湯似得其意令陰陽兩建之雖藥證相得第恐力微此外亦無藥矣龐氏分寒熱為兩證則陽微用四逆陰弱用酸苦然疾證初不分用藥又難分也夫然則當見寒時用四逆又恐後乃發熱時熱大甚不可制若龐氏藥用之於表熱裡寒表寒裡熱之證則相宜蓋表熱裡寒表寒裡熱是自兩病非陽微陰弱同病之證也粗工以表熱裡寒表寒裡熱便為陽微陰弱者尤非是此證雖甚希有而前人論説尚多失仲景之意則後人用藥宜審矣又曰寸口脈浮大而醫反下之此為大逆浮則無血大則為寒寒氣相搏則為腹鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人則䭇常氏云宜甘草豆蔻散又曰太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之又曰脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出而解所以然者尺中脈微此裡虛須表裡實津液自和即自汗出愈常氏云疑缺雍曰宜柴胡桂枝湯又曰凡病若發汗若吐若下若亡血若亡津液陰陽自和者必自愈又曰大下後復發汗小便不利者亡津液故也勿治之得小便利必自愈又曰下之後復發汗必振寒脈微細所以然者內外俱虛故也常氏云可耆參建中湯又曰本發汗而反下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆雍曰此謂病當先汗而反先下之者故為逆若已汗而後下之不為逆也若病當先下而反先汗之故為逆若已下而後汗之不為逆也又曰太陽病先下之而不愈因復發汗以此表裡俱虛其人因致冒冒家當汗出自愈所以然者汗出表和故也得里未和然後復下之常氏云可桂枝大柴胡湯雍曰大字誤當是兩藥先用柴胡桂枝湯和其表復下之者用大柴胡湯又曰得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與小柴胡湯後必下重本渴飲水而嘔者柴胡不中與也食谷者噦常氏曰可柴胡桂枝湯乾薑湯飲水嘔者五苓散噦者小半夏湯又曰太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四五日復下之此作協熱利也常氏云可理中湯結胸者大陷胸湯協熱利表不解者桂枝人參湯又曰太陽病下之其脈促一作緩不結胸者此為欲解也脈浮者必結胸脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者必協熱利脈浮滑者必下血常氏云結胸陷胸湯咽痛豬膚湯兩脅拘急小建中湯頭痛未止小柴胡湯嘔者小半夏湯協熱利者白頭翁湯下血者柏皮湯雍曰柏皮湯用梔子柏皮湯又曰太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩常氏云可陷胸湯雍曰太少二陽水木無負因下傷胃三陽俱病輕者不成結胸宜理中湯或無效者宜枳實理中丸又曰脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳常氏曰宜小陷胸湯增損理中丸雍曰先枳實理中湯不解用半夏瀉心湯又曰傷寒吐下發汗後虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿常氏云可茯苓桂枝五味甘草湯成痿者振痿湯甘草湯未見方疑用茯苓桂枝白朮甘草湯又曰陽明病不能食若攻其熱必噦所以然者胃中虛冷故也以其人本虛攻其熱必噦常氏云可溫中湯小半夏湯雍曰宜理中湯又曰陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如故所以然者脈遲故也常氏云可茵陳湯五苓散雍曰此當煎茵陳湯一物調五苓散作茵陳蒿湯也又曰夫病陽多者熱下之則硬汗多極發其汗亦硬常氏云可小柴胡湯又曰太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也常氏云可生薑半夏二瀉心湯又曰太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬常氏云可桂枝加芍藥湯桂枝加大黃湯雍曰本太陽病反下之因腹滿痛轉屬太陰者桂枝加芍藥湯主之大實痛者用桂枝加大黃湯今證吐而食不下自利腹滿自痛皆無實證不可便用桂枝加大黃湯有微寒者當宜桂枝加附子湯存芍藥而不去也又曰傷寒大吐大下之極虛復極出汗者其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也常氏云可小溫中湯雍曰胃寒甚者理中湯噦者小半夏湯五苓散又曰吐利發汗後脈平小煩者以新虛不勝穀氣故也常氏曰可調胃承氣湯雍曰勿服藥奪其食則愈以脈平不可再損也又曰太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈常氏云可小柴胡湯桂枝龍骨牲蠣湯雍曰心下痞者枳實理中丸燒針胸煩桂枝加龍骨牡蠣湯外證未除者桂枝加人參湯又曰太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微一作浮緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢屬桂枝麻黃各半湯又曰服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者屬桂枝去桂加茯苓白朮湯又曰太陽病先發汗不解而下之脈浮者為不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯雍曰此證本當先汗所謂若先發汗治不為逆也又曰下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉遲身無大熱者屬乾薑附子湯雍曰此證本當先下所謂若先下之治不為逆也又曰傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者屬茯苓桂枝白朮甘草湯又曰發汗若下之後病仍不解煩躁者茯苓四逆湯又曰發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹屬梔子豉湯若少氣者梔子甘草豉湯若吐者梔子生薑豉湯又曰發汗若下之而煩熱胸中窒者屬梔子豉湯證又曰太陽證過經十餘日心下溫溫欲吐胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者當調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也雍曰龐氏云屬調胃承氣湯誤也本論原無屬字不可妄加此一論當分作二證所以本論繼之以承氣方者謂前證當用之方非後證所屬也自若不爾之下非柴胡湯證為後證本論門治法宜生薑橘皮湯大半夏加橘皮湯又曰太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱一云日晡所發心胸大煩從心下至少腹硬滿而痛不可近者屬大陷胸湯又曰傷寒五六日已發汗而後下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也屬柴胡桂枝幹薑湯又曰傷寒發汗若吐若下解後心下痞硬噫氣不除者屬旋覆代赭石湯又曰傷寒大下之後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯又曰傷寒若吐下後七八日不解結熱在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯又曰傷寒若吐若下後不解不大便五六日上至十餘日其人日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安一作循衣妄撮怵惕不安微喘直視脈弦者生澀者死微者但發熱譫語者屬大承氣湯又曰三陽合病腹重身重難以轉側口不仁面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者屬白虎湯又曰陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出而不惡寒反惡熱身重若發汗則躁心憒憒而反譫語若加溫針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心下懊憹舌上苔者屬梔子豉湯龐氏依論云凡用梔子湯得效即止後服病人舊微溏者不可與之又曰陽明病下之心中懊憹而煩胃中有燥屎者可攻其人腹微滿初頭硬後必溏者不可攻之若有燥屎者宜大承氣湯又曰陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者屬梔子豉湯又曰太陽病若吐若下若發汗後微煩小便數大便因硬者與小承氣湯和之愈又曰大汗若大下利而厥冷者屬四逆湯又曰太陽病下之後其氣上衝者可與桂枝湯若不上衝不得與之雍曰不上衝者依後三證用桂枝去芍藥加附子湯桂枝加厚朴杏子湯葛根黃芩黃連湯又曰太陽病下之後脈促胸滿者促一作縱屬桂枝去芍藥湯若微惡寒者桂枝去芍藥加附子湯本論二證脈經合為一又曰太陽病桂枝證醫反下之利遂不止脈促一作縱者表未解也喘而汗出者屬葛根黃芩黃連湯又曰太陽病下之微喘表未解也屬桂枝加厚朴杏子湯又曰傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯常氏云疑其誤當用麻黃湯及各半湯取大汗雍曰有汗當用桂枝無汗當用麻黃也詳見衄血門中又曰傷寒五六日大下之後身熱不去心中結痛者未欲解也屬梔子豉湯又曰傷寒下後心煩腹滿臥起不安者屬梔子厚朴湯又曰傷寒醫以丸藥大下之身熱不去微煩者屬梔子乾薑湯又曰傷寒下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯又曰太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急其人鬱郁微煩者為未解可與大柴胡湯下之愈雍曰與小柴胡湯嘔止小安者勿服大柴胡也又曰傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜服小柴胡湯以解外後以柴胡加芒硝湯主之又曰傷寒十三日過經譫語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也屬調胃承氣湯又曰傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不得轉側者屬柴胡加龍骨牡蠣湯又曰火逆下之因燒針煩躁者屬桂枝甘草龍骨牡蠣湯又曰太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而更惡寒表未解也醫反下之動數變遲膈內拒痛一作頭痛即眩胃中空虛客氣動膈短氣煩躁心中懊憹陽氣內陷心下因硬則為結胸屬大陷胸證若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃常氏云可茵陳蒿湯調五苓散又曰傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之若但滿而不痛此為痞柴胡不中與之屬半夏瀉心湯又曰本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者屬五苓散脈經云一方言忍之一日乃愈又曰傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也屬甘草瀉心湯又曰傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦服赤石脂禹餘糧湯復利不止者當利其小便龐氏云可五苓散又曰太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者屬桂枝人參湯又曰下後不可更行桂枝湯汗出而喘無大熱者屬麻黃杏子甘草石膏湯又曰病人無表裡證發熱七八日脈雖浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血也屬抵當湯又曰若脈數不解而下不止必協熱便膿血又曰本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛者屬桂枝加大黃湯又曰傷寒六七日大下後寸脈沉而遲手足厥冷下部脈不至咽喉不利吐膿血泄利不止者為難治屬麻黃升麻湯又曰傷寒本是自寒下醫復吐下之寒格更逆吐下若食入口即出屬乾薑黃芩黃連人參湯此證依脈經定千金翼曰大下後口燥者裡虛故也龐氏曰因發汗時汗出如水漏下還復汗少喘促不止脈促而按之濡者合當汗而解脈促而按之實者死若脈浮手足微厥面垢唇青昏憒而喘者陰陽未和氣阻升降宜服順陰陽五味子湯又曰發汗或下後痞滿或成結胸氣塞不通宜檳榔散
