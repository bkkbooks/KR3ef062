body:
  text: 卷十二病可溫十三條雍曰仲景本論門自三陰三陽至發汗吐下以後證而終自病可溫以下本論原無門目其論説皆仲景之言其見於三陽三陰諸門者王叔和重出於脈經以備倉猝尋按今依脈經所撰録諸後仲景曰大法冬宜服熱藥及灸又師曰病發熱頭痛脈反沉若不瘥身體疼痛當救其里宜溫藥四逆湯雍曰凡溫藥皆用四逆湯厥脈細者宜當歸四逆湯凡脈微欲絶及脈不出者通脈四逆湯內有久寒者當歸四逆加吳茱萸生薑湯主之又曰下利腹脹滿身體痛先溫其里宜四逆湯又曰自利不渴者屬太陰以其臟有寒故也當溫之宜四逆輩又曰少陰病其人飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲若膈上有寒飲乾嘔者不可吐當溫之宜四逆湯又曰少陰病脈沉者急溫之宜四逆湯又曰下利欲食者就當溫之又曰下利脈遲緊為痛未欲止當溫之得冷者滿而便腸垢又曰下利其脈浮大此為虛以強下之故也設脈浮革因爾腸鳴當溫之宜當歸四逆湯又曰少陰病下利脈浮澀者必嘔汗出必數更衣反少當溫之又曰傷寒醫下之續得下利清穀不止身體疼痛急當救里宜溫之以四逆湯龐氏以凡病發熱頭疼脈反沉若不瘥身體疼痛者脈浮遲表熱裡寒下利清穀者汗出熱不去內拘急支節疼四逆者下利厥逆惡寒者下利腹痛脹滿身疼痛脈浮者凡五證先用四逆湯溫其里得利止乃可隨證用藥攻表也病不可灸七條仲景曰微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也常氏云宜桂枝去芍藥加蜀漆牡蠣龍骨救逆湯欲其有汗宜柴胡桂枝湯又曰脈浮當以汗解而反灸之邪無從出因火而盛病從腰以下必重而痺名為火逆若欲自解當先煩乃有汗隨汗而解何以知之脈浮故知汗出當解又曰火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之又曰脈浮熱甚而灸之此為實實以虛治因火而動必咽燥吐血又曰傷寒脈浮醫以火迫劫之亡陽驚狂臥起不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯龐氏曰灸及燒針之後證以火劫者並宜火劫法治之煩躁驚及狂用六石風引湯尤良柴胡加龍骨牡蠣湯亦通用又曰不當灸而誤灸令火邪入腹干錯五臟重加煩死雍曰凡火邪逆證者宜桂枝甘草龍骨牡蠣湯病可灸八條仲景曰燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上一壯與桂枝加桂湯更加桂又曰少陰病得之一二日口中和其背惡寒者當灸之又曰少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯雍曰凡灸少陰下利諸證皆兼服四逆湯又曰少陰病下利脈微澀嘔而汗出必數更衣反少當溫其上灸之一云灸厥陰五十壯當灸百會又曰諸下利皆可灸足大都五壯一云七壯商邱陰陵泉皆三壯又曰下利手足厥無脈灸之不溫脈不還反微喘者死少陰負趺陽者為順也又曰傷寒脈促手足厥逆可灸之為灸少陰厥陰主逆龐氏曰當灸不灸令病人冷結久而彌固氣衝心必死病不可刺八條雍曰脈經與可刺不可刺二門所載素問靈樞經語又有異者今改從本經字有當者即從脈經仍據所出之處以別非仲景之言靈樞經曰九刺之禁新內勿刺已刺勿內大怒勿刺已刺勿怒方醉勿刺已刺勿醉大勞勿刺已刺勿勞大飢勿刺已刺勿飢大渴勿刺已刺勿渴大驚大恐必定其氣乃刺之又曰粗工勿察是謂伐身靈樞又曰毋刺熇熇之熱毋刺漉漉之汗毋刺渾渾之脈此刺病與脈相逆者又曰五臟之腧出於背者灸之則可刺之則不可靈樞又曰熱病身熱甚陰陽皆靜脈經作爭者勿刺之其可刺者急取之不汗出則泄所謂勿刺者有死徵也靈樞又曰上工刺其未生者也其次刺其未盛者也其次刺其已衰者也脈經云粗工逆此謂之伐形靈樞又曰熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿甚者死五曰汗不出吐下血者死六曰舌本爛熱不已者死七曰咳而衄汗不出出不至足者死八曰髓熱者死九曰熱而痙者死凡此九者不可刺也脈經無此素問靈樞禁不刺者甚多詳見補亡禁刺門仲景曰太陽傷寒者加溫針必驚也常氏云宜服救逆湯病可刺二十九條仲景曰太陽病頭疼至七日自愈者其經竟故也竟字仲景作盡若欲再作經者針足陽明使經不傳則愈龐氏云補三里穴又曰太陽病初服桂枝湯而反煩不解者當先刺風池風府卻與桂枝湯則愈又曰傷寒腹滿而譫語寸口脈浮而緊者此為肝乘脾名曰縱刺期門又曰傷寒發熱嗇嗇惡寒其人大渴欲飲水漿者其腹必滿若自汗出小便利其病欲解此肝乘肺也名曰橫刺期門又曰陽明病下血譫語此為熱入血室但頭汗出者當刺期門隨其實而瀉之濈然汗出則愈又曰婦人中風發熱惡寒經水適來得之七八日熱除脈遲身涼胸脅下滿如結胸狀譫語此為熱入血室當刺期門隨其實而瀉之叔和曰平病云熱入血室無犯胃氣及上二焦雍曰與此相反豈謂藥不謂針耶又曰太陽與少陽並病頭痛頸項強而眩時如結胸心下痞硬當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五日不止當刺期門又曰少陰病下利便膿血可刺又曰婦人傷寒懷身腹滿不得小便從腰以下重如有水氣狀懷身七月太陰當養不養此心氣實當刺瀉勞宮及關元小便利則愈又曰傷寒喉痹刺手少陰在脘當小指後動脈是也針入三分補之素問曰有病身熱汗出煩滿不為汗解此為何病岐伯曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥巨陽主氣故先受邪少陰與其為表裡也得熱則上從之從之則厥也表裡刺之飲之湯劑雍曰此傷寒感異氣變而為風厥也宜刺太溪崑崙服茯苓桂枝甘草大棗湯靈樞經曰熱病三日氣口靜人迎躁者取之諸陽五十九刺以瀉其熱而出其汗實其陰以補其不足素問曰病甚者為五十九刺靈樞曰所以五十九刺者兩手外內側各三凡十二痏五指間各一凡八痏足亦如之亦八痏也頭入發一寸旁三分各三凡六痏更入發三寸邊各五凡十痏耳前後口一作耳下項中各一凡六痏巔上一囟會一髮際一廉泉一風池二天柱二此五十九穴也雍曰五十九刺出於二經見於仲景叔和二書然未聞有善用之者古人第存之而不敢廢上古之法後有靈樞十一症亦多不能解者亦不能廢法耳靈樞經曰熱病先膚痛窒鼻充面取之皮以第一針五十九苛軫一云苛干鼻索皮於肺不得索之火火心也軫車上前後兩端橫木也言鼻塞之甚內外不通亦猶軫之橫塞也又曰熱病嗌乾多飲善驚臥不得安一作臥不能起取之膚肉以第六針五十九目眥青索肉於脾不得索之木木肝也又曰熱病面青腦痛手足煩取之筋間以第四針針於四逆一作邊筋闢一作躄目浸索筋於肝不得索之金金肺也又曰熱病數驚瘛瘲而狂取之脈以第四針急瀉有餘者癲疾毛髮去索血一作脈於心不得索之水水腎也又曰熱病而身重骨痛耳聾而好瞑取之骨以第四針五十九刺骨病食一作不食齧牙齒耳青一作清索骨於腎不得索之土土脾也又曰熱病先身傍勃太素作倚本經作澀倚而熱煩悶干唇口嗌取之脈以第一針五十九膚脹口乾寒熱本經作寒汗出索脈於心不得索之於水水者腎也又曰熱病頭痛顳顬目瘈脈痛善衄厥熱病也取之以第三針視有餘不足寒熱痔又曰熱病體中病重腸中熱取之以第四針於其腧及下諸指間索氣於胃絡得氣也又曰熱病俠臍急痛胸脅支滿取之湧泉與太陰陽明經作陰陵泉以第四針針嗌裡又曰熱病而汗且出之經作及脈順可汗者取之魚際太淵大都太白瀉之則熱去補之則汗出汗出太甚者取內踝上橫文一作脈以止之又曰熱病七八日脈口動喘而短者兼刺之汗且自出淺刺手大指間素問曰熱病先胸脅痛手足躁刺足少陰補足一作手太陰病甚者為五十九刺王冰云足少陽邱虛取之又曰熱病始手臂痛者刺手陽明太陽而汗出止王云臂痛列缺主之取汗商邱主之又曰熱病始於頭首者刺項太陽而汗出止王云足太陽天柱主之又曰熱病先身重骨痛耳聾好瞑刺足少陽病甚為五十九刺又曰熱病先眩冒而熱胸脅滿刺足少陰少陽又曰熱病始於足脛者刺足陽明而汗出止此出甲乙經病不可水十條仲景曰發汗後飲水多者必喘以水灌之亦喘常氏云微喘宜麻黃杏子甘草石膏湯雍曰飲水多者五苓散又曰傷寒大吐大下之極虛復極汗出者其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也常氏曰可小溫中湯小半夏湯雍曰胃寒理中湯噦者半夏湯五苓散又曰陽明病潮熱大便微硬可與承氣湯不堅勿與之若不大便六七日恐有燥屎欲知之法可與小承氣湯若腹中不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食欲飲水者與水則噦雍曰可溫中湯噦者小半夏湯又曰下利其脈浮大此為虛以強下之故也設脈浮革因爾腸鳴當溫之與水噦雍曰宜溫中湯又曰病在陽當以汗解而反以冷水噀之若灌之其熱被卻不得去彌更益煩皮上粟起意欲飲水反不渴宜文蛤散若不瘥與五苓散若寒實結胸無熱證者與三物小陷胸湯白散亦可服身熱皮粟不解欲引衣自覆若以水灌之洗之益令熱卻不得出當汗而不汗即煩假令汗出已腹中痛與芍藥三兩如上法又曰寸口脈浮大醫反下之此為大逆浮則無血大則為寒寒氣相搏則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人則䭇常氏云宜草豆蔻散又曰寸口脈濡而弱濡則惡寒弱則發熱濡弱相搏臟氣衰微胸中苦煩此非結熱而反薄居水漬布冷銚貼之陽氣遂微諸腑無所依陰脈凝聚結在心下而不肯移胃中虛冷水穀不化小便縱通復不能多微則可救聚寒心下當奈何也千金翼曰太陽病小便利者為水多心下悸雍曰宜小半夏加茯苓湯仲景曰凡得時氣病至五六日而渴欲飲水飲不能多不當與也何者以腹中熱尚少不能消之便更與人作病也至七八日大渴欲飲水者猶當依證而與之與之常令不足勿極意也言能飲一斗與五升若飲而腹滿小便不利若喘若噦不可與之也飲而忽然大汗出是為自愈也又曰凡得病反能飲水者此為欲愈之病其不曉病者但聞病人飲水自愈小渴者乃縱與之飲因成其禍不可復救也龐氏曰凡病非大渴不可與飲冷水若小渴口燥咽乾少少呷水滋潤之若不與水則乾燥無由作汗煩喘而死者多巳但勿令足意飲也若大汗將來燥渴甚者但足意飲之勿疑若小渴強飲者致停飲心下滿結喘而死者多矣其有熱脈數尚可作汗而解者出於幸之幸也病可水八條仲景曰太陽病發汗後若大汗出胃中干煩躁不眠其人欲得飲水者當稍飲之令胃中和則愈又曰厥陰病渴欲飲水者少少與之愈又曰太陽病寸緩關浮尺弱其人發熱汗出復惡風寒不嘔但心下痞者此為醫下之也若其不下病人不惡寒而渴者為轉屬陽明小便數者大便則堅不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散又曰寸口脈洪而大數而滑洪大則營氣長滑數則胃氣實營氣長則陽盛怫鬱不得出身胃實則堅難大便則乾燥三焦閉塞津液不通醫發其汗陽氣不周復重下之胃燥蓄熱大便遂燥小便不利營衛相搏心煩發熱兩眼如火鼻乾面赤舌燥齒黃焦故大渴過經成壞病針藥所不能制與水灌枯稿陽氣微散身寒溫衣覆令汗出表裡通然其病即除形脈都不同此愈非治法但醫所當慎妄犯傷營衛又曰嘔吐而病在膈上後思水者解急與豬苓散飲水亦得也千金亦曰必思煮餅急思水者與五苓散飲之余同又曰霍亂而頭痛發熱身體疼痛熱多飲水者屬五苓散龐氏曰病人水藥入口則吐或渴而嘔者或汗後脈尚浮而煩渴者或下利渴而小便不利者或嘔而小便不利者五苓散皆主之或因渴停水心下短息者難治又曰若頭痛無熱但狂言煩躁不安精神不與人相當勿以火導之但以豬苓散方寸匕服之當連飲新水三升即令指刺喉中吐去之病隨手愈若不能吐者而強與水水停則結心下也當以藥吐之不爾更致危病若當吐不時以豬苓散吐之其死殆速矣亦可針之佳水飲膈實難治此三死一生也千金之文病不可火十一條仲景曰太陽中風以火劫發其汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾循衣摸床小便利者可治雍曰宜桂枝去芍藥加蜀漆牡蠣龍骨救逆湯五苓散又曰太陽病醫發汗遂發熱惡寒復下之則心下痞此表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈雍曰發熱惡寒宜小柴胡湯心下痞者生薑瀉心湯火逆宜救逆湯又曰陽脈浮陰脈弱則血虛虛則筋急其脈沉者營氣微也其脈浮而汗出如流珠者衛氣衰也營氣微者加燒針則血流不行更發熱而煩躁也雍曰和營衛宜柴胡桂枝湯因燒針煩躁者宜桂枝甘草龍骨牡蠣湯也又曰傷寒脈浮醫以火劫迫之亡陽必驚狂臥起不安者屬桂枝去芍藥加蜀漆牡蠣龍骨救逆湯又問曰得病十五六日身體黃下利狂欲走師脈之言當下清血如豚肝乃已後如師言何以知此師曰寸口脈陽浮而陰濡陽浮為風陰濡為弱為少血一作虛浮虛受風少血發熱惡寒灑淅項強頭眩醫加以火熏郁令汗出惡寒遂罷客熱因火而發怫鬱蒸肌膚身目為黃小便微難短氣從鼻中出血而復下之胃無津液泄利遂不止熱瘀在於膀胱蓄結成積聚狀如豚肝當下不下心亂迷憒奔走赴水不能自制蓄血若去目明心了此皆醫所為他無禍患微輕者得愈重極者不治雍曰宜犀角地黃湯有熱如狂者加黃芩又曰形作傷寒其脈不弦緊而弱弱者必渴被火者譫語弱者發熱脈浮解之當汗出愈雍曰宜救逆湯又曰太陽病以火熏之不得汗其人必躁到經不解必圊血雍曰宜犀角地黃湯又曰陽明病被火額上微汗出而小便不利必發黃常氏云可茵陳湯五苓散又曰陽明病其脈浮緊咽乾口苦腹滿而喘發熱汗出不惡寒反惡熱身體重發汗則躁心憒憒而反譫語加溫針必怵惕煩躁不得眠雍曰宜桂枝甘草龍骨牡蠣湯若誤下者梔子豉湯龐氏曰脈浮緊不可下恐變風溫宜詳之又曰少陰病咳而下利譫語是謂被火氣劫也故小便必難為強責少陰汗也常氏云宜用救逆湯解其火氣五苓散通其小便又曰太陽病二日反躁反尉其背大汗出火氣入胃胃中水竭躁煩必發譫語十餘日振栗自下利者此為欲解也故其汗從腰以下不得汗其人欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及多大便已其頭卓然而痛其人足心必熱穀氣下流故也雍曰大便堅及煩躁譫語者宜調胃承氣湯以和其胃不得小便者宜五苓散病可火二條仲景曰下利穀道中痛當溫之當以熬鹽末尉之一方炙枳實尉之千金翼云宜炙枳實若熬鹽等如炒蠶沙之類皆可尉龐氏言枳實末與鹽相兼用益佳或單用枳實末非枳實須逐片炙用即枳殼也龐氏曰臍中冷結不可便尉冷氣攻心腹必死須先用藥溫之久而可尉之又曰臍下冷結或關陽去者大小便不通服藥雖多不見效炒鹽尉臍下須臾即通若病人已服巴豆甘遂大黃輕粉之類過多者略通則大利而損人宜詳之火邪三條龐氏曰傷寒醫以火置臥床下或周身用火迫劫汗或尉或誤灸皆火邪也仲景曰傷寒脈浮醫以火迫劫之亡陽必驚狂或臥起不安者宜桂枝去芍藥加蜀漆牡蠣龍骨救逆湯又曰火逆下之因燒針煩躁者桂枝甘草湯主之雍曰可代救逆湯用之龐氏曰灸及燒針後證似火劫者並宜以火劫治之煩躁驚及狂用金匱風引湯尤良柴胡加龍骨牡蠣亦通用千金方曰其病形不可灸因火為邪散走血脈傷脈尚可傷臟則劇井俞冗腫黃汗自出經絡外爛肉腐為癰膿此為火疸醫所傷也雍曰千金翼有火疸一證錯簡在狐惑後又並微數之脈不可灸證合為一又云應用瀉心湯其言舛謬不可續微數之脈不可灸已見本門獨留火疸一證似屬火邪故録於此外臺以瀉心湯治蝕於上部屬狐惑亦系火疸微數脈於後其誤久已
