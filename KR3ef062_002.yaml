body:
  text: 卷二仲景辨脈法三十八條雍曰辨脈者辨傷寒之脈也平脈者平衆脈也今辨脈法中雖有意相槎丫者世以仲景之法只此二篇垂百世之師範雖王叔和撰次一字不敢妄易仍舊次第録之其問答皆仲景本文也仲景問曰脈有陰陽何謂也答曰凡脈大浮數動滑此名陽也脈沉澀弱伏一作弦微此名陰也凡陰病見陽脈者生陽病見陰脈者死雍曰此謂陰脈陽脈非謂脈之陰陽也又問曰脈有陽結陰結者何以別之答曰其脈浮而數能食不大便者此為實名曰陽結也期十七日當劇其脈沉而遲不能食身體重大便反硬者名曰陰結也期十四日當劇又問曰病有灑淅惡寒而復發熱者何答曰陰脈不足陽往從之陽脈不足陰往乘之曰何謂陽不足答日假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也曰何謂陰不足答曰尺脈弱名曰陰不足陽氣下陷入陰中則發熱也陽脈浮陰脈弱浮一作微者則血虛血虛則筋急也其脈沉者營氣微也其脈浮而汗出如流珠者衛氣衰也營氣微者加燒針則血流不行更發熱而躁煩也又曰脈藹藹如車蓋者名曰陽結也一云秋脈又曰脈纍纍如循長竿者名曰陰結也一云夏脈又曰脈瞥瞥如羹上肥者陽氣微也又曰脈縈縈如蜘蛛絲者陽氣衰也一云陰氣又曰脈綿綿如瀉漆之絶者亡其血也又曰脈來緩時一止復來者名曰結脈來散時一止復來者名曰促一作縱脈陽盛則促陰盛則結此皆病脈又曰陰陽相搏名曰動陽動則汗出陰動則發熱形冷惡寒者此三焦傷也若數脈見於關上上下無頭尾如豆大厥厥動搖者名曰動也又曰陽脈浮大而濡陰脈浮大而濡陰脈與陽脈同等者名曰緩也又曰脈浮而緊者名曰弦也弦者狀如弓弦按之不移也脈緊者如轉索無常也又曰脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人則半産漏下男子則亡血失精又問曰病有戰而汗出因得解者何也答曰脈浮而緊按之反芤此為本虛是以發戰以脈浮故當汗出而解也若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也又問曰病有不戰而汗出解者何也答曰脈大而浮數故知不戰汗出而解也雍曰即前問不芤之證又問曰病有不戰不汗出而解者何也答曰其脈自微此以曾經發汗若吐若下若亡血以內無津液此陰陽自和必自愈故不戰不汗出而解也又問曰傷寒三日脈浮數而微病人身涼和者何也答曰此為欲解也解以夜半脈浮而解者濈然汗出也脈數而解者必能食也脈微而解者必大汗出也又問曰脈病欲知愈未愈者何以別之答曰寸口關上尺中三處大小浮沉遲數同等雖有寒熱不解者此脈陰陽為和平雖劇當愈又曰立夏得洪大脈洪一作浮是其本位其人病身體苦疼重者鬚髮其汗若明日身不疼不重者不須發汗若汗濈然自出者明日便解矣何以言之立夏脈洪大是其時脈故使然也四時仿此又問曰凡病欲知何時得何時愈答曰假令夜半得病明日日中愈日中得病夜半愈何以言之日中得病夜半愈者以陽得陰則解也夜半得病明日日中愈者以陰得陽則解也又曰寸口脈浮為在表沉為在裡數為在腑遲為在臟假令脈遲此為在臟也又曰趺陽脈浮而澀少陰脈如經者其病在脾法當下利何以知之若脈浮大者氣實血虛也今趺陽脈浮而澀故知脾氣不足胃氣虛也以少陰脈弦而浮一作沉才見此為調脈故稱如經也若反滑而數者故知當屎膿也又曰寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷營營衛俱病骨節煩疼可發其汗又曰趺陽脈遲而緩胃氣如經也趺陽脈浮而數浮則傷胃數則動脾此非本病醫特下之所為也營衛內陷其數先微脈反但浮其人必大便硬氣噫而除何以言之本以數脈動脾其數先微故知脾氣不治大便硬氣噫而除今脈反浮其數改微邪氣獨留心中則飢邪熱不殺穀潮熱發渴數脈當遲緩脈因前後度數如法病者則飢數脈不時則生惡瘡也又師曰病人脈微而澀此為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛熱欲著覆衣冬月盛寒欲裸其身所以然者陽微則惡寒陰弱則發熱此醫發其汗使陽氣微又大下之令陰氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著覆衣十一月之時陽氣在裡胃中煩熱以陰氣內弱不能勝熱故欲裸其身又陰脈遲澀故知亡血也又曰脈浮而大心下反硬有熱屬臟者攻之不令發汗屬腑者不令溲數溲數則大便硬汗多則熱愈汗少則便難脈遲尚未可攻又曰脈浮而洪身汗如油喘而不休水漿不下形體不仁乍靜乍亂此命絶也又未知何臟先受其災若汗出發潤喘不休者此為肺先絶也陽反獨留形體如煙燻直視搖頭者此為心絶也唇吻反青四肢漐習者此為肝絶也環口黧黑柔汗發黃者此為脾絶也溲便遺失狂言目反直視者此為腎絶也又未知何臟陰陽前絶若陽氣前絶陰氣後竭者其人死身色必青陰氣前絶陽氣後竭者其人死身色必赤腋下溫心下熱也又曰寸口脈浮大而醫反下之此為大逆浮則無血大則為寒寒氣相搏則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人即䭇音一又曰趺陽脈浮浮則為虛浮虛相搏故令氣䭇言胃氣虛竭也脈滑則為噦此為醫咎責虛取實守空迫血脈浮鼻中燥者必衄也又曰諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常者蓄積有膿也又曰脈浮而遲面熱赤而戰惕者六七日當汗出而解反發熱者瘥遲遲為無陽不能作汗其身必癢也又曰寸口脈陰陽俱緊者法當清邪中於上焦濁邪中於下焦清邪中上名曰潔也濁邪中下名曰渾也陰中於邪必內栗也表氣微虛裡氣不守故使邪中於陰也陽中於邪必發熱頭痛項強頸攣腰痛脛酸所謂陽中霧露之氣故曰清邪中上濁邪中下陰氣為栗足膝逆冷便溺妄出表氣微虛裡氣微結三焦相溷內外不通上焦怫鬱臟氣相熏口爛食齗也中焦不治胃氣上衝脾氣不轉胃中為濁營衛不通血凝不流若衛氣前通者小便赤黃與熱相搏因熱作使遊於經絡出入臟腑熱氣所過則為癰膿若陰氣前通者陽氣厥微陰無所使客氣內入嚏而出之聲嗢咽塞寒厥相追為熱所擁血凝自下狀如豚肝陰陽俱厥脾氣孤弱五液注下下焦不闔清便下重令便數難臍築湫痛命將難全又曰脈陰陽俱緊者口中氣出唇口乾燥蜷臥足冷鼻中涕出舌上苔滑勿妄治也到七日以來其人微發熱手足溫者此為欲解或到八日以上反大發熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也又曰脈陰陽俱緊至於吐利其脈獨不解緊去人安此為欲解若脈遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解病六七日手足三部脈皆至大煩而口噤不能言其人躁擾者必欲解也若脈和其人大煩目重臉內際黃者此欲解也又曰脈浮而數浮為風數為虛風為熱虛為寒風虛相搏則灑淅惡寒也又曰脈浮而滑浮為陽滑為實陽實相搏其脈數疾衛氣失度浮滑之脈數疾發熱汗出者此為不治又曰傷寒咳逆上氣其脈散者死謂其形損故也
