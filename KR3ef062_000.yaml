body:
  text: 跋洵自幼即喜讀靈素家言以習舉業未暇及也匡居善病退而學醫乃得從淡安師遊師年雖高好學彌篤其治病皆有法度知名震醫林為不虛日者手一編示洵曰此豫舊藏郭氏傷寒補亡論也在元明時已缺一卷今鋟板久無抄本亦鮮以其亡而補之且將並其補者而亡之豫所不忍其為豫校讎將付梓焉受書卒讀錯句訛字所在多有兢兢懼不勝任重負委託悉心研求晨夕辨難訂正者有之闕疑者有之割愛者有之仍不敢稍失其真面目以副吾師紹述之懷庶無湮乎先賢之遺而有補於斯道之用云爾寶山門人範洵謹跋
