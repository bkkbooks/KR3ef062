body:
  text: 卷十三兩感證五條素問曰人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必不免於死又曰兩感於寒者病一日則巨陽與少陰俱病則頭痛口乾煩滿而渴二日則陽明與太陰俱病則腹滿身熱不飲食譫語三日少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死病源曰水漿不入不知人則六日而死其義甚明問曰素問言不知人六日死又言三日其氣乃盡何也雍曰兩感之病表裡俱傳三日而六經竟雖竟而氣未絕故經竟之後又三日其氣乃絕其言三日者謂三日而陽明之氣方盡故也言六日者通傳經之日也傳經三日氣盡故言六日何以明之三日經竟之時五臟已傷六腑不通營衛不行如是之後又三日氣盡乃死帝以疑而問之而岐伯告以陽明氣血盛不知人三日而後死也經既曰如是之後則是傳六經竟之後也又曰不知人三日則是陽明未絕之時也經竟甚明而或者謂其傳六經而後死夫能再傳則不死矣本以邪氣傳至少陽欲傳太陰之間而太陰已先與陽明同受邪氣不能更受後來再傳之邪雖太陰復欲以邪傳之三陽而三陽邪氣亦皆滿亦不更爾容受兩邪相拒六經皆滿俱不能流注傳泄是以六腑不通營衛不行水漿不入不知人以待陽明之氣盡而後死矣陽明胃經也胃為血氣之海朝夕灌注營衛六腑十二經者皆胃之氣血也諸經雖絕獨陽明氣血未盡故又三日而後死也六日死三日死只是兩感一證或者謂再傳為六日死邪氣直入陽明為三日死遂分兩證此說甚誤未通經意又不當改經血氣盛為邪氣盛仍有血氣隨邪而盡之說皆失也反復讀經當自得之龐氏曰兩感之疾素問無脈候今詳之凡脈沉者皆屬陰也一日脈當沉而大沉者少陰也大者太陽也二日脈當沉而長三日脈當沉而弦乃以合表裡之脈沉長弦皆隱於沉大也凡三陰無合病惟三陽有合病今三陽與三陰合病故其脈似沉緊而大似沉實而長亦類革至之死脈也王仲弓監丞曰本論言兩感俱作治有先後發表攻裡本自不同近時張翊云論有傷寒醫下之利不止身疼痛者急當救里後身疼痛清便自調者急當救表今可依仿而治既云治有先後則宜先救里內才溫則可醫然救表亦不可緩也朱氏曰內尤為急也雍曰救里藥用四逆救表藥用桂枝湯此法出於不得已猶愈於束手待斃矣仲景曰救里藥用四逆救表藥用桂枝湯更看臨時寒熱多少參訂之幸有表裡一輕者則急治其重者也然其治大宜速過三日則水漿不入雖有藥不納已張亦未悟此也兩感論曰病人有不治之證古人不復論方藥者立論固可如此醫家亦可如此而人有父兄母弟至親不幸遇疾如此能坐視不思拯援萬死一生之術哉孫真人論精神困者病久不瘥欲死者但與藥救之十人中或瘥三四以是言則人雖有不治之病其氣未絕之間亦無不服藥待盡之理今觀兩感之證以陰陽之經邪氣皆滿不相來往傳注故為必死之候乘其三日內邪氣未滿營衛可通之時早為療治尚或不死若六經邪氣三日既滿則水漿不入湯藥何緣可納勢須於初覺之時急治之然初感之日誰能斷然不疑知其為兩感擬議之間已不及矣是以必至於死也雍謂湯藥至此不如針灸湯藥雖可內攻而內攻未必至雖至而藥病方有勝負針艾可以外泄隨其輕重必有泄而出者昔虢太子之死扁鵲治之蓋外泄之術也方其厥氣上行絕陽破陰有甚於兩感不知人之證扁鵲以為陽脈下墜陰脈上爭令氣閉而不通夫厥氣亦邪氣也陽脈陰脈者即陽經陰經也陽脈下墜猶傳之陽也陰脈上爭相搏而不能受也氣閉不通以陰陽俱邪實故不通不通則水漿不入矣越人於是不施湯劑而遽用針石外取三陽五會有間太子蘇是知湯不能達於外而針尚可泄於外也既蘇而得為五分之熨以逐餘邪邪去然後得服湯藥二旬而復故倘使湯先必不能得入何緣有復甦之理今兩感之邪與屍厥之邪其暴殺人一也誠能效越人先針後湯之術取之三陽使三陽氣緩然後灼三陰之會以泄其邪邪氣未盡方以湯攻使無所逃既盡則以湯養之雖生死未可必而其為治有所據而不謬矣故愚意欲先取崑崙委中乃去其血以泄太陽次取三里以泄陽明後取邱墟陽陵泉以泄少陽三陽氣既緩急灸三陰交穴以泄三陰之邪此穴亦難取或上下左右少差即能中一陰二陰不中必三陰俱中仍須審度再分灸之上陰陵泉可泄太陰太谿可泄少陰大敦可泄厥陰炷如麥粒緩緩灸之徐泄其氣不必以多為貴也雖其如此亦不可以不灸三陰交先並泄之然後分得陰陽得陰陽緩乃可服湯泄不患多治不厭速蓋有三日之期不可待也所以不敢用熨者必為火邪故惟用湯二者皆陰氣閉不通之疾大略相似而其為寒熱則異也以是思之則三陰合病之中脈有負者亦宜灸刺以治之且如陽明少陽合病其脈負者少陽木氣盛也瀉邱墟陽陵泉則少陽木氣不得不平補三里則陽明之土不得不旺或不精補瀉者第以刺為瀉灸為補古人皆有是法如是則雖死亦有可生理所謂十中三四愈者未必不如孫氏之言也雖然天下之事固有大小同異而其理一也昔洪水橫流氾濫於中國禹決九州然後人得平土而居之愚因誦此而得通病有外泄之理使早得而熟之則越人氏之學何難至之顏淵曰舜何人也予何人也有為者亦若是況盧扁乎惜余得之暮年所用之小也然亦不敢不告諸來者故備言之陰陽交十一條素問三十三篇曰有溫病者汗出輒復熱而脈躁疾不為汗衰狂言不能食岐伯曰病名陰陽交交者死也人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復發熱者是邪勝也不能食者精無俾也汗而熱留者其壽可立而傾也又曰熱論曰汗出而脈尚躁盛者死今脈不與汗相應此不勝其病也其死明矣狂言者是失志失志者死今見三死不見一生雖愈必死也雍曰汗出輒復熱一死脈尚盛二死狂言失志三死也靈樞二十三篇曰熱病已得汗而脈尚躁盛者此陰脈之極也死其得汗而脈靜者生雍曰此二證脈經皆以為陰陽交疑以得汗者為交不得汗者非交也又曰熱病已得汗而脈尚躁且復熱勿膚刺喘甚者死脈經曰熱病陰陽交者死又曰熱病煩已而汗脈當靜又曰太陽病已得汗脈反躁盛者是陰陽交死復得汗脈靜者生又曰熱病陰陽交者熱煩心躁太陰寸口脈兩部尚躁盛是陰陽交死得汗脈靜者生雍曰以上二證與前同靈樞不言陰陽交此言陰陽交為異脈經所載皆古書此二證莫知所出也又曰熱病陽進陰退頭獨汗出者死陰進陽退腰以下至足汗出者死陰陽俱進汗出已熱如故亦死陰陽俱退汗出已寒慄不止鼻口氣冷亦死以上十證並見脈經陰陽交部又曰熱病所謂並陰者熱病已汗因得泄是謂並陰故治一作活又曰熱病所謂並陽者熱病已得汗脈尚躁盛火熱汗出雖不汗出若衄龐氏雲和而衄者是謂並陽故治雍曰並陰陽二證諸書無所見亦類陰陽交故脈經繼之於其後陰陽交論曰傷寒兩感陰陽交二證皆出於素問仲景發明兩感而不及陰陽交王叔和載陰陽交而不及兩感後世因仲景而明兩感之證獨陰陽交多所未解予考陰陽交之證大抵傷寒脈不為汗解者皆陰陽交也何以不為汗解曰獨陰獨陽之病一汗則解陰兼陽陽兼陰之病一汗不能解蓋汗解其陰陽脈不得退汗解其陽陰脈不得退此所以不為汗衰也然則陰兼陽陽兼陰者何病也余悉索之則兩感之證似之一日太陽與少陰俱病二日陽明與太陰俱病皆陰兼陽陽兼陰也陰陽相兼而病故其病名曰交是以太陽汗解而少陰未得解陽明汗解而太陰未得解者豈非因其相交而不為汗衰乎觀二證之言初若不相同合二證陰陽之理則無異也故素問言兩感本非病名至陰陽交則曰病名陰陽交蓋兩感言其始感陰陽交者著其名也故陰陽交之證有曰復得汗脈靜者生是邪氣再出而復生也仲景亦曰發表攻裡本自不同豈非再乎故遇斯病者當參二證而治之然則仲景發明兩感而不及陰陽交叔和載陰陽交而不言兩感意豈異乎更俟賢哲明之三陽合病十五條龐氏曰凡三陰無合病惟三陽有合病十四證其三陰三陽相併而病者即兩感是也雍曰合病十四證已見三陽經今重列於下非惟便於檢按亦相附參考易明庶無瘥矣仲景曰太陽與陽明合病者必自下利葛根湯主之又曰太陽與陽明合病不下利但嘔者葛根加半夏湯主之又曰太陽與陽明合病喘而胸滿者不可下宜麻黃湯仲景問曰何緣得陽明病答曰太陽病若發汗若下若利小便亡其津液胃中乾燥因轉屬陽明不更衣大便難者此陽明病也雍曰無太陽證者宜調胃承氣湯凡轉屬之法與合病微不同且如太陽陽明合病必須解兩經之邪故仲景不捨葛根麻黃二湯若轉屬陽明可以少俟太陽證衰即以調胃承氣湯專攻陽明一舉而兩得之蓋太陽為既往則當日衰陽明為方來則當日盛故也又曰二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯朱氏曰若太陽證不罷不可下宜桂枝麻黃各半湯小發其汗雍曰若太陽不罷者宜少俟一日又不罷則依朱氏法又曰二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之一作蒸若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知之雍曰宜桂枝麻黃各半湯問曰太陽陽明合病並病二者之證何以別之朱氏曰脈浮大而長頭疼腰痛肌熱鼻乾目疼者合病也太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒者並病也雍曰合病脈浮大而長者未必惡寒其脈浮緊而長無汗者當惡寒也皆宜桂枝麻黃各半湯有下症者自宜前法仲景曰太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五六日譫語不止刺期門雍曰仲景言少陽不可發汗故並病亦不可汗也又曰太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之雍曰仲景曰太陽病轉入少陽脈沉遲者與小柴胡湯龐氏曰脈緊者小柴胡湯少加牡蠣大抵少陽多宜和解故宜小柴胡湯太陽和解亦宜用之又曰太陽少陽並病太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未可吐下脈沉緊者與小柴胡湯龐氏曰脈緊者小柴胡加桂枝脅下硬滿加牡蠣又曰陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也雍曰宜理中湯下利而厥者宜四逆湯其脈不弦者為順脈弦者陽明土負也急瀉邱墟陽陵泉以泄少陽木急灸三里以補陽明土也仲景曰三陽合病腹滿身重難以轉側口不仁面垢譫語下之則額上生汗手足厥冷若自汗出者白虎湯主之又曰三陽合病脈浮大上關上但欲眠睡目合則汗龐氏曰不言弦者隱於長大也常氏云可桂枝柴胡各半湯雍曰即柴胡桂枝湯也問曰仲景言本太陽病因醫下之腹滿時痛轉屬太陰者此為兩感乎為合病乎雍曰非也合病雖亦有轉屬者要之兩陽俱作也兩感則表裡陰陽俱病矣難經曰人之有尺猶木之有根枝葉雖枯槁根本將自生兩感則根葉皆將枯無自而生矣合病太陽太陰雖名一陰一陽而實非相為表裡之經互相有生救謂如太陽雖病而少陰不受病太陰雖病而陽明不受病正類枝葉雖枯槁根本自生之象是以不為兩感況本非邪氣傳注醫誤下之移太陽之疾入於太陰非兩經俱作之證甚明是以仲景用桂枝加芍藥湯桂枝加大黃湯也結胸二十二條雍曰結胸痞氣陽毒陰毒狐惑百合六證雖有見於前證中者而龐氏皆以其異證故別列於後今依龐氏之法益以斑黃血衄證為十證仲景曰問病有結胸有臟結其狀何如曰按之痛寸脈浮關脈沉名曰結胸龐氏曰寸口脈浮關上尺中皆沉或沉緊又曰何為臟結答曰如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰臟結舌上白苔滑者難治常氏云可刺關元在臍下又曰臟結無陽證不往來寒熱一云寒而不熱其人反靜舌上苔滑者不可攻也常氏云可刺關元穴又曰病人脅下素有痞連在臍旁痛引小腹入陰筋者此名臟結死常氏云可刺大赫在腹部第二行又曰發病於陽而反下之熱入因作結胸病發於陰而反下之因作痞也所以成結胸者此下之太早故也朱氏曰傷寒本無結胸以其熱下之早熱氣乘虛而入痞結不散變成結胸王仲弓曰杜壬云傷寒在表誤下者宜急頻與理中湯丸更加人參多得解不作結胸若大腹轉損發厥者愚與四逆湯便安若胃中雖和而病不退候再有里證再下之朱氏云以前來下湯未是故也又曰若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞宜半夏瀉心湯又曰結胸證其脈浮大者不可下下之則死朱氏云尚宜發汗也脈浮是表證兼以小柴胡湯等先發表表證罷後以結胸藥下之常氏云用巴豆黃連餅子封臍中灸之即諸方中所謂聖餅子灸法也又曰結胸證悉具煩躁者亦死又曰太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣煩躁心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之雍曰此即病發於陽而反下之之證也若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃者可茵陳蒿湯雍曰若單服茵陳濃汁調五苓散亦可又曰傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之又曰傷寒十餘日熱結在裡往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸膈也但頭微汗出者大陷胸湯主之雍曰可下證中自但結胸下分別為二證故用二藥不同又曰太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱一云日晡所發心胸大煩從心下至少腹硬滿而痛者大陷胸湯或以大陷胸丸下之又曰小結胸證正在心下按之則痛脈浮滑者小陷胸湯主之又曰太陽病二三日不得臥但欲起心下必結脈微弱者此本有寒分反下之若利止必作結胸未止者四日復下之此作協熱利也常氏云脈微弱有寒者可增損理中丸作結胸者大小陷胸湯協熱利者白頭翁湯又曰太陽病下之後其脈數促一作縱不結胸者此為欲解也脈浮者必結胸常氏云可增損理中丸脈緊者必咽痛常氏云可桔梗甘草湯脈弦者必兩脅拘急常氏云可小柴胡湯脈細數者頭痛未止常氏云可蔥須湯脈沉緊者必欲嘔常氏云可七物黃連湯脈沉滑者協熱利常氏云可白頭翁湯脈浮滑者必下血常氏云可柏皮湯又曰病在陽應以汗解之反以冷水灌之噀之其熱被卻不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服龐氏云無熱證者與三物白散小陷胸湯非也愚以為熱者小陷胸湯寒者三物白散又曰結胸者項亦強如柔痓狀下之則和龐氏云宜服大陷胸湯又曰太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩常氏云可半夏生薑二瀉心湯活人書云西晉崔行功云傷寒結胸欲絕心膈高起手不得近大小陷胸皆不瘥者此是下後虛逆氣已不理而毒復上攻氣毒相搏結於胸中當用枳實理中丸先理其氣次療諸疾古今用之如神應手而愈今常氏謂增損理中丸即是也龐氏曰近世治結胸多用針頭丸用硫黃陽起石者若病熱毒甚者必死惟治冷結寒實耳活人書云結胸三種有大結胸不按而痛胸連腹堅硬大陷胸湯主之有小結胸接之心下痛小陷胸湯主之有水結胸在膈間亦名結胸小半夏加茯苓湯小柴胡去棗加牡蠣湯主之又有寒熱二證有熱實結胸者胸中煩躁心內懊憹舌上燥渴脈沉滑者皆熱證也大陷胸湯主之有寒實結胸無熱證者三物白散枳實理中丸主之王仲弓曰治結胸當用小陷胸湯甚佳大陷胸湯太峻如不得已則用大陷胸湯丸脈浮者不得用大陷胸丸宜用小陷胸枳實理中丸結胸用黃連巴豆灸法得解心下痞硬宜旋覆代赭湯若外尚未解胸滿脅痛者宜小柴胡湯雍曰凡用仲景藥皆當準此為式蓋今古不同病人血氣不能勝藥力醫工不能精於診視非古人比故用藥可不及不可太過如脈浮者尤宜從朱氏用發表藥表證罷以結胸藥治之心下痞二十五條仲景曰病發於陰而反下之因作痞也龐氏曰發熱惡寒為發於陽誤下則為結胸無熱惡寒為發於陰誤下則為痞朱氏曰傷寒本無痞因身冷醫反下之遂成痞枳實理中丸最良又曰心下滿而硬痛者為結胸但滿而不痛名為痞宜半夏瀉心湯朱氏曰此湯藥蓋本理中又參黃芩湯也審知是痞先用桔梗枳殼湯尤妙緣桔梗枳殼行氣下膈故先之龐氏曰設使下後津液入里胃虛上逆寒結在心下故宜用辛甘發散之今用半夏以下氣用苦以去濕兼通心氣又甘草力大使乾薑黃連不能相惡此用半夏瀉心湯之意也又曰脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳常氏云可小陷胸湯生薑瀉心湯雍曰宜半夏瀉心湯又曰心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之龐氏曰寒濕迫心氣不行欲作熱也朱氏曰結胸與痞關脈皆須沉若關浮則熱結故以三黃瀉心也又曰心下痞而復惡寒汗出者附子瀉心湯主之大黃黃連瀉心湯內加附子又曰本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之一云忍之一日乃愈又曰傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之龐氏云胃中不和為少陽本氣所制故用生薑之辛味也本字當作木字又曰傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之龐氏云胃虛故加甘味又曰傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之複利不止當利其小便龐氏云五苓散主之又曰傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯龐氏曰前加附子是汗出多而惡寒表將解而里結未除也此證是發汗無汗而惡寒故先須解表也朱氏曰結胸與痞表未解者不可攻也又曰傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之龐氏云汗出嘔吐下利是胃中津液燥里有結實非胃虛也故大柴胡湯下之又曰傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之朱氏曰有旋覆代赭湯證其人或咳逆氣虛先服四逆湯胃寒先服理中丸次服此湯良又曰太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之又曰傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿常氏云可服茯苓甘草白朮生薑湯振痿湯此湯未見方恐是誤寫又曰太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之朱氏曰此湯尤難用須是表證罷身涼不惡寒者乃可用若表未解者切不可用也雍曰十棗湯乃攻裡大峻藥也非和里藥也設或誤用殺人過於承氣常氏言此證傳寫之誤故朱氏亦畏而戒之宜代用檳榔散又曰太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈常氏云痞者可生薑瀉心湯發熱惡寒可小柴胡湯火逆可桂枝去芍藥加蜀漆牡蠣龍骨救逆湯又曰病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散又曰太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之雍曰其詳見並病中又曰太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔吐但心下痞者此以醫下之也常氏云可生薑半夏二瀉心湯雍曰此證汗出發熱惡寒表證不罷宜先服柴胡桂枝湯次服枳實理中丸又曰太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必心下結硬常氏云可增損理中丸桂枝加芍藥湯又曰陽明病心下硬滿者不可攻之攻之遂利不止者死常氏云可半夏瀉心湯也已攻而利者四逆湯又曰脈雙弦而遲者必心下硬脈大而緊者陽中有陰也可下之宜大承氣湯活人書曰已痞服瀉心湯不愈然後可用陷胸湯下之又曰外證未解而心下妨悶者非痞也謂之支結柴胡桂枝湯主之脅胸滿微結小柴胡加乾薑牡蠣湯主之王仲弓曰生薑瀉心半夏瀉心二陽和平宜常用之
