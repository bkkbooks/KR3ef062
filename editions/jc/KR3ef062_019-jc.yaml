body:
  text: 卷十九婦人傷寒十八條問曰婦人傷寒何如活人書曰男子調其氣婦人調其血血室不蓄則二氣和諧血氣凝結則水火相刑傷寒氣口緊盛則宜下人迎緊盛則宜汗婦人左關脈浮緊不可下當發其汗以救血室營衛得和津液自通浹然汗出而解問曰熱入血室何如活人書曰仲景云婦人傷寒經水適斷晝日明瞭暮則譫語如見鬼狀此為熱入血室無犯胃氣及上二焦無犯胃氣者言不可下也小柴胡湯主之若行湯遲則熱入胃令津液枯燥中焦上焦不榮成血結胸狀須當針期門問曰譫語即下症而前症不可下何也活人書曰傷寒胃實譫語則宜下婦人熱入血室譫語不可下也問曰犯胃氣者何如活人書曰五行相剋以生相扶以出平居之日水常養木水木相生則榮養血室血室不蓄則脾無蘊積脾無蘊積則剛燥不生若犯胃氣則晝夜譫語喜忘小腹滿小便利者屬抵當湯問曰婦人先調血男子先調氣何如活人書曰此大略之言耳要之脈緊無汗為傷寒脈緩有汗為傷風熱病脈洪大中暑脈細弱其症一也假如中暍者用白虎胃實用承氣豈必調血而後行湯哉仲景傷寒所以不分婦人良亦由此學者皆可隨病於男子藥症中以意選用也活人書曰婦人傷寒發熱惡寒四肢拘急口燥舌乾經脈凝滯不得往來宜桂枝紅花湯又曰婦人傷寒口燥咽乾腹滿不思飲食宜黃芩芍藥湯又曰婦人傷寒喘息煩躁或戰而作寒陰陽俱虛不可下宜柴胡當歸湯又曰婦人傷寒經脈方來初斷寒熱如瘧狂言見鬼宜乾薑柴胡湯又曰婦人傷寒血結胸膈揉而痛不可近海蛤散朱氏又言婦人血結胸證法當刺期門仲景無藥此方疑非仲景意又云婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦宜小柴胡湯又曰婦人傷寒七八日續得寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀宜小柴胡湯又曰婦人傷寒發熱惡寒經水適來得之七八日熱除脈遲身涼和胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而取之又曰婦人傷寒六七日胃中有燥糞大便難煩躁譫語目赤毒氣閉塞不得通宜三黃瀉心湯原本是瀉心三黃湯又曰婦人傷寒瘥後猶有餘熱不去謂之遺熱宜乾地黃湯又曰婦人傷寒未平復因交合裡急腰胯連腹內痛名陰陽易宜燒裩散又曰婦人病未平復因有所動致熱氣上衝胸手足拘急搐搦如中風狀宜青竹茹湯又曰婦人病未平復因有所動小腹急痛腰胯痛四肢不任舉動無力發熱者宜當歸白朮湯娠婦傷寒三十三條活人書曰娠婦傷寒仲景無治法用藥宜有避忌不可與尋常婦人一概論治也又曰婦人妊娠傷寒藥性須涼切不可行桂枝半夏桃仁等藥小柴胡去半夏名黃龍湯蓋為妊婦而去也大抵產前先安胎產後先補血次服傷寒藥若病稍退則止藥不可盡劑此為大法黃帝問婦人重身毒之何如岐伯曰有故無殞亦無殞也大積大聚其可犯也衰其大半而止過者死千金方治妊娠傷寒頭痛壯熱肢節煩疼石膏前胡湯七味又治妊娠傷寒頭疼壯熱心煩嘔吐不可食生蘆根湯四味又治妊娠傷寒服湯後頭疼壯熱不歇宜用竹葉石膏湯拭其身又治妊娠熱病蔥白五兩豉一升煮服取汗又曰大熱煩悶者葛根汁二升分三服如人行五里進一服活人書娠婦傷寒安胎宜阿膠散又宜白朮散龐氏曰娠婦時氣欲令子不落宜用護胎伏龍肝散伏龍肝為末水調敷臍中干即易之疾瘥乃止又曰妊娠傷寒內熱極甚令不傷胎宜取雞子以絹袋貯投井底浸令極冷旋破吞六七枚佳又曰妊娠傷寒大熱甚胎不安者宜用阿膠末一錢半竹瀝調下如無竹瀝用小麥竹葉煎湯調下又曰妊娠傷寒服汗下諸藥熱已退其間與此藥安胎宜服人參黃耆湯活人書曰妊娠傷寒憎寒發熱發其汗宜蔥白湯以蔥白生薑同煎連服取汗又曰妊娠傷寒頭疼壯熱肢節痛疼宜服前胡湯千金方又曰妊娠傷寒或時行灑淅作寒振慄而悸或加噦宜蘇木湯雍曰蘇木大破血更宜參究避之又曰妊娠傷寒頭疼默默不欲飲食脅下痛嘔逆痰氣及產後傷風熱入胞宮寒熱如瘧並經水適來適斷病後勞復餘熱不解宜黃龍湯又曰妊娠傷寒頭疼惡寒身熱躁悶四肢疼痛項背拘急唇口乾燥宜柴胡石膏湯又曰妊婦傷寒四日至六日以來加心腹脹上氣渴不止飲食不多腰疼體重宜三物枳實湯又曰妊婦傷寒頭目疼壯熱心煩宜旋覆花湯又曰妊娠傷寒壯熱嘔逆頭疼不思飲食胎氣不安宜麥冬湯又曰妊婦發斑變為黑色宜梔子大青湯龐氏曰妊娠傷寒腹脹大便不通喘急宜牽牛散卷十五活人書曰婦人產後傷風十數日不解頭微痛惡寒時時有熱心下堅乾嘔汗出宜陽旦湯又曰婦人產後傷風發熱面赤喘而頭疼竹葉防風湯又曰婦人蓐中傷風四肢苦煩熱頭疼與小柴胡湯頭不疼但煩與三物黃芩湯龐氏曰妊娠熱病胎死腹中用鹿角屑一兩水一碗蔥白五莖豉半合煎六分去滓溫作二服又方益母絞汁飲半升即出又曰傷寒小產惡露不行腹脹滿悶欲死宜大黃桃仁湯又曰小產後惡露被熱蒸斷不行宜地黃飲生地黃藕汁各一碗生薑汁一盞和勻溫服分作三四次服微有寒者煎二十沸服亦下死胎又曰傷寒產後血暈欲絕宜紅花散又曰凡傷寒小產夏月宜少用醋炭多有煩悶暈死者雍曰寒月用炭多又曰傷寒產後惡血衝心悶亂口乾生薑小便飲子生地黃汁藕汁小便各一盞和勻煎二三沸分三服又曰傷寒產後惡露為熱搏不下煩悶脹喘狂言者抵當湯及桃仁承氣湯主之又曰傷寒小產煩悶大燥渴石膏湯主之小兒傷寒十九條千金方論曰小兒未能涉冒霜雪乃不病傷寒也然天行非節之氣其亦得之有如行瘟之年小兒出腹患斑者治其時行節度故如大人之法但用藥分劑少異藥少冷耳又曰治小兒未滿百日傷寒鼻衄身熱嘔逆麥冬湯又曰治少小傷寒芍藥四物解肌湯又曰治少小傷寒發熱咳嗽頭面熱者麻黃湯活人書減桂半兩加石膏名石膏麻桂湯又曰治小兒傷寒以葛根汁淡竹瀝各六合二味相和二三歲兒分三服百日兒酌服不宜生煮服佳又曰治小兒時氣枇杷葉三兩搗以水五升煮十沸取汁日五六遍淋之若復發熱燒雄鼠屎二三枚用水調服之又曰治小兒傷寒久不除瘥後復劇瘦瘠骨立五味子湯又曰治少小傷寒宜莽草湯治之避眼與陰又曰小兒傷寒發黃者搗土瓜根汁三合服之又曰搗青麥汁服之又曰韭根汁澄清滴兒鼻中如大豆許即出黃水瘥又曰小豆二七粒瓜蒂二七枚糯米四十粒以少許吹鼻中活人書論小兒傷寒曰治法與大人同但小分劑藥性差涼耳尋常風壅發熱痰嗽煩渴惺惺散主之咽喉不利痰實咳嗽鼠黏子湯主之頭額身體溫熱大便黃赤腹中有熱四順散連翹散三黃丸主之頭額身體溫熱大便白而酸臭者胃中有食積雙丸主之小兒無異疾惟飲食過度不能自節心腹脹滿身熱頭疼雙丸悉主之小兒身體潮熱頭目碎痛心煩神躁小便赤大便燥此熱劇也洗心散調胃承氣湯主之頭疼發熱偎人畏寒者此傷寒症也升麻湯主之無汗者麻黃黃芩湯有汗者升麻黃芩湯皆要藥也小兒尋常不可過當服涼藥胃冷蟲動其症與驚相類醫者不能辨往往復進驚藥如腦麝之類遂發吐胃虛而成慢驚者多矣小兒須有熱症方可疏轉仍忌用丸子藥利之以大黃川芎等㕮咀作湯液以盪滌蘊熱蓋丸子巴豆可攻食積耳雍曰此症不止小兒傷寒症亦多及余病故詳錄之又曰治小兒風熱及傷寒時氣瘡疹發熱宜惺惺散又曰治傷寒中風頭痛憎寒壯熱肢節痛發熱惡寒鼻乾不得睡兼治小兒大人瘡疹已發未發皆可服寒暄不時人多疾疫乍暖脫著及暴熱之次忽變陰寒身體疼痛沉重如石者升麻湯主之又曰治胸中客熱口舌咽中生瘡赤眼目瞼重不欲開瘡疹已發未發宜服甘露飲子又曰洗心散通治麩豆瘡時行瘟疫狂語多渴者又曰連翹飲子治小兒一切熱又曰解大人小兒膈熱退壅盛涼心經宜四順散又曰治小兒傷寒發熱咳嗽頭面熱者宜石膏麻桂湯千金名麻黃湯龐氏曰小兒傷寒發熱自汗多啼宜葛根芍藥湯又曰小兒傷寒不解發驚妄言語狂躁潮熱鉤藤大黃湯又曰小兒傷寒結胸其項強眼翻弄舌搐搦如發癇狀久則哽氣但啼聲不出醫亦多作驚風治之其脈浮滑試以指按心下則痛而啼宜半夏黃連栝蔞湯斟酌大小服之當出黃涎便瘥又曰小兒傷寒始因壯熱不除被湯丸下後其症一如前結胸狀但啼聲不出醫又以驚風治之多服涼藥無驗此由誤下後毒氣結在心胸內熱吐涎涎裹藥不能宣行所致宜服蕩涎散取下黑黃涎猶包裹諸藥啼聲一出即安雍曰此因初誤下後涼藥不宣通方服蕩涎散又曰小兒傷寒蒸起風熱發癇手足搐搦而不省蛇皮湯又曰小兒傷寒胃中有熱煩悶不食至日晚潮熱頰赤躁亂嘔吐蘆根湯又曰小兒傷寒後盜汗體熱咽乾犀角黃耆湯小兒瘡疹上四十七條外臺曰肘後言比歲有病天下發斑瘡頭面及身須臾周遍狀如火瘡皆戴白漿隨決隨生不即療劇者數日必死療得瘥後瘡瘢紫黯彌歲方減此惡毒之氣也世人云建武中於南陽擊虜所得乃呼為虜瘡諸家參詳作療用之有效方取好蜜通身摩瘡上或以蜜煎升麻數數拭之亦佳又曰永徽四年此瘡從西域東流於海內但煮葵葉蒜齏啖之則止鮮羊血入口亦止巢氏曰表虛里實熱毒內盛攻於臟腑餘氣流於肌肉遂於皮膚毛孔之中結成此瘡重者匝遍其身狀如火瘡若根赤頭白則毒輕若紫色則毒重其瘡如豌豆亦曰豌豆瘡脈洪數者是其候也活人書曰小兒瘡疹與傷寒相類頭痛身熱足冷脈數疑似之間只與升麻湯丸緣升麻解肌兼治瘡子已發未發皆可服但不可疏轉此為大戒傷寒身熱固不可下瘡疹發熱在表尤不可轉也世人不學乃云初覺以藥利之宣其毒也誤已又云瘡豆已出不可疏轉出得已定或膿血大盛即用疏利亦非也大抵瘡症皆不可下小兒身熱耳冷尻冷咳嗽輒用利藥則毒氣入里殺人但與化毒湯紫草木通湯鼠黏子湯出得太盛則用犀角地黃湯解之若瘡出不快煩躁不得眠者水解散麻黃黃芩湯升麻黃芩湯活血散主之瘡黑倒靨豬尾膏無比散龍腦膏子無不驗也若熱毒攻咽喉痛如聖湯瘡毒入眼決明散撥雲散密蒙花散通聖散蛤粉散主之治瘡疹之法無出此矣龐氏曰天下豌豆瘡自漢魏以前經方家不載或云建武中南陽徵虜所得俗呼虜瘡其後名醫雖論發斑候是發汗吐下後熱毒不散表虛里實熱氣湊於外故身體發斑又說豌豆疱瘡表虛里實一如發斑之理別之熱毒內盛攻於臟腑餘氣流於肌肉遂於皮膚毛孔中結成此瘡既是裡實熱毒內盛則欲發未發瘡斑未見皆宜下之瘡已瘥則再下之此病有三種一則發斑俗謂之麻子其毒猶輕二則豌豆其毒最重多是冬溫所變凡覺冬間有非節之暖瘡毒未發即如法下之次第服預防之藥則毒氣內消不得作矣有不因冬暖四時自行者亦如法下之古方雖有治法而不詳備疑當時熱毒不甚鮮有死者近歲此疾歲歲未嘗無也甚者夭枉十有五六雖則毒氣內壞不治因醫為咎又大半矣若身痛壯熱頭疼不與小汗何由表散大腑久秘毒攻腰脅或心腹脹滿不與微利何由釋去故當消息汗下然則寒藥固不當行溫藥反增熱毒若勢太甚脈候洪數涼性之藥不阻表裡氣者亦可通用若寒氣阻滯脈候浮遲則溫性之藥不阻表裡氣者可冀冰釋云不可汗下寒熱之藥只可紫草一味者乃滯隅之流只是遭遇輕疾以自瘥為功若值重病則拱手待斃也世有權貴自信不任醫師忌冷熱汗下病或不救則責醫者謬誤斯又可為傷嘆小兒多染此患故此方多用小湯劑大人宜倍用之活人書小兒大人瘡疹已發未發皆宜服升麻湯又曰傷溫病應發汗而不發汗內有瘀血者及鼻衄吐血不盡內有餘瘀血面黃大便黑者並宜犀角地黃湯以消化瘀血及瘡疹出得太盛亦以此湯解之又曰天行熱毒生豌豆瘡出不快益煩躁昏憒或雖出身體尚熱者宜麻黃黃芩湯以發其表無汗者宜用之有汗者非又曰小兒時行瘡豆出不快煩躁不眠者宜升麻黃芩湯加木香一錢半以殺其毒有汗者尤宜服又曰小兒瘡豆已出未出並宜服化毒湯紫草木通湯又曰豆瘡欲出未透皮膚熱氣攻咽喉眼赤心煩宜鼠黏子湯又曰天行頭痛壯熱一日二日及瘡疱未出煩躁或出尚身體發熱者宜水解散去大黃芍藥只用四味又曰瘡子不出宜活血散以白芍一錢溫熱水調下又曰瘡子倒靨宜豬尾膏小豬兒尾鐵刀刺血一兩入生龍腦少許同研和水調下又曰疹瘡有一切惡候及黑陷並宜服無比散取下惡物便安又曰豌豆瘡出未透心煩狂躁氣喘妄語或見鬼神或已發而陷伏皆宜速治宜龍腦膏子又曰痘瘡入眼生翳有決明散撥雲散密蒙花散通聖散蛤粉散皆宜擇而用之龐氏曰溫毒發斑大疫難救兼治豌豆瘡不出宜地黃膏又曰天行發斑瘡須臾遍身皆戴白漿皆惡物也又曰凡覺冬溫將來春夏必發斑豆小兒輩於冬暖時預服漏蘆湯下之下後逐日空心飲甘草汁直候腹疼乃止或下後飲羊血一盞則不發雍曰冬溫時小兒逐日宜服鼠黏子湯則斑豆喉痹赤目口瘡皆不發下後煎甘草黑豆竹葉湯亦好三晉人不用黑豆用槐豆尤勝羊血當依外臺法若下後服之非宜又曰時行豌豆瘡以槿皮二兩細切水一升煮半升去渣分服之此晉王中令方也又曰初得病便驚狂不眠渾身熱汗出問之身不憎寒亦不惡風其脈如數以漏蘆根湯下之甚數者以大承氣湯下之瘡豆傷寒亦然又曰小兒時行瘡豆恐相傳染先服漏蘆湯下之本治熱毒癰疽赤白諸丹毒瘡癤雍曰今依朱氏法但存其說又曰瘡豆毒氣不出煩悶熱毒氣攻腰或脅腹疼不可忍大便不通五杏湯主之又曰熱氣在表已發汗未解或吐下後熱毒不散煩躁譫語此為表虛里實熱氣燥於外故身發斑如錦文或不因汗下始得病一日二日便發皆由溫疫熱毒氣使然甚則發豌豆瘡其色白或赤發於皮膚頭作漿戴白膿者其毒則輕其紫黑色者作根隱隱在肌肉裡其毒則甚十死一生甚者五內七竅皆有瘡形如豌豆故以名焉脈洪數者是其候也雍曰瘡靨則有紫黑色初生者皆赤根白頭又曰天行熱毒未解欲生豌豆發熱疼痛宜解肌發汗葛根石膏湯又曰斑豆始有白疱忽搐入腹漸作紫黑色有膿日夜啼叫煩亂宜鬱金散又曰此疾小便澀有血者中壞也瘡黑靨無膿十死不治斑豆煩喘小便不利鱉甲湯定煩喘竹瀝飲子又定煩喘麻黃甘草湯又曰常行豆瘡紫草湯最良患其服之太少不能中病但多槌切好紫草以沃之候溫去渣服紫草半升湯一升為准又曰瘡出不快碎紅花子一合水半升煎百沸去渣服又曰斑豆已出不可發表更增斑爛以虛故也又曰瘡出不快表裡不解煩喘大便閉氣攻腹滿宜犀角升麻湯又曰斑豆服涼藥太過咳嗽手足冷脈遲甘草乾薑湯又曰豆瘡已出定芒硝豬膽汁和研勻塗之勿動痂落無痕仍臥黃土末上良又曰天行豆瘡預服三豆飲則不發又曰瘡豆發斑下利赤黃或膿血遍身發熱宜梔子薤豉湯八卷雍曰龐氏錢氏諸方如活人書有缺藥症及用之不應者則取之錢氏曰凡小兒面燥囟赤目亦赤呵欠煩悶乍涼乍熱咳嗽噴嚏足稍冷夜臥驚悸多眠並瘡疹症惟用溫涼藥治之又曰小兒在胎食五臟血穢生下則其毒當出故瘡疹之狀皆如五臟之液雍曰世醫言初年不出至老亦出此說不經見龐氏亦無是說第俚俗有此言恐錢朱未能免俗也又曰發熱潮熱三日以上熱入皮膚即發瘡疹而不甚咳者熱留膚腠之間故也又曰瘡疹尻涼者順候也若瘡黑陷耳尻反熱者逆也用牛李膏百祥丸多至三服若不愈者死病也又曰凡瘡疹一發便出盡者必重瘡夾疹出者半輕半重也出希者輕裡外肥紅者輕外黑裡赤者微重外白里黑大重瘡端里黑點如針孔者勢劇也青乾紫陷昏睡汗出不止煩躁熱渴腹滿啼喘大小便不通者困也凡瘡當令乳母忌口不可令小兒飢及受風冷必變紫黑難治又曰有大熱者宜利小便有小熱者宜解毒若黑紫干陷者百祥丸下之不黑者切不可下又曰瘡疹更看時月逆順大抵屬陽故春夏病為順秋冬病為逆又曰春膿泡夏黑陷秋斑子冬疹子亦不為順雍謂錢氏大抵拘於臟謂膿泡為肺金黑陷為腎水斑子為心火疹子為脾土皆克四時故不為順也然則黑陷者何時不為逆也又曰重病猶十活四五黑者無問何時十難救一其候或寒戰噤牙或身黃腫紫宜急以百祥丸下之復惡寒不已身冷汗出耳輪反熱者死病也下後身熱氣溫欲飲水者可治之宜解毒不宜妄下若能食而痂頭焦起或未焦而喘實者可下之雍曰平時醫者有候瘡痂頭焦而下者云欲下餘熱不作疱癰也若症中果見有餘熱及瘡後脈不衰信可下若症無餘熱脈已衰弱則如何敢下瘡後兒已虛又下則重虛之非惟將息不起又因虛別成大病臟腑脆弱故病未已新病復加則難治不可不慎也但當解餘熱又曰身熱煩渴腹滿加喘大小便澀而赤悶亂大吐此當利小便不瘥者宣風散下之若六七日痂未焦是內發熱熱氣蒸皮膚故不得痂焦也宣風散導之磨生犀角解之又曰若瘡入腹為膿血及連痂皮得出者脾氣實也出則安若瀉米穀及乳不化者是脾虛自瀉也必難治
