body:
  text: 卷三仲景平脈法四十五條仲景問曰脈有三部陰陽相乘營衛血氣在人體躬呼吸出入上下於中因息遊布津液流通隨時動作效象形容春弦秋浮冬沉夏洪察色觀脈大小不同一時之間變無經常尺寸參差或短或長上下乖錯或存或亡病輒改易進退低昂心迷意惑動失紀綱願為具陳令得分明師曰子之所問道之根源脈有三部尺寸及關營衛流行不失衡銓腎沉心洪肺浮肝弦此自經常不失銖分出入升降漏刻周旋水下二刻一周循環當復寸口虛實見焉變化相乘陰陽相干風則浮虛寒則牢堅沉潛水蓄支飲急弦動則為痛數則熱煩設有不應知變所緣三部不同病各異端太過可怪不及亦然邪不空見中必有奸審察表裡三焦別焉知其所舍消息診看料度腑臟獨見若神為子條記傳與賢人又師曰呼吸者脈之頭也初持脈來疾去遲此出疾入遲名曰內虛外實也初持脈來遲去疾此出遲入疾名曰內實外虛也又問曰上工望而知之中工問而知之下工脈而知之願聞其說師曰病家人請云病人苦發熱身體疼病人自臥師到診其脈沉而遲者知其瘥也何以知之表有病者脈當浮大今脈反沉遲故知愈也假令病人云腹內卒痛病人自坐師到脈之浮而大者知其瘥也何以知之若里有病者脈當沉而細今脈浮大故知愈也又師曰病家人來請云病人發熱煩極明日師到病人向壁臥此熱已去也設令脈不和處言已愈設令向壁臥聞師到不驚起而盻視若三言三止脈之嚥唾者此詐病也設令脈自和處言此病大重當須服吐下藥針灸數十百處乃愈又曰師持脈病人欠者無病也脈之呻者病也言遲者風也搖頭言者里痛也行遲者表強也坐而伏者短氣也坐而下一腳者腰痛也裡實護腹如懷卵物者心痛也又師曰伏氣之病以意候之今月之內欲有伏氣假令舊有伏氣當須脈之若脈微弱者當喉中痛似傷非喉痹也病人云實咽中痛雖爾今復欲下利又問曰人病恐怖者其脈何狀師曰脈形如循絲累累然其面白脫色也又問曰人不飲其脈何類師曰脈自澀唇口乾燥也又問曰人愧者其脈何類師曰脈浮而面色乍白乍赤又曰經說脈有三菽六菽重者何謂也師曰脈人以指按之如三菽之重者肺氣也菽小豆也如六菽之重者心氣也如九菽之重者脾氣也如十二菽之重者肝氣也按之至骨者腎氣也又曰假令下利寸口關上尺中悉不見脈然尺中時一小見脈再舉頭者腎氣也若見損脈來至為難治此上當有北方腎脈其形何似云云問答起語此乃其下文轉語一節也錯簡在此又問曰脈有相乘有縱有橫有逆有順何謂也師曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水木行乘火名曰順也又問曰脈有殘賊何謂也師曰脈有弦緊浮滑沉澀此六者名曰殘賊能為諸脈作病也又問曰脈有災怪何謂也師曰假令人病脈得太陽與形證相應因為作湯比還送湯如食頃病人乃大吐若下利腹中痛師曰我前來不見此證今乃變異是名災怪又問曰何緣作此吐利答曰或有舊時服藥今乃發作故名災怪耳又問曰東方肝脈其形何似師曰肝者木也名厥陰其脈微弦濡弱而長是肝脈也肝病自得濡弱者愈也假令得純弦脈者死何以知之以其脈如弦直是肝臟傷故知死也又問曰南方心脈其形何似師曰心者火也名少陰其脈洪大而長是心脈也心病自得洪大者愈也假令脈來微去大故名反病在裡也脈來頭小本大者故名覆病在表也上微頭小者則汗出下微本大者則為關格不通不得尿頭無汗者可治有汗者死又問曰西方肺脈其形何似師曰肺者金也名太陰其脈毛浮者是肺脈也肺病自得此脈若得緩遲者皆愈若得數者則劇何以知之數者南方火火克西方金法當癰腫為難治也又曰二月得毛浮脈何以處言至秋當死師曰二月之時脈當濡弱反得毛浮者故知至秋死二月肝用事肝屬木脈應濡弱反得毛浮者是肺脈也肺屬金金來剋木故知至秋死他仿此又問曰脈肥人責浮瘦人責沉肥人當沉今反浮瘦人當浮今反沉故責之師曰寸脈下不至關為陽絕尺脈上不至關為陰絕此皆不治決死也若計其餘命死生之期期以月節克之也又曰脈病人不病名曰行屍以無王氣卒眩僕不識人者短命則死人病脈不病名曰內虛以無穀神雖困無苦又問曰翕奄沉名曰滑何謂也師曰沉為純陰翕為正陽陰陽和合故令脈滑關尺自平陽明脈微沉飲食自可少陰脈微滑滑者緊之浮名也此為陰實其人必股內汗出陰下濕也又問曰曾為人所難緊脈從何而來師曰假令亡汗若吐以肺裡寒故令脈緊也假令咳者坐飲冷水故令脈緊也假令下利以胃中虛冷故令脈緊也又曰寸口衛氣盛名曰高高者暴狂而肥營氣盛名曰章章者暴澤而光高章相搏名曰綱綱者身筋急脈弦直故也衛氣弱名曰惵惵者心中炁動迫怯營氣弱名曰卑卑者心中常自羞愧惵卑相搏名曰損五臟六腑俱乏氣虛惙故也衛氣和名曰緩緩者四肢不自收營氣和名曰遲遲者身體俱重但欲眠緩遲相搏名曰沉沉者腰中直腹中急痛但欲臥不欲行又曰寸口脈緩而遲緩則陽氣長其色鮮其顏光其聲商毛髮長遲則陰氣盛骨髓生血滿肌肉緊薄鮮硬陰陽相抱營衛俱行剛柔相得名曰強也又曰趺陽脈滑而緊滑者胃氣實緊者脾氣強持實擊強痛還自傷以手把刃坐作瘡也又曰寸口脈浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則吐逆又曰趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格又曰脈浮而大浮為風虛大為氣強風氣相搏必成癮疹身體為癢癢者名泄風久久為痂癩眉少發稀身有干瘡而腥臭也又曰寸口脈弱而遲弱者衛氣微遲者營中寒營為血血寒則發熱衛為氣氣微者心內飢飢而虛滿不能食也又曰趺陽脈大而緊者當即下利為難治又曰寸口脈弱而緩弱者陽氣不足緩者胃氣有餘噫而吞酸食卒不下氣填於膈上也上亦作下又曰趺陽脈緊而浮浮為氣緊為寒浮為腹滿緊為絞痛浮緊相搏腸鳴而轉轉則氣動膈氣乃下少陰脈不出其陰腫大而虛也又曰寸口脈微而澀微者衛氣不行澀者營氣不逮營衛不能相將三焦無所仰身體痹不仁營氣不足則煩疼口難言衛氣虛則惡寒數欠三焦不歸其部上焦不歸者噫而酢吞中焦不歸者不能消穀引食下焦不歸者則遺溲又曰趺陽脈沉而數沉為實數消穀緊者病難治又曰寸口脈微而澀微者衛氣衰澀者營氣不足衛氣衰面色黃營氣不足面色青營為根衛為葉營衛俱微則根葉枯槁而寒慄咳逆唾腥吐涎沫也又曰趺陽脈浮而芤浮者衛氣衰芤者營氣傷其身體瘦肌肉甲錯浮芤相搏宗氣衰微四屬斷絕四屬謂皮肉脂髓俱竭則宗氣衰矣又曰寸口脈微而緩微者衛氣疏疏則其膚空緩者衛氣實實則谷消而水化也谷入於胃脈道乃行水入於經其血乃成營盛則其膚必疏三焦絕經名曰血崩又曰趺陽脈微而緊緊則為寒微則為虛微緊相搏則為短氣又曰少陰脈弱而澀弱者微煩澀者厥逆又曰趺陽脈不出脾不上下身冷膚硬又曰少陰脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為屍厥當刺期門巨闕宗氣者三焦歸氣也有名無形氣之神使也下榮玉莖故宗筋聚縮也又曰寸口脈微尺脈緊其人虛損多汗知陰常在絕不見陽也又曰寸口諸微亡陽諸濡亡血諸弱發熱諸緊為寒諸乘寒者則為厥鬱冒不仁以胃無穀氣脾澀不通口急不能言戰而慄也又曰濡弱何以反適十一頭師曰五臟六腑相乘故令十一又問曰何以知乘腑何以知乘臟師曰諸陽浮數為乘腑諸陰遲澀為乘臟也
