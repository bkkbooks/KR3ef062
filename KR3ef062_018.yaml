body:
  text: 卷十八傷寒溫疫論一條雍曰傷寒時氣症類亦多或名傷寒或名溫病或曰時行或曰溫疫或曰溫毒或以為輕或以為重論說不一益令人惑大抵其病往往有一種即時發者必輕經時而發者必重也且如傷寒一病仲景以為冬傷於寒中而即病者名曰傷寒蓋初感即發無蘊積之毒氣雖為傷寒而其病亦輕仲景又曰不即病寒毒藏於肌膚至春變為溫病至夏變為熱病是則既傷於寒又感於溫兩邪相搏合為一病如人遇盜又有同惡濟之者何可支也故傷寒冬不即發遇春而發者比於冬之傷寒為重也又有夏至而發者蓋寒毒淺近在膚腠正氣易勝故難久留是以即發其毒稍深則入於肌肉正氣不能勝必假春溫之氣開疏腠理而後可發是以出為溫病又其毒之盛者經時既久深入骨髓非假大暑消爍則其毒不可動此冬傷於寒至夏為熱病者所以又重於溫也故古人謂冬傷於寒輕者夏至以前發為溫病甚者夏至以後發為暑病也此三者其為傷寒本一也惟有即發不即發之異隨脈變動遂大不同又有冬不傷寒至春感不正之氣而病其病無寒毒之氣為之根雖名溫病又比冬傷於寒至春再感溫氣為病輕然春溫冬寒之病乃由自感自致之病也若夫一鄉一邦一家皆同息者是則溫之為疫者然也非冬傷於寒自感自致之病也蓋以春時應暖而反寒夏熱反涼秋涼反熱冬寒反暖氣候不正盛強者感之必輕衰弱者得之必重故名溫疫亦曰天行時行也設在冬寒之日而一方一鄉一家皆同此病者亦時行之寒疫也大抵冬傷於寒經時而後發者有寒毒為之根再感四時不正之氣而病則其病安得不重如冬病傷寒春病溫氣與夫時行瘟疫之類皆無根本蘊積之類才感即發中人淺薄不得與寒毒蘊蓄有時而發者同論也惟溫毒一病既非傷寒又非溫病乃在冬時表嘗感寒先感冬溫不正之毒後復為寒所折膚腠閉密其毒進不得入退不得泄必假天氣暄熱去其外寒而後溫氣得通鬱積既久毒傷肌膚故斑如錦文或爛為瘡而後可出仲景曰其冬有非節之暖名為冬溫冬溫之毒與傷寒大異謂此溫毒也亦有所感輕淺則易出所感深重則非節之暖人人皆感故每為疫其實先溫後寒所以與傷寒大異然而時之氣有正有不正何也大論曰春氣溫和夏氣暑熱秋氣清涼秋氣冰冽此則四時正氣之序所謂四時正氣之病也又曰春時應暖而反大寒夏時應熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣是謂不正之氣毒傷人者也雍論傷寒名例已見於初卷今辨析時行溫疫詳言著於篇下溫病六條雍曰醫家論溫病多誤者蓋以溫為別一種病不思冬傷於寒至春發者謂之溫病冬不傷寒而春自感風寒溫氣而病者亦謂之溫及春有非節之氣中人為疫者亦謂之溫三者之溫自不同也素問曰冬傷於寒春必病溫又曰凡病傷寒而成溫者先夏至日為病溫此皆謂傷寒而成溫者比之傷寒熱病為輕而比之春溫之疾為重也其治法與傷寒皆不同或有冬不傷寒至春自傷風寒而病者初無寒毒為之根源不得謂之傷寒第可名曰溫病也又或有春天行非節之氣中人長幼病狀相似者此則溫氣成疫也故謂之瘟疫瘟疫之病多不傳經故不拘日數治之發汗吐下隨症可施行其不傷寒至春觸冒自感之溫治與疫同又輕於疫也或曰春時觸冒自感之溫古無其名何也曰假令春時有觸冒自感風寒而病發熱惡寒頭疼身體痛者既非傷寒又非疫氣不因春時溫氣而名溫病當何名也如夏月之疾由冬感者為熱病不由冬感者為暑為暍春時亦如此也活人書葳蕤湯方云治風溫兼療冬溫及春月中風傷寒即其藥也曰何以辨其冬感春感之異曰但傳經皆冬感也皆以傷寒治不傳經者皆春感也皆以溫氣治之今於諸家方論下別而言之庶幾易明然春溫之病古無專治之法溫疫之法兼之也活人書曰春月傷寒謂之溫病冬傷於寒輕者夏至以前發者為溫病蓋由春溫暖之氣而發也雍曰此謂傷寒之溫也即素問所謂凡病傷寒而成溫病者是也其治與傷寒同故朱氏自注曰非徒溫疫也又曰治溫病與冬月傷寒夏月熱病不同蓋熱輕故也雍曰此謂春溫非傷寒者若傷寒成溫則其熱輕於熱病而重於冬月傷寒也蓋冬月傷寒為輕至春發為溫病為重夏月熱病為尤重也朱氏注曰春秋初末陽氣在裡其病稍輕縱不用藥治之五六日亦自安即此推之則此春溫之病乃謂非傷寒成溫者又曰升麻湯解肌湯最良熱多者小柴胡湯主之不渴外有微熱者小柴胡加桂枝也嗽者小柴胡加五味也煩躁發渴脈實大便閉塞者大柴胡微利也虛煩者竹葉湯次第服之此治春溫之法其傷寒成溫者並依傷寒治之治溫疫之法並同春溫而加疫藥也又曰一歲之中長幼疾多相似此溫疫也四時皆有不正之氣春夏亦有寒涼時秋冬亦有暄暑時人感疫癘之氣故一歲之中病無長幼悉相似者此則時行之氣俗謂之天行是也老君神明散務成子螢火丸聖散子敗毒散主之雍曰此謂春溫成疫之治法也若夏暑成疫秋瘟成疫冬寒成疫皆不得同治各因其時而治之況一歲之中長幼疾狀相似者即謂之疫如瘧利相似咽喉病相似赤目相似皆即疫也皆謂非觸冒自取之因時行之氣而得也又曰春應暖而涼氣折之則責邪在肝升麻解肌湯主之夏應暑而寒氣折之則責邪在心射干湯半夏桂枝甘草湯選用之秋應涼而反大熱抑之則責邪在肺溫熱相搏民多病瘧宜白虎加蒼朮湯煎茵陳湯調五苓散冬應寒而反大溫抑之則伏寒變為溫宜葳蕤湯土無正名因火而名當隨其經而取之此又治四時溫氣之法溫疫皆同治也風溫溫毒四條千金方曰風溫之病脈陰陽俱浮汗出體重其息必喘其形狀不仁默默欲眠下之者小便難發其汗者必譫語加燒針者則耳聾難言但吐之則遺矢便利如此疾者宣服葳蕤湯活人書曰脈尺寸俱浮頭痛身熱常自汗出體重其息必喘四肢不欲收默默但欲臥者風溫也病人素傷於風因復傷於熱風熱相搏則發風溫主四肢不收頭疼身熱常自汗出不解治在少陰厥陰不可發汗汗出則譫語獨語內煩躁擾不得臥若驚癇目亂無精治者復發其汗如此死者醫殺之也活人書曰風溫不可發汗宜葳蕤湯風溫身灼熱者知母葛根湯風溫加渴甚者栝簍根湯風溫脈浮身重汗出漢防己湯活人書曰初春病人肌肉發斑癮疹跡如錦紋或咳心悶但嘔者此名溫毒也溫毒發斑者冬時觸冒寒毒至春始發病初在表症如傷寒或已發汗吐下而表症未罷毒氣不散或發斑黑膏主之成瘡者自作瘡毒治不可用黑膏又有冬月溫暖人感乖戾之氣冬未即病至春或被積寒所折毒氣不泄至天氣暄熱溫毒始發則肌肉斑爛癮疹如錦文內攻心悶但嘔清汁葛根橘皮湯主之雍曰不必初春春夏皆發其斑與傷寒不同癮疹如錦文而不作瘡爛者是也其發瘡膿爛者即時行熱毒豌豆瘡也二者初症皆先有表證如傷寒又有癮疹赤白二種初無表症暴感溫氣而作其毒輕淺風尸之類也又有一種遍身如錦初亦無表症暴感而作如丹如疹其毒亦輕皆詳見小兒瘡疹後斑瘡癮疹論辨中雍曰仲景言風溫溫毒二症又與二說不同仲景之言曰傷寒過十三日以上不間尺寸陷者大危若更感異氣變為他病者當依後壞病症而治之若陽脈浮滑陰脈濡弱者更過於風變為風溫陽脈洪數陰脈實大者更遇溫熱變為溫毒溫毒為病最重此乃傷寒後四種壞病此病最為重也又非但前所謂風溫溫毒而已其用藥亦當不同然則仲景所言傷寒壞病中風溫毒也諸家所言者冬春自感風溫溫毒也其治之輕重不得不異也四種壞病中又有濕溫一症見第八卷不可汗門中雍曰天行溫疫雖症不多用藥亦多端如千金方言闢溫疫氣並斷溫疫相染諸方及千金翼彈鬼丸神明白散太乙流金散螢火丸等方前人雖嘗選用更嘗缺省收其遺逸用之大抵治疫尤要先辨寒溫然後用藥取陰陽表裡之在傷寒也故龐安常又述其治寒疫諸方蓋以赤散解聖散之類皆宜治寒疫若施之瘟疫則益熱矣傷寒相似諸症十四條雍曰活人書論痰症食積虛煩腳氣四者皆與傷寒相似而實非傷寒醫者見其發熱惡寒多作傷寒治之因茲夭橫甚多故特立此名使覽者知其非傷寒也雍取此論而廣之然虛煩一症已置之前卷者仲景言病有本是霍亂今是傷寒者孫真人言傷寒後虛煩故以霍亂虛煩二病次於前卷痓濕暍之後今獨取朱氏之說繼之以瘡毒蟲毒溪水瘴霧諸症類傷寒者皆當辨症而後用藥也活人書曰病有憎寒發熱者惡風自汗寸口脈浮胸膈痞滿氣上衝咽喉不得息而頭不疼項不強者此為有痰也雖類傷寒但頭不疼項不強為異宜服柴胡半夏湯金沸草散大半夏湯若氣上衝咽喉不得息者用瓜蒂散吐之古法服瓜蒂散用一錢匕藥下便臥欲吐且忍之良久不吐以三錢匕湯二合和服以手指擲之便吐不吐復稍增之以吐為度若吐少病不除明日如前法再服之但不可令人虛也藥力過時不吐飲熱湯一升以助藥力吐訖便可食無復餘毒若服藥過多者飲水解之雍曰凡吐後須服糜粥二三日忌生冷油膩物又曰頭疼脈數發熱惡寒而身不疼痛左手脈平和者食積也雖類傷寒而左手人迎脈平和身不疼痛者是也甲乙經云人迎緊盛傷於寒氣口緊盛傷於食蓋氣口主中人迎主外以此別之傷食之症由脾胃伏熱因食不消發熱故似傷寒若膈實吐嘔者食在上脘宜吐之若心腹滿宜下之治中湯五積散黑神丸可選用也雍曰巢氏言脾胃有伏熱因食不消所以發熱狀似傷寒但身不疼頭不痛為異又曰食積病亦類時行但發熱頭疼食病當速下之時行病當待六七日下之又曰傷寒頭疼身熱支節痛大便祕或嘔逆而腳屈弱者腳氣也傷寒只傳六經故症與腳氣相似然終不同者孫真人云卒起腳屈弱不能轉動者此為異耳其脈弦而浮者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒風者汗而愈濕者溫而愈熱者下而愈寒者尉而愈腳氣之病始得不覺由他病乃知毒氣入腹則少腹頑痹不仁令人吐嘔死在旦夕矣然腳氣之候必先從腳起或先緩弱疼痛寒勝為痛痹或行起忽倒或兩脛腫滿或不腫腳膝枯細或心中忪悸或少腹不仁病久入深營衛不榮故為不仁不仁者皮膚頑木不知是也或舉體轉筋或見食吐遂惡聞食氣或胸滿氣急或遍體痠疼皆腳氣候黃帝所謂緩風痹是也頑弱名緩風疼痛為濕風痹痹者閉也閉而不仁故名痹宿患瘴毒得熱更增雖形候旺盛猶在於表未入腸胃不妨溫而汗之已入內者不妨吐而下之又本有冷今得溫瘴雖暴壯熱煩滿祕塞正須溫藥汗之汗之不散不妨寒藥下之若服利藥不瘥成黃疸不瘥為尸疸病前熱而後寒者發於陽無熱而惡寒者發於陰發於陽者攻其外發於陰者攻其內一日二日發汗必愈三日以上宜吐之五日以上當下之雍曰要方參千金翼方十卷皆有方宜用問曰瘴作瘧何如巢氏曰此病生於嶺南一帶山瘴之氣其狀發寒熱休作有時皆由山溪源嶺瘴濕毒氣故也其病重於傷寒暑之瘧鯪鯉湯主之此又休作無時其初皆類傷寒也問曰霧氣如何千金三十九卷曰患霧氣者心內煩悶少氣頭痛項急起則眼眩又身微熱戰掉不安時復憎寒心中欲吐吐時無物者豬清湯主之雍曰頭痛項急身熱憎寒皆傷寒類也問曰溫瘧類傷寒何如素問三十三篇曰溫瘧者得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或因有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外雍曰溫瘧始感之氣與傷寒同及其發出之時與傷寒異故不為傷寒而為瘧也溫瘧之症寒中三陽所患必熱小續命湯去附子減桂一半主之大煩躁者紫雪最良大便祕者脾約丸神效丸五柔丸大三脘散木瓜散主之頭痛身熱肢體痛而腳屈弱者是其人素有腳氣此時發動也腳腫者檳榔散主之腳氣方論千金外臺最詳大熱越婢湯小續命湯薏苡仁酒脾約丸神效丸皆要藥仍針灸為佳用補藥與湯淋洗皆大禁也雍曰此其大致也前言閉而不仁故名痹不仁者痹之一症非痹皆不仁也腳氣與痹各詳本症論之雍曰凡射工毒水毒瘴霧瘡瘍斑豆等症其初如傷寒故孫真人於傷寒後附溪毒一症溪毒即射工今詳其狀類以明其症與傷寒別是亦疑而辨之也孫真人曰江南有射工毒蟲一名短狐溪毒一名蜮其蟲形如甲蟲無目而利耳有一長角在口前如弩擔其角端曲如上弩以氣為矢因水勢以射人人或聞其在水中鉍鉍作聲要須得水沒其口便以口中毒射人此蟲畏鵝鵝能食之其初始症候先要寒噤寒熱筋急仍似傷寒亦如中風便不能語朝蘇晡劇寒熱悶亂是其症也始得三四日急治之稍遲者七日死又曰中人瘡有三等巢云四等又曰其蟲小毒輕者及相逐者射著人影者皆不即作瘡先病寒熱自非其地之人不知其症便謂傷寒作治乖謬是以致禍方見千金二十及第十卷第五卷雍曰巢言含沙射人影便成病此取杜元凱之說又曰中人頭面尤急腰以上去人心近多死腰以下小腹不治亦死孫真人曰凡山水有毒蟲人涉水之時中人似射工而無物其診法初得之惡寒微似頭疼巢云偏頭痛目眶痛心中煩懊四肢振掀腰背百節皆強兩膝痛或翕翕而熱但欲眠旦醒暮劇手足逆冷至肘膝二三日腹中生蟲蝕人下部肛中有瘡不痛不癢令人不覺不急治之六七日上蝕五臟下利不禁良工不能治矣水毒有陰陽覺之急視其下部若有瘡正赤如截肉者為陽毒最急瘡如鯉魚鱗者為陰毒猶小緩要皆殺人不過二十日也初中水毒時當以小蒜作湯試之方治詳見千金巢氏曰東南郡縣山谷溪源有水毒病亦名溪溫以其病與射工診候相似故通呼溪病其實有瘡是射工無瘡是溪毒也又曰水毒有雌雄脈洪大而數者為陽是雄溪易治宜先發汗及浴脈沉細而遲者為陰是雌溪難治欲審知是中水毒者手足指冷為是不冷非也又呼為𧋊病巢氏曰嶺南從仲春至仲夏行青草瘴季夏至孟冬行黃芒瘴先熱後寒自余諸瘧疾見本病門問曰傷寒亦變瘧乎千金三十五卷曰時行後變成瘴瘧者大五補湯主之問曰酒病似傷寒何如巢氏曰酒有毒而性尤熱飲之過多故毒熱氣流溢經絡浸淫腑臟而生諸病也或煩躁壯熱而似傷寒或灑淅惡寒有同溫瘧或吐利不安或嘔逆煩悶隨臟氣虛寒而生病焉雍曰凡癰疽病及豌豆疱瘡之類初症多類傷寒各見本門更不重出
