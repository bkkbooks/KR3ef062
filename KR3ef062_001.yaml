body:
  text: 卷一傷寒名例十問問曰傷寒之名何也王叔和撰次張仲景之言曰冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃名傷寒耳其傷於四時之氣皆能為病以傷寒為毒者以其最成殺厲之氣也問曰傷寒亦名熱病何也素問三十一篇曰熱病者皆傷寒之類也又曰人之傷於寒則為病熱故素問皆謂之熱病而三十二篇有肝熱病心熱病脾熱病肺熱病腎熱病之名及其病證刺法也問曰傷寒有五何也難以五十八難曰傷寒有五有中風有傷寒有濕溫有熱病有溫病是也何以一病而有五名也雍曰其病皆傷於寒其為病皆熱則一也然而有五名者因四時之變氣而言也冬有風寒二證故冬為中風為傷寒春為溫病夏為暑病亦曰熱病秋為濕溫此皆重感於四時之氣故異其名也總而言之則皆曰傷寒曰熱病故王冰言論其發病皆為傷寒致之是也謂之熱者其證皆熱也問曰何以謂之溫病素問三篇曰冬傷於寒春必溫病故王叔和述仲景之言曰中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也是以辛苦之人春夏多溫熱病皆由冬時觸寒所致非時行之氣也素問所謂熱病謂四時之病其病皆熱也後世以暑病為熱病者謂夏時之氣熱最重於四時之熱也問曰時行之氣何如叔和述仲景之言曰陰陽大論曰春氣溫和夏氣暑熱秋氣清涼冬氣冰冽此則四時正氣之序也如春時應暖而反大寒夏時應大熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣也人感非時之氣是以一歲之中長幼之病多相似者此則時行之氣也問曰素問言四時之氣更傷五臟何也仲景叔和曰氣候有應至而不至或有未應至而至者或有至而太過者皆成病氣亦時行之一也雍曰巢元方病源以傷寒時氣溫病熱病分為四種傷寒冬也時氣疫也溫病春也熱病夏也雖各具數十候究其證治皆不相遠問曰古書言歲之所以皆同病者亦時行乎雍曰此則上古謂之歲露也時行者失時之和而中病者也何以謂之歲露靈樞七十九篇曰冬至之日風雨從南方來者為虛風賊傷人者也其以夜半至者萬民皆臥而弗犯也故其歲民少病其以書至者萬民懈怠而皆中於虛風故萬民多病此黃帝所謂歲之所以皆同病者又非失時之和而中病也故特謂之歲露問曰傷寒之與歲露何如雍曰歲露者賊風虛邪也因歲露而成傷寒者其病重而多死四時傷寒者因寒溫不和而感也其病輕而少死上古之書論歲露自越人仲景之下皆不言及之今雖有遇歲露而死者世亦莫之辨皆謂之傷寒時行也問曰有以傷寒溫疫為不異者何如孫真人曰小品云古人相傳傷寒為難治之疾時行溫疫是毒氣之病而論治者不判傷寒與時行溫疫為異氣耳云傷寒是雅士辭天行溫疫是田舍間號不說病之異同也考之衆經其實殊矣所病不同方說宜辨是以略述其要云問曰傷寒何以謂之卒病雍曰無是說也仲景敘論曰為傷寒雜病論合十六卷而標其目者誤書為卒病後學因之乃謂六七日生死人故謂之卒病此說非也古之傳書怠墮者因於字書多省偏旁書字或合二字為一故書雜為雜或再省為卒今書卒病則雜病字也漢劉向校中祕書有以趙為肖以齊為立之說皆從省文而至於此與雜病之書卒病無以異今存傷寒論十卷雜病論亡矣敘論五問問曰或謂傷寒為橫病何也孫真人云俗人謂之橫病多不解治皆云日滿自瘥以此致夭枉者天下大半凡始覺不佳即須救療迄至於病愈湯飲競進折其毒熱自然而瘥必不可令病氣自在恣意攻人拱手待斃也問曰凡有疾不時治何如仲景曰凡人有疾不時即治隱忍冀瘥以成痼疾小兒女子益以滋甚時氣不和便當早言尋其邪由及在腠理以時治之罕有不愈者患人忍之數日乃說邪氣入臟則難可制止此為家有患備慮之要外臺作千金論云難可制止雖和緩亦無能為也癰疽疔腫尤其為急此自養之要也問曰治湯藥何如仲景曰凡作湯藥不可避晨夜覺病須臾即宜便治不等早晚則易愈矣如或瘥遲病即傳變雖欲除治必難為力服藥不如方法縱意違師不須治之問曰服湯節度何如仲景曰凡發汗用溫暖湯藥其方雖言日三服若病劇不解當促其間可半日盡三服若與病相阻即便有所覺病重者一日一夜當晬時觀之如服一劑病證猶在當復作本湯治之至有不肯汗出服三劑乃解若汗不出者死病也後有陳廩邱蒸汗法問曰服藥四方異宜何如叔和云地土溫涼高下不同物性剛柔餐居亦異是故黃帝興四方之問岐伯舉四治之能以訓後賢開其未悟臨病之工宜兩審之治法大要九問問曰傷寒治法之大要何如仲景曰凡傷寒之病皆從風寒得之始表中風寒入里則不消矣未有溫覆而當不消散者不在證治擬欲攻之猶當先解表乃可下之若表已解而內不消非大滿猶生寒熱則病不除若表已解而內不消大滿大實堅有燥屎自可除下之雖四五日不能為禍也若不宜下而便攻之內虛熱入協熱遂利煩躁諸變不可勝數輕者困篤重者必死矣華元化曰傷寒六日入胃入胃乃可下也若熱毒在外未入於胃而先下之其熱乘虛入胃則爛胃也其熱微者則赤斑也劇則黑斑也雍曰此論汗下之宜即治法之大要也問曰汗下失其宜何如仲景曰陽盛陰虛汗之則死下之則愈陰盛陽虛汗之則愈下之則死夫如是則神丹安可以誤發甘遂何可以妄攻虛盛之治相背千里吉凶之機應若影響豈容易哉況桂枝下咽陽盛則斃承氣入胃陰盛乃亡死生之要在乎須臾視身之盡不暇計日此陰陽虛實之交錯其候至微發汗吐下之相反其禍至速也問曰表裡或至於俱感汗下不可以並行乎仲景曰凡兩感病俱作治有先後發表攻裡本自不同而執迷妄意者乃云神丹甘遂合而飲之且解其表又除其里言巧似是其理實違夫智者之舉措也常審以慎愚者之動作也必果而速安危之變豈可詭哉問曰傷寒日滿自瘥之說果何如雍曰雖古名人亦有是論惟張孫不取也許仁則言自心不全甄別他醫難得精妙與其誤療也寧得任之但能薄滋味適寒溫將理中冷暖守過七日此最為得計其中事須服藥不可徒然者惟多日不大便暫須一轉泄耳雍謂此說固善然人感疾輕重難同幸而所感不重證循常理則有是說假令感疾深重變證不常日滿則死矣所以仲景言時氣不和便當早言及在腠理以時治之孫真人言勿令病氣自在恣意攻人拱手待斃也豈許氏之言與有病不治常得中醫之說皆有激而云乎問曰傷寒之初不當用峻藥何如雍曰此可謂之良醫之言常聞常器之為初學淺識者有是說矣仲景之法有是證則用是藥今曰桂枝證麻黃證是當用桂枝麻黃二湯也然常人才學明識不逮仲景則有誤在其中安敢盡用其藥遇桂枝證則必思桂枝之輕者而用之遇麻黃證則必思麻黃之輕者而用之蓋慮脈證有誤須預為之防得不失仲景大意可也如因仲景之言必盡用仲景之劑不自量力周思斷然無疑所謂愚者動作果而速也鮮不失矣至如青龍承氣十棗陷胸等湯學淺者尤宜絶口如其人醫道果精深當一從仲景之言尚有承氣之戒可不審哉問曰或言傷寒只當看證治之何如雍曰經絡為先證脈為次朱氏活人書曰治傷寒不識經絡如觸途冥行不知邪氣之所在往往病在太陽反攻少陰證是厥陰乃和少陽寒邪未除真氣受斃又況傷寒看外證為多未診先問最為有準孫真人云問而知之別病淺深名為巧醫既得其經然後切脈以辨在表在裡若虛若實以汗下之古人所以云問而知之為中工切而知之為下工也雍曰傷寒之疾其來甚暴尚為易見故問外證切寸口足以知病之所在如雜病有難知者當如古人揆度奇恆之道未易以一二言也問曰人病傷寒或無湯藥則何如華元化曰若無丸散及煎者但單煮柴胡數兩傷寒時行皆可服以發汗至再三發汗不解當與湯實者轉下之但當少與勿令大下耳雍曰此須能辨證者偶在道途間乏藥乃可用之蓋柴胡亦與陰病不相宜也問曰傷寒數種庸人不能分別者用藥如何葛稚川曰若初覺頭疼肉熱脈洪起一二日便作加減蔥豉湯蔥白虎口一握豉一升綿裹以水三升煮取一升頓服取汗若不汗更作加葛根三兩水五升煮取二升分再服不汗更作加麻黃三兩去根節諸名醫方皆用此更有加減法甚多江南人多服之雍嘗見北方乏醫藥處遇傷寒時氣秦人即飲蔥茶晉人即飲蜜茶雖甚苟且亦有應者後少見損人蔥茶似有理蜜殊不曉所謂問曰汗不出有蒸法何如陳廩邱云醫經云連發汗汗不出者死病也吾思之可蒸也如蒸中風法蒸濕之氣於外迎之不得不汗也後以問張苗苗云曾有人作事疲極汗出臥單簞中冷得病但苦寒蜷諸醫與丸散湯四日之內凡八過發汗汗不出苗令燒也布桃葉蒸之即得大汗於被中就粉傅之使身極燥乃起便愈後數以此發汗汗皆出也人性有難汗者非惟病使之然也蒸之則無不汗出範汪云諸病發熱惡寒脈浮洪便宜發汗溫粉撲之勿令遇風當發汗而其人適失血及大下利則不可大汗數少與桂枝湯使體潤漐漐汗出連日當自解上治法大要不拘於經故傷寒總目載之敘論之中今依論次於敘論之後其餘治法並各詳見於逐經逐證之中傷寒脈法及刺法六問問曰傷寒有五其脈何如難經五十八難曰中風之脈陽浮而滑陰濡而弱濕溫之脈陽濡而弱陰小而急傷寒之脈陰陽俱盛而緊澀熱病之脈陰陽俱浮浮之而滑沉之散澀溫病之脈行在諸經不知何經之動各隨其經之所在而取之問曰脈之辨寒暑何如仲景曰脈盛身寒得之傷寒脈虛身熱得之傷暑問曰欲愈之脈何如仲景曰凡得病厥脈動數服湯藥更遲脈浮大減小初躁後靜者此皆愈證也問曰病有損脈何如雍曰傷寒至脈多損脈少故仲景曰四損三日死五損一日死六損一時死凡四息而一至曰四損五息一至曰五損六息一至曰六損也問曰死生之脈何如仲景曰脈陰陽俱盛大汗出不解者死脈陰陽俱虛熱不止者死脈至乍數乍疏者死脈至如轉索者死譫言妄語身微熱脈浮大手足溫者生逆冷脈沉細者不過一日死此以前是皆傷寒證候也問曰溫病刺五十九穴何穴也素問三十二篇曰病甚者為五十九刺是也靈樞二十三篇曰所謂五十九刺者兩手外內側各三凡十二痏五指間各一凡八痏足亦如是亦八痏頭入發一寸旁三分各三痏凡六痏更入發三寸邊五凡十痏耳前後口下一作目下各一項中一凡六痏巔上一囟會一髮際一廉泉一風池二天柱二此五十九穴也右傷寒脈法針術不止於此此則論其敘論所載其餘各見逐經逐證之下張仲景華元化五問問曰華他治傷寒法與仲景少異何謂千金方載華他之言曰夫傷寒始得一日在皮膚摩膏火灸之則愈若不解者二日在膚可依法針服解肌散發汗汗出則愈若不解者三日在肌復一發汗則愈若不解者止勿復發汗也至四日在胸宜服藜蘆丸微吐之則愈若病用藜蘆丸不能吐者服小豆瓜蒂散吐之則愈也視病若未惺惺者復一法針之五日在腹六日入胃入胃乃可下也若熱毒在外未入於胃而先下之者其熱乘虛入胃則爛胃也然熱入胃要須下去之不可留於胸中也雍曰元化之術指日期為候仲景雖指日而要在察陰陽六經之證此其所以若少異也要之仲景規矩準繩明備足為百世之師元化自得神術惟可自用故外臺言元化藜蘆丸近用損人不録則知後人不能學也問曰仲景元化之術孰優雍曰未易優劣大抵仲景之術得於學識元化之術得於心悟心悟則變化無常自用多奇而學者鮮能從必欲從上聖之精微為百世之模楷非仲景而誰歟故仲景之於醫道守其常也元化之醫道從其變也問曰元化臨終之日焚書於獄中曰此書可以活人後世謂所焚之書為仲景之書是耶非耶雍日非也仲景之書出於元化之後也曰異哉仲景漢人元化魏人安得書出其後曰仲景元化同為漢末人仲景不仕魏故世稱曰漢仲景元化仕曹氏故世稱曰魏他也考之於史元化死於呂布陳登之際計其時在建安之初是時他已百餘歲矣仲景敘論曰余宗族素多向餘二百建安紀年以來曾未十稔其死亡者三分有二傷寒十居其七感往昔之淪喪傷橫夭之莫救乃勤求古訓博採衆方為傷寒雜病論合十六卷則是書作於建安十年之後故知二公聲跡相接而仲景猶為後進也問曰世獨重仲景之書何也雍曰陶隱居孫真人可謂古之名醫矣陶論醫方曰惟張仲景一部最為衆方之祖孫真人曰傷寒熱病自古有之名醫睿哲多所防禦至於仲景特有神功尋思旨趣莫測其致所以醫人未能鑽仰以二者之言推之宜其特重於世也文孫真人曰尋方之大意不過三種一則桂枝二則麻黃三則青龍凡療傷寒不出之也而說者謂如太陽中暍當用白虎不可誤服桂枝麻黃此古人所未至何也雍曰傷寒之初惟有桂枝麻黃青龍三證故不出用此三藥若言中暍則中暍非傷寒自是別病當用白虎何緣用此三藥非古人所未至蓋論者誤以中暍為傷寒也問曰元化之書有傳否雍曰未之見也載於千金者亦雜以孫真人之言近世蘄水龐安常論中所載其言少異曰龐氏所載何如曰龐氏曰華他治法云傷寒病起自風寒入於腠理與精氣分爭營衛痞隔周行不通病一日至二日邪氣在孔竅皮膚之間故病者頭疼惡寒身熱腰脊強直此邪氣在表隨證發汗則愈病三日以上氣浮上部填塞心胸故頭痛胸中滿或多痰涎當吐之則愈病五六日以上氣結在臟腑故腹滿身重骨節煩疼當下則愈其言與千金又異
