body:
  text: 卷二十小兒瘡疹下十八條雍論曰朱氏作活人書亦多取蘄水龐安常之說至論瘡泡則二家之說如冰炭朱氏謂瘡疹首尾皆不可下龐氏謂未發欲發瘡斑未見皆宜下之瘡已瘥而再下之何其一說相戾如此雍曰考漢魏醫方無所見至東晉王珉始有治時行熱惡毒瘡方隨巢元方始有疫癘疱瘡論候其言皆不甚詳此大疾也殺人不異傷寒何其輕易簡略如此故龐氏疑當時熱毒未甚鮮有死者雍謂不然上古岐黃之時其病尚與今日無異安有中古反不同也王中令既以屬時行巢氏又以為疫病則此疾當詳見於時行疫病中今亡矣傷寒以仲景論故存得詳備時行瘟疫以無仲景治法故後世之說不得同仲景金匱玉函之書千百不存一二安知時行疫疾不亡逸於其間乎然瘡疹舍龐氏朱氏二家則別無可取之論雍疑其相反無所適從嘗聞先兄子若曰朱氏之論後世不可易之常道也此法當獨得於朱氏雍曰然則龐氏之言失乎兄曰醫道精微言所不能盡述使醫之明如龐氏則可用龐氏之法不然則一從朱氏雖不肖者亦可跂而及也聞此方釋然又有東平錢乙仲陽以治小兒名家及論瘡疹亦稍支離滯於五臟五色究其說終不出於二氏之門然仲陽老於醫論症用藥有可取者故繫於朱龐二氏之後雍曰活人書下原文佚病人肌肉發斑下原文佚瘡疹始是溫毒下原文佚傷寒下原文佚初言止此不比其他亦未嘗言斑疹豈言之而亡逸歟故醫家所論溫毒等症多非仲景言時行溫疫至今未詳者詳此或謂瘡疹與傷寒相類謂其頭痛壯熱之類同也非謂所感之同也仲景曰其冬有非節之暖名曰冬溫冬溫之毒與傷寒大異故龐氏曰凡覺冬間有非節之暖瘡毒未發即如法下之則龐氏亦以為冬溫之毒矣然如朱氏二家論症皆如溫毒而不欲明言者以仲景無正說故也以雍觀之瘡疹即溫毒之一晉人既名為時行熱毒瘡即溫毒瘡矣又何疑為其感疾本與傷寒同皆感於冬藏於肌膚至春而發是其同也而仲景言與大異者傷寒感至寒之氣溫毒感冬溫之氣是其所以為異也然有成瘡疹者亦有不成瘡疹者總其名皆謂之溫毒也雍謂感冬溫非節之暖藏於皮膚之中至春夏而其毒發鬱積之盛熏炮肌骨已久一旦發出於外必皆潰爛為瘡而後已不但能為一汗而已然溫毒成瘡有數種曰膿胞又名豌豆瘡曰水疱又名麻子瘡曰麩瘡亦名麩疹又有癮疹斑爛皆其類其輕者世俗以其形象名之本其所感深重為膿胞千金之後名曰豌豆瘡次者為水疱輕者為麩瘡膿胞生七日方長貫膿成痂然後愈其日未滿而乾者謂之倒靨也水疱生數日圓滿水出則愈麩瘡隨出則焦他處再出再焦如是遍及其身三者皆忌倒靨大者倒靨則色紫甚則膿血欲干故變黑有黑者一二日尚可以藥再發黑者多則難藥已水疱瘡水如鈴倒靨則色幹不明麩瘡才出多忽不見是倒靨也雖麩瘡倒靨亦能殺人以溫毒之氣復入五內也非感溫毒之氣因時行暴發者多不殺人故瘡家畏風畏寒畏塗涼水涼藥大畏下皆恐毒氣倒靨於內當欲謹避風處若時尚寒則難出表雖溫不可太暖不可服熱藥朱氏所云但服升麻湯者最為要法疹病多暴感非冬溫之氣所成病甚輕不成瘡但作癮疹起有赤白二種世俗所謂風尸者是也須服藥亦可塗治雖無倒靨之患亦有毒氣入腹之憂千金小兒澤蘭湯即其藥也又有一種斑發如描畫遍身燦爛如錦文者又如火丹發雖無癮疹起亦如癮疹內外治之色淡則愈傷寒發斑見本文雍論曰諸家論瘡疹可下不可下世人不能無惑雍詳二法本於傷寒傷寒冬感至寒之氣藏於肌膚骨髓之中為腠理閉密不得出至春腠理開疏而後發於表醫者發表中病則從經為汗而出於表發不當或遇毒氣甚重則不能出因傳陰經遂入於裡至里無可發之理候其入胃則下之五臟之毒其根在胃根去則諸臟之毒隨去若有餘毒在裡表未能入間值胃中毒根已下則在表之毒如斷根之蓬隨其所在作汗而出矣故傷寒有汗而愈有下而愈下者亦必先泄後作汗而愈也瘡疱之家本無汗下症其初冬感於非節之溫氣藏於肌骨時方外寒腠理閉密不得出至春腠理開疏而發其藏於膚腠者發為麩瘡藏於肌肉者發為麻子瘡藏於骨髓者發為豌豆瘡既發為瘡則無發汗之理惟用解肌藥以托之庶其易出也毒氣既作瘡而出不復入里亦如傷寒大汗之後不入陰經自無可下之毒故治傷寒之法惟在汗下而瘡疱之家無汗下也然諸家有言下者亦有三說其一方盛冬感非節之溫氣腠理閉密不得出之時其毒氣無所宣泄不過上攻頭目胸膈必頭熱眼赤口瘡喉閉若見其症預先下之則溫毒盡去至春夏不復作瘡疱矣此一可下之時也龐氏所云凡覺冬間有非節之暖瘡毒未發欲發時即如法下之次第服預防之藥則毒氣內消無使入里永不可出必斃而後已此一可下之時也其二則瘡疱黑陷倒靨是大惡候輕者猶可用藥再發發之不出是瘡毒入深不能再至表因而深入急下之則可活矣是十死一生之候不得已而下他無救之之術此二可下之時也其三瘡疱既愈餘毒不已發為大癰既潰出膿血又別發癰相續不已世謂之疱癰必解利之而後已是時病人瘡方愈未得食力氣血虛羸下之甚危道主藉醫者斟酌用藥然不下則斃亦不得也此三可下之時也舍是三者皆不可下矣朱氏云小兒疏轉切忌用丸子藥當以大黃川芎等分㕮咀作湯液以蕩滌蘊熱此說甚良雍謂宜加甘草大黃倍之此常器之所用也盛冬初感未發之時宜用此湯及作疱癰之後亦宜用此但少加劑未效再服之惟瘡作黑陷倒靨發之不出者須朱氏無比散及錢氏百祥丸前所言大黃川芎藥亦不可用也此病原不見於仲景故無定論不免詳言之庶無惑焉雍曰東晉中書令王珉有傷寒身驗方云㯸樺木皮濃汁冷飲主傷寒時行熱毒瘡特良此即今之豌豆瘡當時謂之時行熱毒瘡也故龐氏方中載樺皮飲子者本之此至巢氏論疫癘疱瘡候曰熱毒盛則生豌豆瘡周匝遍身狀如火瘡色赤頭白者毒輕色黑紫黯者毒重亦名為登豆此即熱毒瘡至巢氏而後有疱瘡豌豆之名至今呼之以二者考之則瘡謂為溫毒瘡不謬也凡冬感於寒縱其病熱甚極不過為斑為黃終不成瘡惟感冬溫非節之暖者則成瘡故龐朱皆言溫毒之為瘡而王中令巢氏皆以熱瘡為時行為疫病諸家雖異同其實一也雍曰余家值小兒將作瘡疹未辨傷寒時行即依朱氏法先服升麻葛根湯服之瘡未出而惡風發熱頭痛諸症不罷者即是藥性緩次日更兼敗毒散服之若是瘡子一夕便出或不成瘡亦以汗解仍能解瘡毒重者便輕屢驗又曰瘡疹變出惡症者多是豌豆以其毒氣盛故也其他唯服藥有誤則有惡症不誤服藥者無惡症也又曰麩疹雖不成瘡亦頭焦皮起如麩片然若癮疹則暴發初無表症亦不退皮愈後便消故世謂疹子為麩瘡其毒雖輕若誤服涼藥則盛出之際一夕忽不見便是倒靨毒氣入里亦能殺人以牛李膏發之又曰貧下之家養小兒素無暖衣衾亦無酒肉滋味至其感病只是時行所感候其氣散即便安愈豪貴之家溫燠太過飲食無度既感時行之氣人事又為之助是兩毒相攻所以多生異症遇冬溫時小兒午間常服牛蒡消毒飲甚好又曰瘡疹大畏大小便不快惡症便生急須通之用牛李膏通大便麝香膏通小便大妙又曰錢氏所謂五七日痂不焦以內熱蒸皮中此只是毒氣未盡亦不須宣風散但服牛李膏又曰牛李膏亦是舊方不止錢氏用正是瘡疹本藥如宣風散是外來借功自不同所以貴牛李膏者以出未快者可以出之多者可以解之在表者可因而越之在裡者可引而竭之是瘡疹八面可用之藥故凡瘡疹皆先服之又曰牛李膏奇處正在能分毒氣在表者使出在裡使下表裡並用兩不為妨同時供應毒勢已衰諸藥皆無是之妙天生神物為人用非只此一物第人未能盡知之耳又曰瘡疹初發固不必用牛李膏才見出得稠密或大小便不快或出不快煩悶渴甚者便與服之牛李二種稍大而黑紫者奇微小而深黑者劣微小者即早李也本草共為一物又曰凡豌豆瘡根邊色紅活瘡顆圓滿如珠者大好初生亦未便圓日漸長也瘡根色紅淡瘡顆不圓好便當表發仍頻看覷雍有一孫四五歲患此已數日背上瘡盛而根色淡而不紅活瘡顆已半平半陷間有紫黑色者急與牛李膏二服不見色回再取豬尾血滴研龍腦水調服時已日暮少頃燈下視之瘡根復紅活如初次早陷瘡皆起纍日再長圓滿焦痂而愈但病身中痛異常手不可觸病後羸極如兩次傷寒也是歲一房同時患者皆毒重稠密煩渴皆用牛李膏下黑涎而愈又曰牛李膏之上惟豬尾膏奇但豬尾膏非惡候不用不若牛李膏可常用雖惡候未出使見熱盛便先解之豬尾膏如無龍腦即用麝香麝香大通小便小便快則毒自衰曾用之驗又曰惡候二膏不效方可下雍嘗見一病醫者用無比散下之立愈惟百祥丸不親見用之者雍以多用前二膏故未嘗至於用大下藥又曰活人等書諸方如升麻湯固必先用瘡出不快煩躁不眠者用升麻湯黃芩加木香湯毒攻咽喉心煩者用牛蒡子湯咽喉腫者如聖湯牛李膏豬尾膏瘡毒入眼成翳者用通聖乾柿皆親經用殊效又曰瘡毒好攻人眼目須預防之方感此患便以蟬蛻去土入熱水放冷乘溫日飲至疾愈毒氣永不入眼溫冷任服甚驗斑瘡癮疹一條雍曰世醫論斑癮疹不甚詳明雖龐朱二氏亦然朱氏曰初春病人肌肉斑爛癮疹如錦文者溫毒也龐氏之言亦然朱氏曰發斑有二症有熱病發斑溫毒發斑溫毒如上所言是也熱病發斑者朱氏曰或未發汗或已經汗下而熱毒不散所以發斑瘡癮疹如錦文俗云麩瘡素問謂之疹此誤也雍謂斑與瘡疱及癮疹實是三種傷寒熱病發斑謂之斑其形如丹砂小點終不成瘡退即消盡不復有瘡溫毒斑即成瘡古人謂毒熱瘡也舍是又安得別有熱毒一瘡後人謂豌豆瘡以其形似之也溫毒瘡數種豌豆瘡則其毒之最者其次水泡麻子是也又其次麩瘡子是也如麩片不成瘡但退皮耳以其不成瘡故俗謂之麩瘡又與癮疹不同癮疹者皮膚髮癢搔之則癮疹壟起相連而出終不成瘡不結膿水亦不退皮忽爾而生復忽爾而消亦名風尸也世人呼麩瘡或曰麩疹即是
