body:
  text: 卷五太陽經證治下九十一條仲景曰傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調急當救表救里宜四逆湯救表宜桂枝湯雍曰此謂太陽證誤下之者又曰病發熱頭痛脈反沉若不瘥身體疼痛當救其里宜四逆湯雍曰此太陽病而得少陰脈故急當救里又曰太陽病先下之而不愈因復發汗以此表裡俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也得里未和然後復下之常氏云和表用小柴胡湯復下用調胃承氣湯雍曰汗出表和則不必復下又曰太陽病未解脈陰陽俱停一作微必先振栗汗出而解但陽脈微者先汗出而解千金云宜桂枝湯但陰脈微一有而尺脈實四字者下之而解若欲下之宜調胃承氣湯一云宜大柴胡湯又曰太陽病發熱汗出者此為營弱衛強故使汗出欲救邪風者宜桂枝湯雍曰邪風在衛之風也又曰傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者與小柴胡湯主之又曰血弱氣盡腠理開邪氣因入與正氣相搏結於脅下正邪分爭往來寒熱休作有時默默不欲飲食臟腑相連其痛必下邪高痛下故使嘔也一云臟腑相連其病必脅膈中痛小柴胡湯主之服柴胡湯已渴者屬陽明也以法治之常器之云亦與小柴胡湯待其便堅方可用調胃承氣湯又曰得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡不中與也食谷者噦常氏云可五苓散小半夏橘皮湯雍曰出千金十八卷痰飲門若證象陽旦小便難者屬桂枝加附子湯見前卷又曰傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之又曰傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯不瘥者小柴胡湯主之又曰傷寒中風有柴胡證但見一證便是不必悉具凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解雍曰柴胡湯證誤以他藥下之者也又曰傷寒二三日心中悸而煩者小建中湯主之又曰太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱郁微煩者為未解也與大柴胡湯下之則愈雍曰嘔止小安者勿服大柴胡也又曰傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之千金曰柴胡加大黃芒硝桑螵蛸湯也又曰傷寒十三日不解過經譫語者以內有熱也當以湯下之若小便利者大便當硬而反下利其脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之又曰太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解其外外解已但少腹急結者乃可攻之宜桃核承氣湯雍曰外不解者未可攻先解其外千金用桂枝湯又曰傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之又曰傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門又曰太陽病二日反躁反尉其背而大汗出火氣入胃胃中水竭躁煩必發譫語十餘日振栗自下利者此為欲解也後不可火證中曰振而反汗出為欲解故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及多大便已頭卓然而痛其人足心必熱穀氣下流故也常云可與白虎加人參湯五苓散調胃承氣湯雍曰常氏之意謂火氣入胃胃中枯燥故用白虎加人參湯解之然須無表證渴飲水者可服有表證者不可服以白虎解裡熱故也小便不利者固當用五苓散然渴飲水者宜服其大便硬者用調胃承氣湯亦小便不利則可服小便利者反不可服振栗反汗出者若自下利皆不宜服若無上諸證而大便硬或不通譫語仍在者然後可服此一論證多宜審之若欲解諸證未生時勢須先去火邪宜救逆湯又曰太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者其人可治常氏云可桂枝去芍藥加龍骨牡蠣救逆湯五苓散大承氣湯雍曰救逆則可陰陽俱虛身體枯燥大承氣不敢用小便不利與五苓散發黃者茵陳蒿湯又曰傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之又曰形作傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮解之當汗出愈常氏云可依前救逆湯又曰太陽病以火熏之不得汗其人必躁到經不解必圊血名為火邪常氏云可依前救逆湯黃芩芍藥湯又曰脈浮熱甚而反灸之此為實實以虛治因火而動必咽燥唾血常氏云可依前救逆湯又曰微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也常氏云可依前救逆湯欲其有汗宜柴胡桂枝湯又曰脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也雍曰宜少與救逆湯活人書第十方又曰燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂二兩又曰火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之又曰太陽傷寒者加溫針必驚也常氏曰可依前救逆湯又曰太陽病當惡寒發熱今自汗出反不惡寒發熱關上脈細數者以醫吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆常氏曰可與小半夏湯小溫中湯亦可與半夏乾薑湯出金匱方雍曰活人書大半夏湯小半夏加茯苓湯半夏生薑湯皆可選用又曰太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也常氏曰可與竹葉石膏湯又曰病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也常氏云可與小半夏湯小溫中湯又曰太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也雍曰與調胃承氣湯者謂前證也後證但欲嘔以下非柴胡證宜桔皮湯大半夏加桔皮湯又曰太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之又曰太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之常氏云小便不利無血者與五苓散又曰傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸又曰太陽病小便利者以飲水多必心下悸小便少者必苦裡急也常氏曰可茯苓桂枝甘草生薑湯豬苓湯雍曰小便利用茯苓桂枝白朮甘草湯小便少應用豬苓湯仲景問曰病有結胸有臟結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸也又曰何謂臟結答曰如結胸狀飲食如故時時下利寸口脈浮關脈小細沉緊名曰臟結舌上白苔滑者難治常氏曰可刺關元穴又曰臟結無陽證不往來寒熱一云寒而不熱其人反靜舌上苔滑者不可攻也常氏云可刺關元穴雍曰宜灸又曰病發於陽而反下之熱入因作結胸病發於陰而反下之一作汗之千金方同因作痞所以成結胸者以下之太早故也又曰結胸者項亦強如柔痓狀下之則和宜大陷胸丸又曰結胸證其脈浮大者不可不下之則死常氏云可與增損理中丸並蜜丸服如未效用黃連七寸巴豆七粒二味搗如泥封臍上灼艾灸熱漸效又曰結胸證悉具煩躁者亦死又曰太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛一雲頭痛則眩千金方同胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃也常氏云發黃者與茵陳蒿湯煎茵陳濃汁調五苓散亦可又曰傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之又曰傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之又曰太陽病重發汗而復下之不大便五六日舌上燥而渴日哺所小有潮熱一云日哺所發心胸大煩從心下至少腹硬滿而痛不可近者大陷胸湯主之又曰小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之又曰太陽病二三日不能臥但欲起心下必結其脈微弱者此本有寒分也常云可增損理中丸反下之若利止必作結胸常云可大小陷胸湯主之利未止者四日復下之此作協熱利也常云白頭翁湯又曰太陽病下之其脈促一作縱不結胸者此為欲解也脈浮者必結胸常云可增損理中丸脈緊者必咽痛常云可桔梗甘草湯脈弦者必兩脅拘急常云小柴胡湯脈細數者頭痛未止常云可蔥須湯脈沉緊者必欲嘔常云可七物黃連湯脈沉滑者協熱利常云可白頭翁湯脈浮滑者必下血常云可與類要柏皮湯又曰病在陽應以汗解之反以冷水噀之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服又曰太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五六日譫語不止當刺期門又曰婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之常氏云隨其實而瀉謂針家當行瀉法也亦可用小柴胡湯又曰婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之又曰婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀此為熱入血室無犯胃氣及上二焦必自愈雍曰上焦中焦營衛所出也如不自愈者服小柴胡湯又曰傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之又曰傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者為未解也柴胡桂枝幹薑湯主之又曰傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解雍曰實者大柴胡虛者蜜煎導之又曰傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯又曰太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩常氏曰可半夏生薑二瀉心湯又曰脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳常氏曰可小陷胸湯生薑瀉心湯雍曰宜半夏瀉心湯枳實理中丸又曰太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之雍曰十棗湯太峻後人未易用當以檳榔湯代之又曰太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈常氏曰可生薑瀉心湯小柴胡湯桂枝去芍藥加龍骨牡蠣救逆湯雍曰此難治之證一言不可盡臨時更詳輕重痞甚則先瀉心發熱惡寒甚則先柴胡火逆甚則先救逆從所重治之又曰心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之又曰心下痞而復惡寒汗出者附子瀉心湯主之又曰本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之一方云忍之一日乃愈又曰傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之又曰傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之又曰傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利者小便常氏云可五苓散又曰傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿常氏云可茯苓甘草白朮生薑湯成痿者振痿湯雍曰當作茯苓桂枝白朮甘草湯又曰傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭湯主之又曰下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏仁甘草石膏湯又曰太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之又曰傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯又曰傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之又曰病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散又曰病人脅下素有痞連在臍旁痛引少腹入陰筋者此名臟結死常氏云可刺大赫在腹部第二行又曰傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之又曰傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之又曰傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之又曰太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之又曰太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之又曰傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之又曰風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之又曰傷寒脈浮滑此表有熱里有寒白虎湯主之雍曰此一證傳寫之誤校正者謂熱結在裡表裡俱熱此即仲景吐下後欲飲水數升白虎加人參湯之證又非此也仲景別條云傷寒脈浮發熱無汗其表不解不可與白虎表不解者尚不可服況里有寒者乎詳此證當作傷寒脈浮滑此表裡有熱白虎湯主之是亦仲景之言故仲景厥陰論中脈滑而厥亦為里有熱亦用白虎也又曰傷寒脈結代心動悸炙甘草湯主之又曰脈按之來緩時一止復來者名曰結又脈來動而中止更來小數中有遠者反動名曰結陰也脈來動而中止不能自還因而復動名曰代陰也得此脈者必難治雍曰宜炙甘草湯難治者謂代陰脈也金匱要略云脈結心悸炙甘草湯是也仲景曰傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便硬小便自利者去桂枝加白朮湯主之雍曰桂枝附子湯非桂枝加附子湯也朱氏名曰桂附湯者是也所主不同而世多誤用故朱氏少辨其名今桂枝加附子湯系桂枝第六方桂枝附子湯系桂枝第十七方去桂加白朮者謂自桂枝附子湯中去桂枝加白朮非謂桂枝加附子湯中加減也宜詳之又曰病欲吐者不可下常氏云可小半夏加橘皮湯又曰太陽病有外證未解不可下下之為逆常氏云可桂枝麻黃各半湯雍曰依可汗證中用桂枝二麻黃一湯又曰病發於陽而反下之熱入因作結胸病發於陰而反下之官本及脈經汗之皆作下之因作痞脈浮而緊而復下之緊反入里則作痞常氏云可小陷胸湯瀉心湯雍曰宜用半夏瀉心湯
