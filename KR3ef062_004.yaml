body:
  text: 卷四六經統論二十二問問曰傷寒三陽受病傳經何如素問三十一篇曰傷寒一日巨陽受之故頭項痛腰脊強二日陽明受之陽明主肉其脈挾鼻絡於目故身熱目疼而鼻乾不得臥也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾三陽經絡皆受其病未入於臟可汗而已問曰三陰受病傳經如何素問曰四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮問曰三陰可下何如仲景曰三陰皆受病已入於腑可下而已問曰汗下系乎經或系之日何也雍曰日猶經也大抵受病皆有常變其經與日不相應者則變也循常則易治既變則難通然變當從證常可從日故素問又曰若其未滿三日者可汗而已其滿三日者可泄而已此言常道也問曰經言其死皆以六七日之間何也雍曰六七日傳經皆遍陰陽俱受病已故重者死也素問曰三陰三陽五臟六腑皆受病營衛不行五臟不通則死是也故經又言治之法各通其臟脈病日衰已如是則五臟不通則死通其臟脈則病衰也問曰經言其愈皆以十日以上者何也雍曰此謂傷寒循常無變者故素問曰其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病日已矣此所以愈者皆十日以上也仲景十一日渴止下無不滿十二日大氣皆去下有病人精神爽慧也問曰十二日以上不愈者何也仲景曰若過十三日以上不間尺寸陷者大危若更感異氣變為他病者當依後壞病證而治之若脈陰陽俱盛重感於寒變成溫瘧陽脈浮滑陰脈濡弱者更遇於風變為風濕陽脈洪數陰脈實大更遇溫熱變為溫毒為病最重也陽脈濡弱陰脈弦緊更遇溫氣變為溫疫以此冬傷於寒發為溫病脈之變證方治如說龐氏溫疫作濕溫為當問曰傷寒一日巨陽受之王氏曰巨大也何他素問曰巨陽者諸陽之屬也皆有所屬其脈連於風府故為諸陽主氣也又評熱論曰巨陽主氣故先受邪也問曰兩感於寒者何如素問曰人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必不免於死一日太陽與少陰俱病則頭痛口乾而煩滿二日陽明與太陰俱病則腹滿身熱不欲食譫語三日少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死問曰素問又言三日乃死何也雍曰即前所謂六日死也何以言之兩感之病陰陽表裡兩經俱傳至三日則六經陰陽已傳盡水漿不入口不知人是時五臟已盡傷六腑已不通營衛已不仁如是之後三日乃死帝疑之故再舉問岐伯謂是時陽明之氣獨未盡故又三日而後死是以其言曰陽明者十二經脈之長也其血氣盛故不知人三日其氣乃盡故死矣夫不知人者則兩感陰陽俱傳三日之證也陽明為諸經之長其血氣盛所以滋養諸經其血氣已散入諸經者各隨其經絕矣其在陽明未散入諸經者又須三日而後乃盡以是知六日者三日傳陰陽諸經又三日陽明之氣方盡是為六日而世之讀經者以六日為陰陽再傳經而死若陰陽尚能再傳則不死矣其曰三日死者又別為陽明氣血隨邪而盡之說與六日不相通其誤甚矣問曰傷寒獨傳足陰陽六經何也孫真人云人有五臟心肺二臟經絡所起在手十指肝腎與脾三臟經絡所起在足十趾夫風毒之氣皆起於地地之寒暑風濕皆作蒸氣足常履之所以中人必中於足雍曰此孫真人感風毒之論傷寒之感亦無以異也問曰傷寒三陽受病傳不傳可見否仲景曰傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也又曰傷寒二三日陽明少陽證不見者為不傳也問曰三陰經傳不傳可見否仲景曰傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也不受邪則不傳矣問曰六經於臟腑何屬也雍曰足太陽膀胱經也足陽明胃經也足少陽膽經也此三腑者皆為陽也足太陰脾之經也足少陰腎之經也足厥陰肝之經也此三臟皆為陰也陽為表陰為里故足太陽與足少陰為表裡腎與膀胱也足陽明與足太陰為表裡脾與胃也足少陽與足厥陰為表裡肝與膽也問曰願聞六經之所起雍曰本於靈樞之言未可遽詳也朱氏活人書可見其略云足太陽膀胱起於目內眥上頭連於風府分為四道下項並正別脈上下六道以行於背與身為經太陽之經為諸陽主氣或中寒邪必發熱而惡寒緣頭項腰脊足太陽經所過處今頭項痛腰脊強身體疼其尺寸脈俱浮者故知太陽經受病此其大略也問曰陽明經何如朱氏曰足陽明胃之經從鼻起挾於鼻絡於目下咽分為四道並正別脈六道上下行腹綱維於身蓋諸陽在表陽明主肌肉絡於鼻故病人身熱目疼鼻乾不得臥其脈尺寸俱長者故知陽明經受病問曰少陽經何如朱氏曰足少陽膽之經起目外眥外當作銳絡於耳分為四道下缺盆循於脅並正別脈六道上下主經營百節流氣三部故病人胸脅痛而耳聾或口苦咽乾或往來寒熱而嘔其脈尺寸俱弦者知少陽經受病也問曰太陰經何如朱氏曰足太陰脾之經為三陰之首其脈布於脾胃絡於嗌喉故病人腹滿而嗌乾其脈尺寸俱沉細者知太陰經受病也問曰少陰經何如朱氏曰足少陰腎之經其脈起於足小趾之下斜趣足心別行者入跟中上至股內後廉貫腎絡膀胱直行從腎上貫肝膈入肺中系舌本傷寒熱氣入於臟流入於少陰之經少陰主腎腎惡燥故渴而引飲又經發汗吐下以後臟腑空虛津液枯竭腎有餘熱亦渴故病人口燥舌乾而渴其脈尺寸俱沉者少陰受病也問曰厥陰何如朱氏曰足厥陰肝之經厥者盡也靈樞經亥為左足之厥陰戌為右足之厥陰兩陰俱盡故曰厥陰夫陰盡為晦陰出為朔厥陰者以陰盡為義也其脈循陰器而絡於舌本脈弗營則筋急筋急則引舌與卵故唇青舌卷而囊縮凡病人煩滿而囊縮其脈尺寸俱微緩者知厥陰經受病也問曰六經之脈狀何如仲景曰尺寸俱浮者太陽受病也尺寸俱長者陽明受病也尺寸俱弦者少陽受病也尺寸俱沉細者太陰受病也尺寸俱沉者少陰受病也尺寸俱微緩者厥陰受病也問曰陽明厥陰之義何也素問七十四篇曰陽明何謂也岐伯曰兩陽合明也厥陰何謂也岐伯曰兩陰交盡也太陽經證治上九十五條雍曰自此以下皆仲景本論更不設問恐滋繁言第曰仲景曰繼則又曰而已其他書所言及有疑者方設問以答之本論有仲景原答問者則首曰仲景問曰是也其次並依仲景本論先後不復易云仲景曰脈尺寸俱浮者太陽受病也當一二日發以其上連風府故頭項痛腰脊強又曰太陽之為病脈浮頭項強痛而惡寒又曰太陽病發熱汗出惡風脈緩謂浮而緩者名曰中風又曰太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒王叔和曰太陽病脈浮而數可發其汗屬桂枝湯又曰太陽病未解其脈浮弱當以汗解宜桂枝湯又曰太陽病頭痛發熱汗出惡風若惡寒屬桂枝證汗出惡寒亦屬桂枝常穎士器之補治論曰汗出惡風宜桂枝湯無汗惡寒宜麻黃湯雍曰中風傷寒二證本以有汗無汗而分桂枝麻黃二湯亦分有汗無汗而用故汗出亦有惡寒者亦屬中風王叔和亦用桂枝不以惡寒而改用麻黃者謂其有汗也問曰太陽一經何其或有汗或無汗也雍曰系乎營衛之氣也營行脈中衛行脈外亦以內外和諧而後可行也風邪之氣中淺則中衛中衛則衛強衛強不與營相屬其慓悍之氣隨空隙而外出則為汗矣故有汗者衛氣遇毛孔而出者也寒邪中深則涉衛中營二氣俱受病無一強一弱之證寒邪營衛相結而不行則衛氣無自而出必用藥發其汗然後邪去而營衛復通故雖一經有有汗無汗二證亦有桂枝解表麻黃髮汗之治法不同也仲景論營衛和不和俱見於後千金曰傷寒一日太陽脈弱至四日太陰脈大仲景曰傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也常器之曰宜辨中風傷寒有汗無汗用麻黃桂技二湯孫真人曰太陽病三四日不吐下見芤乃汗之又曰太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期常器之補治論曰轉下火熏皆為逆也可白虎加人參湯桂枝柴胡各半湯桂枝去芍藥加蜀漆龍骨牡蠣救逆湯雍曰救逆湯治被火熏則無疑桂枝柴胡各半湯即柴胡桂枝湯也然有三證汗多亡陽外證未去雖譫語亦不可下當和營衛通津液用柴胡桂枝湯此未被下時可用也若已發汗又復下之小便不利渴而不嘔此為未解宜柴胡桂枝幹薑湯此被下後小便不利而渴者可用也若傷寒八九日下之胸滿煩驚小便不利用柴胡加龍骨牡蠣湯此被下後小便不利有煩驚證者可用也惟白虎加人參湯治大渴飲水口乾舌燥無表證者可服脈浮表未解者不可服今溫病風溫表未解者皆脈浮則不可服明矣白虎加人參本治裡熱太陽發熱而渴非裡熱不可服故今去之又曰病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六故也龐氏曰發於陽者隨證用汗藥攻其表發於陰者用四逆輩溫其內又曰太陽病頭痛至七日以上自愈者以行其經盡故也若欲作再經者針足陽明龐云補三里穴使經不傳則愈問曰經言其死皆以六七日之間而論言七日以上自愈何也雍曰感之重而證有變異者死感之輕而證無變異者自愈也又曰風家表解而不了了者十二日愈龐注云方言曰南楚疾愈或謂之瘥或謂之了又曰病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也朱氏曰熱在皮膚者表熱裡寒宜先與陰旦湯寒已次以小柴胡加桂以溫其表寒在皮膚者表寒裡熱宜先以白虎加參湯除熱次以麻桂各半湯解其表大抵病有標本治有先後表熱裡寒脈必沉而遲手足微厥下利清穀也所以陰證亦有發熱者四逆湯通脈四逆湯主之表寒裡熱者脈必滑而厥口燥舌乾也所以少陰惡寒而蜷時時自煩不欲厚衣用大柴胡湯下之而愈雍曰皮膚固為表而骨髓為里有二說所以仲景不直言表裡而曰皮膚骨髓也夫表裡者人身之陰陽也靈樞六篇曰內有陰陽外亦有陰陽在內者五臟為陰六腑為陽在外者筋骨為陰皮膚為陽今朱氏雖從表裡法治之然是以在內治里之法而治在外之裡也常器之只用桂枝麻黃各半湯雖亦有理又疑麻黃雖能和營衛而不至骨髓朱氏似失之深常氏似失之淺宜於二者之間消息用藥或用朱氏之藥則少與之用常氏之藥則多與之可也又曰太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之千金翼曰太陽中風發熱而惡寒又曰太陽病頭痛發熱汗出惡風者桂枝湯主之又曰太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之又曰太陽病下之後其氣上衝者可與桂枝湯若不上衝者不可與之又曰太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之又曰桂枝本為解肌若其人脈浮緊發熱汗不出者不可與之常須識此勿令誤也常器之云可麻黃湯又曰若酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也又曰喘家作桂枝湯加厚朴杏子佳又曰凡服桂枝湯吐者其後必吐膿血也常氏曰可服類要芍藥地黃湯雍曰見膿血而後可服又曰太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之千金云桂枝湯加附子一個炮即是龐氏曰若小便數切不可行此湯宜用芍藥甘草湯若誤行桂枝加附子湯攻表則咽乾煩躁厥逆嘔吐者作甘草乾薑湯與之以復陽氣若厥愈足溫更與芍藥甘草湯其腳即伸若胃氣不和譫語者少與調胃承氣湯微溏則譫語止雍曰此仲景治自汗小便數之法龐氏以治發汗漏不止小便數其證實一也又曰太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者桂枝去芍藥方中加附子湯主之又曰太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯又曰太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈雍曰仲景云太陽受病上連風府故治傷寒以風府為要穴風池次之然風府近腦戶或疑不敢刺在法又禁灸風池則灸刺皆無禁也又曰服桂枝湯大汗出脈洪大者與桂枝湯如前法若形似瘧日再發者汗出必解宜桂枝二麻黃一湯又曰服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之又曰太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯千金云不可發汗又曰服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之又曰傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之見九卷仲景問曰證象陽旦陽旦即桂枝異名按法治之而增劇厥逆咽中干兩脛拘急而譫語師言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮則為風大則為虛風則生微熱虛則兩脛攣病證象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中干煩躁陽明內結譫語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其譫語故知病可愈雍曰此一段問答重解釋前段誤用桂枝加附子之證按法治之謂令服桂枝湯也以此推之則證象陽旦者小便不利則用桂枝加附子湯小便數則用甘草乾薑湯芍藥甘草湯惟以小便為準耳龐氏曰兩脛攣小便數仍汗出為津液少不可誤行桂枝湯宜補虛退熱用芍藥甘草湯通治又曰太陽病項背強𠘧𠘧無汗惡風葛根湯主之又曰太陽與陽明合病者必自下利葛根湯主之一云用葛根茯苓黃連湯方未見疑即葛根黃芩黃連湯又曰太陽與陽明合病不下利但嘔者葛根加半夏湯主之千金云葛根湯中加半夏半升又曰太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯主之又曰太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之又曰太陽與陽明合病喘而胸滿者不可下宜麻黃湯主之又曰太陽病十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯問曰太陽病論有言至七日以上有言十日已去若此之類未知傳經與不傳經也雍曰究其意義雖可見又當以脈證辨之且如七日以上自愈者謂六日傳經已遍而無變異也十日已去設有胸滿脅痛者是傳陽明也其脈浮而無他證者只在太陽不傳故仲景猶用麻黃也所以朱氏言寒邪中人不必皆始於太陽兼有首尾止在一經或間傳一二經不可以一理推但據脈與外證治之若過日多脈大浮數按之不足者尚責太陽發汗而愈此即仲景十日已去脈但浮者服麻黃湯之意也有汗者何如曰詳證於諸桂枝湯中選用之朱又云不必皆始於太陽者何如曰雍雖未之見在理應有之須證脈可辨如感疾頭不甚痛即非太陽也蓋感病之變異者也如巨陽先受邪則世俗謂之正傷寒也仲景曰太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也雍曰中風而脈浮緊是中風見寒脈也故可服若脈微弱則非寒脈又汗出惡風亦皆中風證故不可服設服之則汗漏不止筋惕肉瞤而死筋惕肉瞤者以亡陽故也其詳別見可汗門中又曰傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之雍曰傷寒而脈浮緩是傷寒見風脈也少陰里證大青龍發表藥故無少陰證者可服少陰口燥舌乾而渴是也龐氏云當作無太陰證且仲景於不可發汗證中已言少陰病不可發汗況用大青龍湯尤為不可則此用少陰字為無疑而龐氏因脈證相似乃云當作太陰證雖龐氏之誤然太陰病亦不可發汗三陰皆不可服特少陰最為緊急耳仲景大青龍湯惟此兩證以其汗出亡陽太暴善醫者復不敢用往往臨時審證以他藥代之若用桂枝麻黃各半湯亦好惟是力緩宜多服和解之又曰傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之又曰傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒氣欲解也小青龍湯主之又曰太陽病外證未解脈浮弱者當以汗解宜桂枝湯又曰太陽病下之微喘者表未解故也桂枝加厚朴杏子湯主之千金云宜桂枝湯一云麻黃湯又曰太陽病外證未解者不可下也下之為逆欲解外者宜桂枝湯主之又曰太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯主之又曰太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之又曰太陽病脈浮緊發熱身無汗自衄者愈又曰二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗不徹以脈澀故知之龐氏云宜麻黃湯雍曰龐氏在陽明以古本差誤仍改本又曰脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裡虛須表裡實津液自和便自汗出愈常器之云汗不出者可與小柴胡湯雍曰若心下悸而煩宜小建中湯表裡俱虛宜桂枝麻黃各半湯設若用柴胡和解亦宜用柴胡桂枝和其營衛以通津液此證是下后里虛故仲景待其氣復津液自和而汗出不必更用藥此一證非有證無治其不用藥便是治法也常氏必欲和解之疑其用藥太重故雍以柔劑少殺其力庶幾得中要之能少忍待其自和從仲景不用藥法為上也又曰脈浮緊者法當身疼痛宜以汗解之謂發汗也假令尺中遲者不可發汗何以知其然以營氣不足血少故也雍曰此一證與前證略相似宜小建中湯次則柴胡桂枝湯又不若待其別見證而治之蓋前證是下後證當無別證出故仲景不用藥此證是汗前證須別有證出故不若少待之既知血少不可便用小柴胡湯也又曰脈浮者病在表可發汗宜麻黃湯又曰脈浮而數者可發汗宜麻黃湯又曰脈浮而緊浮則為風緊則為寒風則傷衛寒則傷營營衛俱病骨節煩疼可發其汗宜麻黃湯又曰病常自汗出者此為營氣和營氣和者外不諧以衛氣不共營氣和諧故耳以營行脈中衛行脈外復發其汗營衛和則愈宜桂枝湯問曰營氣既和何為自汗出也雍曰平人營衛之氣常自和也設衛中於風而營不中於寒是衛有邪氣而營無邪氣也有邪氣者強無邪氣者弱一強一弱故營不得與衛氣諧和而獨和則衛氣無所依以慓悍無所依之氣又以邪氣濟之兩氣盈溢溪谷不能容營深而衛淺故衛氣於皮膚間不得內合於營而外見隙穴則出為自汗也用桂枝解其肌則衛之邪氣去衛無邪氣則其氣自衰自然還內與營和而汗止矣仲景曰病人臟無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯主之又曰傷寒脈浮緊不發汗因致衄者麻黃湯主之又曰傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也不可與之當鬚髮汗若頭痛者必衄宜桂枝湯常器之云或疑其誤也設鬚髮汗當用麻黃湯不然用桂枝麻黃各半湯取其小小汗出而已雍曰仲景書桂枝無治衄法麻黃有治衄法故此一證常氏疑其有誤而改用麻黃也設若頭不痛則不衄不衄則不可用麻黃故宜桂枝麻黃各半湯取小汗而已更宜以有汗無汗決之仲景書安得無傳寫之誤也又曰傷寒發汗解半日許復煩其脈浮數者可更發汗宜桂枝湯主之雍曰須言半日許者以過此而復煩即屬勞復不用桂枝湯也又曰凡病若發汗若吐苦下若亡血亡津液陰陽自和者必自愈雍曰言凡者不止謂傷寒也若傷寒未和者少待其和或須藥可柴胡桂枝湯少與之不必用小柴胡也又曰大下之後復發汗小便不利者亡津液故也勿治之得小便利者必自愈雍曰不必更以藥利其小便自待其通則愈又曰下之後復發汗必振寒脈微細所以然者以內外俱虛故也常氏曰素無熱人可與芍藥附子湯有熱人可與黃耆建中湯又曰下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之又曰發汗後身疼痛脈沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之又曰發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏子甘草石膏湯主之又曰發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之又曰發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之又曰發汗後腹脹滿者厚朴生薑半夏甘草人參湯主之又曰傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之又曰發汗病不解反惡寒者虛故也芍藥甘草附子湯主之又曰發汗若下之病仍不解煩躁者茯苓四逆湯主之又曰發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯雍曰虛者芍藥甘草附子湯又曰太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者五苓散主之又曰發汗已脈浮數煩渴者五苓散主之又曰傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之又曰中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆五苓散主之又曰未持脈時病人叉手自冒心師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此常器之云素無熱人可與芍藥附子湯素有熱人可與黃耆建中湯又曰發汗後飲水多必喘以水灌之亦喘常云可與麻黃杏子甘草石膏湯又曰發汗後水藥不得入口為逆若更發汗必吐下不止常云可與半夏茯苓湯又曰發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之又曰發汗若下之而煩熱胸中窒者梔子豉湯主之又曰傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之又曰傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之又曰凡用梔子湯病人舊微溏者不可與服之又曰太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗地者真武湯主之又曰咽喉乾燥者不可發汗常氏云可與小柴胡湯又曰瘡家雖身疼痛不可發汗汗出則痓常氏云可小柴胡湯又曰淋家不可發汗發汗必便血又曰衄家不可發汗汗出必額上陷脈急緊直視不能眴不得眠常氏云可犀角地黃湯又曰亡血家不可發汗發汗則寒慄而振常氏云可與芍藥地黃湯又曰汗家重發汗必恍惚心亂小便已陰疼與禹餘糧丸方本闕常氏云禹餘糧石一味火煅散服亦可雍曰用禹餘糧不用石石乃殼也又曰病人有寒復發汗胃中冷必吐蛔常氏云可服烏梅丸雍曰宜服理中丸又曰本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆雍曰此為病當先汗而反先下之故為逆也若已汗而復下之者不為逆也或病當先下而反先汗之故為逆也若已下而後汗之者不為逆也如太陽證當汗而反下之少陰證當下而反汗之皆為逆也
